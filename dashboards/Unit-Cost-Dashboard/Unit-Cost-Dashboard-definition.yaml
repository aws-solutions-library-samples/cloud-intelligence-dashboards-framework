  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#7fd4b9\" font-size=\"20px\">\n    <b>EBS\
      \ Storage</b>\n  </inline>\n  <br/>\n  Identify where EBS spend is decoupled\
      \ from actual usage: right-size, downgrade, or terminate to optimize spend.\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <b>EBS Provisioned IOPS:</b>\n\
      \      \_Per-IOPS spending regardless of utilization.\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <b>\_EBS Snapshots:</b>\n      \_Per-GB snapshot storage\
      \ across retention periods.\n    </li>\n    <li class=\"ql-indent-0\">\n   \
      \   <b>EBS Storage:</b>\n      \_Per-GB spending by volume type (gp2, gp3, io1,\
      \ io2, st1, sc1).\n    </li>\n    <li class=\"ql-indent-0\">\n      <b>EBS Throughput:</b>\n\
      \      \_Per-MB/s provisioned throughput spending.\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 48bdbc67-03a3-4c43-b8d4-5e5207c0f691
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"20px\">\n      <b>How to Read Trends</b>\n    </inline>\n  </block>\n\
      \  <br/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n    <b>EBS\
      \ Provisioned IOPS :</b>\n  </inline>\n  <br/>\n  <b>Increasing cost per IOPS:</b>\n\
      \  \_Volumes have migrated to io1/io2 without right-sizing.\n  <br/>\n  <b>High\
      \ cost per IOPS with low utilization:</b>\n  \_IOPS capacity is over-provisioned.\n\
      \  <br/>\n  <b>Varying cost per IOPS across accounts:</b>\n  \_Provisioning\
      \ practices are inconsistent.\n  <br/>\n  <inline font-size=\"16px\">\n    <b>\n\
      \      <u>Actions to Improve</u>\n    </b>\n  </inline>\n  <inline font-size=\"\
      16px\">\n    <b>:\_</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >Right-size IOPS allocations based on observed utilization</li>\n    <li class=\"\
      ql-indent-0\">Evaluate gp3 for independent IOPS scaling</li>\n    <li class=\"\
      ql-indent-0\">Migrate io1 to io2 for equivalent performance at lower cost</li>\n\
      \  </ul>\n  <br/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n\
      \    <b>EBS Throughput :</b>\n  </inline>\n  <br/>\n  <b>Increasing cost per\
      \ MB/s:</b>\n  \_Provisioned throughput exceeds workload demand.\n  <br/>\n\
      \  <b>Low throughput utilization:</b>\n  \_Capacity is provisioned but not consumed.\n\
      \  <br/>\n  <b>Increasing throughput costs:</b>\n  \_Workloads have migrated\
      \ to higher-throughput volume types without right-sizing.\n  <br/>\n  <inline\
      \ font-size=\"16px\">\n    <b>\n      <u>Actions to Improve</u>\n    </b>\n\
      \  </inline>\n  <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n \
      \ <br/>\n  <ul>\n    <li class=\"ql-indent-0\">Right-size throughput allocations\
      \ based on observed consumption\_</li>\n    <li class=\"ql-indent-0\">Evaluate\
      \ gp3 for independent throughput configuration</li>\n    <li class=\"ql-indent-0\"\
      >Evaluate st1 for sequential, high-throughput workloads at lower cost per MB/s</li>\n\
      \  </ul>\n</text-box>"
    SheetTextBoxId: 5d20b78a-7823-4221-abc4-7463b430d98c
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"20px\">\n      <b>Reading Trends</b>\n    </inline>\n  </block>\n\
      \  <br/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n    <b>EBS\
      \ Storage :</b>\n  </inline>\n  <br/>\n  <b>High cost per GB:</b>\n  \_\_Storage\
      \ relies mainly on io1/io2 volume types. **\n  <br/>\n  <b>Large volume of low-utilization\
      \ storage:</b>\n  \_Idle or oversized volumes are incurring charges.\n  <br/>\n\
      \  <b>Increasing gp2 costs:</b>\n  \_gp2 volumes have not been migrated to gp3.\n\
      \  <br/>\n  <inline font-size=\"16px\">\n    <b>\n      <u>Actions to Improve</u>\n\
      \    </b>\n  </inline>\n  <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">Migrate gp2 to gp3 for better\
      \ price-performance</li>\n    <li class=\"ql-indent-0\">Right-size volumes based\
      \ on observed utilization (of last 30-60 days) ??</li>\n    <li class=\"ql-indent-0\"\
      >Evaluate st1 or sc1 for infrequently accessed data</li>\n    <li class=\"ql-indent-0\"\
      >Delete unattached or idle volumes identified via AWS Compute Optimizer or Trusted\
      \ Advisor</li>\n  </ul>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\"\
      >\n    <b>EBS Snapshots :\_</b>\n  </inline>\n  <br/>\n  <b>High volume with\
      \ stable cost per GB:</b>\n  \_Snapshots are accumulating without a lifecycle\
      \ policy.\n  <br/>\n  <b>Growing snapshot storage:</b>\n  \_Deletion policies\
      \ are ineffective or missing.\n  <br/>\n  <b>Increasing cost per GB:</b>\n \
      \ \_Snapshots are retained in standard tier that could be archived.\n  <br/>\n\
      \  <inline font-size=\"16px\">\n    <b>\n      <u>Actions to Improve</u>\n \
      \   </b>\n  </inline>\n  <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">Implement Lifecycle to automate\
      \ snapshot creation and deletion</li>\n    <li class=\"ql-indent-0\">Identify\
      \ and remove snapshots of deleted or unattached volumes</li>\n    <li class=\"\
      ql-indent-0\">Archive older snapshots that require retention but are rarely\
      \ accessed</li>\n  </ul>\n</text-box>"
    SheetTextBoxId: e6c84103-2de6-4621-a166-6043f2fccc93
  - Content: "<text-box>\n  <inline color=\"#7fd4b9\" font-size=\"22.4px\">\n    <b>S3</b>\n\
      \  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"14px\">S3 unit metrics\
      \ are valuable for cost management and future planning, providing insight into\
      \ unit economics (cost per GB) and overall spending trends for S3 data transfer,\
      \ S3 Early Delete, S3 other Fee, S3 Requests and Retrievals and S3 storage.</inline>\n\
      \  <br/>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ color=\"#60cdb3\" font-size=\"14px\">\n        <a href=\"https://docs.aws.amazon.com/cur/latest/userguide/cur-data-transfers-charges.html\"\
      \ target=\"_blank\">\n          <b>S3 Data Transfer Usage Types</b>\n      \
      \  </a>\n      </inline>\n      <inline color=\"#60cdb3\" font-size=\"14px\"\
      >\n        <b>:</b>\n      </inline>\n      <inline color=\"#acdff5\" font-size=\"\
      14px\">\_</inline>\n      The cost per GB for data transfers involving S3, including\
      \ Internet OUT downloads, cross-region transfers, CloudFront delivery, VPC Endpoint\
      \ traffic, Transfer Acceleration, and Replication transfers. This metric helps\
      \ pinpoint which specific data movement patterns drive disproportionate costs.\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\" font-size=\"14px\">\n        <b>S3 Early\
      \ Delete:</b>\n      </inline>\n      <inline font-size=\"14px\">\_</inline>\n\
      \      The per-unit cost penalties incurred when objects are deleted before\
      \ their minimum storage commitment period from S3 Intelligent-Tiering, Standard-IA,\
      \ One Zone-IA, Glacier Flexible Retrieval, or Glacier Deep Archive storage.\
      \ This metric helps identify storage classes and usage patterns driving these\
      \ often-overlooked charges.\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#60cdb3\" font-size=\"\
      14px\">\n        <b>S3 Requests and Retrievals:</b>\n      </inline>\n     \
      \ <inline color=\"#60cdb3\" font-size=\"14px\">\_</inline>\n      <inline font-size=\"\
      14px\">\_</inline>\n      The cost per operation for different S3 API calls\
      \ (GET, PUT, LIST, etc.) and retrieval operations across storage classes. This\
      \ metric reveals which specific API calls and retrieval patterns drive disproportionate\
      \ costs, especially for Glacier and other retrieval-sensitive storage tiers.\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\" font-size=\"14px\">\n        <b>S3 Storage:</b>\n\
      \      </inline>\n      <inline font-size=\"14px\">\n        <b>\_</b>\n   \
      \   </inline>\n      The cost per GB across different S3 storage classes (Standard,\
      \ Standard-IA, One Zone-IA, Intelligent-Tiering, Glacier, etc.). This metric\
      \ reveals cost efficiency opportunities by highlighting which specific storage\
      \ tiers are most cost-effective for your actual access patterns and retention\
      \ needs.\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 5f10055f-ab0c-40de-8bec-9c1e5662fbca
  - Content: "<text-box>\n  <inline color=\"#7fd4b9\" font-size=\"22.4px\">\n    <b>FSX</b>\n\
      \  </inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n   \
      \   <inline color=\"#60cdb3\">\n        <b>FSx Usage Metrics by FileSystem Type:\_\
      </b>\n      </inline>\n      A comparison of unit costs across different FSx\
      \ filesystem types (Windows, Lustre, NetApp ONTAP, OpenZFS), exposing per-GB,\
      \ per-IOPS, and throughput expenses for each deployment. This metric helps identify\
      \ optimal filesystem selections for specific workloads and highlights opportunities\
      \ to right-size provisioned resources.\n    </li>\n  </ul>\n  <br/>\n  <br/>\n\
      \  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#60cdb3\">\n\
      \        <b>FSx Lustre Usage Metrics by Storage Type:\_</b>\n      </inline>\n\
      \      visual A comparision of unit costs across specific FSx Lustre storage\
      \ configurations (Storage.HDD.40.Rc20, Storage.SSD.250, Storage.SSD.500) revealing\
      \ performance-to-cost ratios for each tier. This metric helps identify optimal\
      \ storage selections based on workload I/O requirements and opportunities to\
      \ migrate less performance-sensitive workloads to cost-effective HDD storage\
      \ while reserving premium SSD tiers for truly I/O-intensive applications.\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\">\n        <b>FSx ONTAP Unit Cost by Usage\
      \ Type:</b>\n      </inline>\n      <inline color=\"#60cdb3\">\_</inline>\n\
      \      A breakdown of FSx ONTAP costs by usage type (provisioned IOPS, provisioned\
      \ throughput, storage capacity) excluding read/write operations. This metric\
      \ reveals precise cost allocation patterns, enabling targeted optimization of\
      \ over-provisioned resources by identifying file systems with high-cost IOPS\
      \ or throughput allocations that exceed actual workload demands.\n    </li>\n\
      \  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ color=\"#60cdb3\">\n        <b>FSx ONTAP Usage Metrics by Usage Subtype:</b>\n\
      \      </inline>\n      \_An analysis of FSx ONTAP costs by specific subtypes\
      \ (BackupUsage, ProvisionedSSDIOPS.MAZ, ProvisionedSSDIOPS.MAZ2, Storage.MAZ),\
      \ revealing cost-efficiency patterns across multi-availability zone deployments.\
      \ This metric helps identify opportunities to optimize backup retention policies,\
      \ right-size IOPS allocations in different availability zones, and balance high-availability\
      \ requirements with cost-effective resource allocation.\n    </li>\n  </ul>\n\
      </text-box>"
    SheetTextBoxId: 4b73e9e7-ad73-4b56-9d3b-7cf634a2a670
  - Content: "<text-box>\n  <inline color=\"#7fd4b9\" font-size=\"22.4px\">\n    <b>EFS</b>\n\
      \  </inline>\n  <br/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"14px\"\
      >\n    <b>EFS Unit Cost by Storage Class:</b>\n  </inline>\n  <inline color=\"\
      #acdff5\" font-size=\"14px\">\n    <b>\_</b>\n  </inline>\n  The cost per GB\
      \ across EFS storage classes (Standard, Infrequent Access) and deployment types\
      \ (Regional, One Zone). This metric reveals cost-saving opportunities by highlighting\
      \ data that could be\_automatically tiered to lower-cost storage classes based\
      \ on access patterns.\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n   \
      \ <b>\n      <u>Reading Trends</u>\n    </b>\n  </inline>\n  <inline font-size=\"\
      16px\">\n    <b>:\_</b>\n  </inline>\n  <br/>\n  - High Standard Storage Costs:\
      \ Indicates opportunities to enable lifecycle management.\n  <br/>\n  - Low\
      \ IA Utilization: Suggests lifecycle policies may not be configured optimally.\n\
      \  <br/>\n  - Increasing Overall Costs: May signal growing file system usage\
      \ without proper tiering.\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n\
      \    <b>\n      <u>Actions to Improve</u>\n    </b>\n  </inline>\n  <inline\
      \ font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n  <br/>\n  - Enable EFS\
      \ Lifecycle Management to automatically moveinfrequently accessed files to lower-cost\
      \ storage\n  <br/>\n  - Configure appropriate lifecycle transition periods (7,\
      \ 14, 30, 60, or 90 days)\n  <br/>\n  - Consider One Zone storage for non-critical\
      \ data that doesn't require multi-AZ resilience\n  <br/>\n  - Use EFS Access\
      \ Points to enforce application-specific views of the file system\n  <br/>\n\
      \  - Implement proper file retention and deletion policies\n  <br/>\n  - Consider\
      \ using EFS Infrequent Access storage class, which can reduce costs by up to\
      \ 85% for infrequently accessed files\n</text-box>"
    SheetTextBoxId: c2fa4a5b-91e5-4a59-84c4-27a6f3a47ffe
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline font-size=\"20px\"\
      >\n      <b>Reading Trends\_</b>\n    </inline>\n  </block>\n  <br/>\n  <block\
      \ align=\"center\"/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\"\
      >\n    <b>FSx Windows Unit Cost by Usage Type</b>\n  </inline>\n  <inline color=\"\
      #60cdb3\" font-size=\"20px\">:\_</inline>\n  <br/>\n  <inline color=\"Accent\"\
      \ font-size=\"14px\">- High Storage Costs: Indicates opportunities for data\
      \ deduplication or cleanup</inline>\n  <br/>\n  <inline color=\"Accent\" font-size=\"\
      14px\">- High Throughput Costs: Suggests potential over-provisioning of throughput\
      \ capacity</inline>\n  <br/>\n  <inline color=\"Accent\" font-size=\"14px\"\
      >- Increasing IOPS Costs: May signal growing workloads or changing access patterns</inline>\n\
      \  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>\n      <u>Actions\
      \ to Improve\_</u>\n    </b>\n  </inline>\n  <inline font-size=\"16px\">\n \
      \   <b>:</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline color=\"Accent\" font-size=\"\
      14px\">- Enable data deduplication to reduce storage requirements</inline>\n\
      \  <br/>\n  <inline color=\"Accent\" font-size=\"14px\">- Right-size throughput\
      \ capacity based on actual usage patterns</inline>\n  <br/>\n  <inline color=\"\
      Accent\" font-size=\"14px\">- Choose appropriate storage type (SSD for performance,\
      \ HDD for cost savings)</inline>\n  <br/>\n  <inline color=\"Accent\" font-size=\"\
      14px\">- Implement appropriate backup retention policies</inline>\n  <br/>\n\
      \  <inline color=\"Accent\" font-size=\"14px\">- Monitor actual throughput and\
      \ IOPS usage to identify optimization opportunities</inline>\n  <br/>\n  <inline\
      \ color=\"Accent\" font-size=\"14px\">- Consider single-AZ deployment for non-critical\
      \ workloads</inline>\n  <br/>\n  <inline color=\"Accent\" font-size=\"14px\"\
      >- Use shadow copies efficiently for user-driven recoveries</inline>\n  <br/>\n\
      \  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n    <b>FSx Lustre\
      \ Usage Metrics by Storage Type:</b>\n  </inline>\n  <br/>\n  - High SSD Usage\
      \ Costs: Indicates potential opportunities to move appropriate workloads to\
      \ HDD storage\n  <br/>\n  - Underutilized SSD Performance: Suggests paying for\
      \ performance that isn't being utilized\n  <br/>\n  - Growing SSD Costs: May\
      \ signal expanding high-performance workloads without proper assessment\n  <br/>\n\
      \  <br/>\n  <inline font-size=\"16px\">\n    <b>\n      <u>Actions to Improve</u>\n\
      \    </b>\n  </inline>\n  <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n\
      \  <br/>\n  <br/>\n  - Choose appropriate storage type based on performance\
      \ requirements\n  <br/>\n  \_ - SSD for high-performance, random I/O workloads\n\
      \  <br/>\n  \_ - HDD for throughput-focused, sequential workloads at lower cost\n\
      \  <br/>\n  - Migrate less performance-sensitive workloads to cost-effective\
      \ HDD storage\n  <br/>\n  - Reserve premium SSD tiers for truly I/O-intensive\
      \ applications\n  <br/>\n  - Monitor performance metrics to validate storage\
      \ type selections\n  <br/>\n  - Consider persistent deployment type for longer-term\
      \ storage needs\n  <br/>\n  - Use scratch deployment for temporary, processing-intensive\
      \ workloads\n</text-box>"
    SheetTextBoxId: b08e25d0-ceb2-4748-81f4-e8247aefe493
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline font-size=\"20px\"\
      >\n      <b>Reading Trends\_</b>\n    </inline>\n  </block>\n  <br/>\n  <block\
      \ align=\"center\"/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\"\
      >\n    <b>FSx ONTAP Unit Cost by Usage Type</b>\n  </inline>\n  <br/>\n  - High\
      \ IOPS Costs: Indicates potential over-provisioning of IOPS relative to actual\
      \ needs\n  <br/>\n  - High Throughput Costs: Suggests opportunities to right-size\
      \ throughput allocations\n  <br/>\n  - Imbalanced Cost Distribution: May reveal\
      \ misalignment between provisioned resources and workload requirements\n  <br/>\n\
      \  <br/>\n  <inline font-size=\"16px\">\n    <b>\n      <u>Actions to Improve</u>\n\
      \    </b>\n  </inline>\n  <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n\
      \  <br/>\n  <br/>\n  - Right-size IOPS allocations based on actual workload\
      \ demands\n  <br/>\n  - Adjust throughput capacity to match application requirements\n\
      \  <br/>\n  - Use storage efficiency features (compression, deduplication, thin\
      \ provisioning)\n  <br/>\n  - Implement tiering to move cold data to S3\n  <br/>\n\
      \  - Monitor actual IOPS and throughput utilization to identify optimization\
      \ opportunities\n  <br/>\n  - Consider single-AZ deployment for non-critical\
      \ workloads\n  <br/>\n  - Use appropriate capacity pool and SSD tier combinations\n\
      \  <br/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n    <b>FSx\
      \ ONTAP Usage Metrics by Usage Subtype</b>\n  </inline>\n  <br/>\n  - High Backup\
      \ Usage Costs: Indicates excessive backup retention or frequency\n  <br/>\n\
      \  - Imbalanced IOPS Allocation Across Zones: Suggests potential optimization\
      \ opportunities\n  <br/>\n  - High MAZ Storage Costs: May point to opportunities\
      \ for tiering or storage efficiency features\n  <br/>\n  <br/>\n  <inline font-size=\"\
      16px\">\n    <b>\n      <u>Actions to Improve</u>\n    </b>\n  </inline>\n \
      \ <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n  <br/>\n  <br/>\n\
      \  - Optimize backup retention policies based on recovery requirements\n  <br/>\n\
      \  - Right-size IOPS allocations in different availability zones\n  <br/>\n\
      \  - Identify and address storage distribution imbalances across zones\n  <br/>\n\
      \  - Implement appropriate tiering policies to move cold data to capacity pools\n\
      \  <br/>\n  - Use storage efficiency features (compression, deduplication) to\
      \ reduce capacity needs\n  <br/>\n  - Consider single-AZ deployment for non-critical\
      \ workloads\n  <br/>\n  - Balance high-availability requirements with cost-effective\
      \ resource allocation\n</text-box>"
    SheetTextBoxId: 9873c834-e6e8-4ecf-bbf1-582a0f3a49fa
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline font-size=\"20px\"\
      >\n      <b>Reading Trends\_</b>\n    </inline>\n  </block>\n  <br/>\n  <br/>\n\
      \  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\"/>\n  <inline color=\"\
      #60cdb3\" font-size=\"20px\">\n    <b>S3 Requests and Retrievals :</b>\n  </inline>\n\
      \  <br/>\n  - High GET Request Costs: Indicates frequent object access that\
      \ might benefit from caching\n  <br/>\n  - High LIST Operation Costs: Suggests\
      \ inefficient bucket scanning or inventory practices\n  <br/>\n  - High Glacier\
      \ Retrieval Costs: Points to potential misalignment between storage class and\
      \ access patterns\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>\n\
      \      <u>Actions to Improve:\_</u>\n    </b>\n  </inline>\n  <br/>\n  <br/>\n\
      \  - Implement caching using CloudFront or application-level caching to reduce\
      \ GET requests\n  <br/>\n  - Use S3 Inventory instead of LIST operations for\
      \ large buckets\n  <br/>\n  - Batch small objects to reduce per-request costs\n\
      \  <br/>\n  - Select appropriate Glacier retrieval options (expedited, standard,\
      \ bulk) based on needs\n  <br/>\n  - Use S3 Batch Operations for bulk actions\
      \ instead of numerous individual requests\n  <br/>\n  - Implement S3 Select\
      \ to retrieve only needed portions of objects\n  <br/>\n  - Consider S3 Intelligent-Tiering\
      \ for objects with changing access patterns\n</text-box>"
    SheetTextBoxId: c1c014b4-12ea-4f9f-8152-7550c91d3c8c
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline font-size=\"20px\"\
      >\n      <b>Reading Trends\_</b>\n    </inline>\n  </block>\n  <br/>\n  <br/>\n\
      \  <br/>\n  <inline color=\"#60cdb3\" font-size=\"20px\">\n    <b>S3 Storage\
      \ :</b>\n  </inline>\n  <br/>\n  - High Standard Storage Costs: Indicates opportunities\
      \ to move infrequently accessed data to cheaper tiers\n  <br/>\n  - Low Intelligent-Tiering\
      \ Adoption: Suggests potential missed savings for objects with changing access\
      \ patterns\n  <br/>\n  - Growing Glacier Storage: May indicate effective lifecycle\
      \ policies or potential retrieval concerns\n  <br/>\n  <br/>\n  <br/>\n  <inline\
      \ font-size=\"16px\">\n    <b>\n      <u>Actions to Improve:\_</u>\n    </b>\n\
      \  </inline>\n  <br/>\n  <br/>\n  - Implement lifecycle policies to automatically\
      \ transition objects to appropriate storage classes\n  <br/>\n  - Enable S3\
      \ Intelligent-Tiering for objects with unpredictable access patterns\n  <br/>\n\
      \  - Use S3 Analytics to identify optimal transition timing\n  <br/>\n  - Consider\
      \ One Zone-IA for non-critical, infrequently accessed data\n  <br/>\n  - Implement\
      \ appropriate Glacier tiers based on retrieval needs (Instant, Flexible, Deep\
      \ Archive)\n  <br/>\n  - Delete unnecessary objects using S3 Inventory to identify\
      \ candidates\n  <br/>\n  - Use S3 Storage Lens for detailed storage analysis\
      \ and recommendations\n</text-box>"
    SheetTextBoxId: 7386f985-8ba8-4143-8530-3d4a25facbc8
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline font-size=\"20px\"\
      >\n      <b>Reading Trends\_</b>\n    </inline>\n  </block>\n  <br/>\n  <block\
      \ align=\"center\"/>\n  <br/>\n  <inline color=\"#60cdb3\" font-size=\"16px\"\
      >\n    <b>FSx Usage Metrics by FileSystem Type</b>\n  </inline>\n  <br/>\n \
      \ - High Costs for Specific File System Types: Indicates potential mismatch\
      \ between workload needs and file system selection\n  <br/>\n  - Imbalanced\
      \ Cost Distribution: Suggests opportunities to migrate workloads between file\
      \ system types\n  <br/>\n  - Growing Costs Without Utilization Growth: Points\
      \ to over-provisioning of resources\n  <br/>\n  <br/>\n  <inline font-size=\"\
      16px\">\n    <b>\n      <u>Actions to Improve</u>\n    </b>\n  </inline>\n \
      \ <inline font-size=\"16px\">\n    <b>:\_</b>\n  </inline>\n  <br/>\n  <br/>\n\
      \  - Select appropriate file system type based on workload requirements and\
      \ cost sensitivity\n  <br/>\n  - Right-size provisioned resources based on actual\
      \ utilization patterns\n  <br/>\n  - Use FSx for Windows File Server for Windows-based\
      \ applications\n  <br/>\n  - Consider FSx for Lustre for high-performance computing\
      \ workloads\n  <br/>\n  - Use FSx for OpenZFS for Linux-based applications with\
      \ lower cost requirements\n  <br/>\n  - Consider FSx for ONTAP for applications\
      \ needing advanced data management features\n  <br/>\n  - Implement appropriate\
      \ backup retention policies for each file system type\n</text-box>"
