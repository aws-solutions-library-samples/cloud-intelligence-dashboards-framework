    \ ':GP2-Storage')> 0, 'RDS gp2 Storage',\n\t{product_code} = 'AmazonRDS' and locate({usage_type},\
    \ ':GP3-Storage')> 0, 'RDS gp3 Storage',\n\t{product_code} = 'AmazonRDS' and locate({usage_type},\
    \ ':PIOPS-Storage')> 0, 'RDS io1 Storage',\n\t{product_code} = 'AmazonRDS' and\
    \ locate({usage_type}, ':PIOPS-Storage-IO2')> 0, 'RDS io2 Storage',\n\t{product_code}\
    \ = 'AmazonRDS' and locate({usage_type}, ':PIOPS')> 0,'RDS IO1 PIOPS',\n\t{product_code}\
    \ = 'AmazonRDS' and locate({usage_type}, ':IO2-PIOPS')> 0,'RDS IO2 PIOPS',\n\t\
    {product_code} = 'AmazonRDS' and locate({usage_type}, ':GP3-PIOPS')> 0,'RDS gp3\
    \ PIOPS',\n    {product_code} = 'AmazonRDS' and locate({usage_type}, 'GP3-Throughput')>\
    \ 0, 'RDS gp3 Provisioned Throughput',\n\t//mmulti-az\n\t{product_code} = 'AmazonRDS'\
    \ and (locate({usage_type}, 'Multi-AZ-StorageUsage') > 0 or locate({usage_type},\
    \ 'Mirror-StorageUsage') >0 ), 'RDS Multi-AZ Magnetic Storage',\n\t{product_code}\
    \ = 'AmazonRDS' and (locate({usage_type}, 'Multi-AZ-GP2-Storage') > 0 or locate({usage_type},\
    \ 'Mirror-GP2-Storage') >0 ), 'RDS Multi-AZ gp2 Storage',\n    {product_code}\
    \ = 'AmazonRDS' and (locate({usage_type}, 'Multi-AZ-GP3-Storage') > 0 or locate({usage_type},\
    \ 'Mirror-GP3-Storage') > 0 ), 'Multi-AZ RDS gp3 Storage',\n\t{product_code} =\
    \ 'AmazonRDS' and (locate({usage_type}, 'Multi-AZ-PIOPS-Storage') > 0 or locate({usage_type},\
    \ 'Mirror-PIOPS-Storage') > 0 ), 'Multi-AZ RDS io1 Storage',\n\t{product_code}\
    \ = 'AmazonRDS' and (locate({usage_type}, 'Multi-AZ-PIOPS-Storage-IO2') > 0 or\
    \ locate({usage_type}, 'Mirror-PIOPS-Storage-IO2') > 0 ), 'Multi-AZ RDS io2 Storage',\n\
    \    {product_code} = 'AmazonRDS' and locate({usage_type}, 'Multi-AZCluster-GP3-Storage')\
    \ > 0 , 'Multi-AZCluster RDS gp3 Storage',\n\t{product_code} = 'AmazonRDS' and\
    \ locate({usage_type}, 'Multi-AZCluster-PIOPS-Storage') > 0 , 'Multi-AZCluster\
    \ RDS io1 Storage',\n\t{product_code} = 'AmazonRDS' and locate({usage_type}, 'Multi-AZCluster-PIOPS-Storage-IO2')\
    \ > 0 , 'Multi-AZCluster RDS io2 Storage',\n\t{product_code} = 'AmazonRDS' and\
    \ (locate({usage_type}, 'Multi-AZ-GP3-PIOPS')> 0 or locate({usage_type}, 'Mirror-GP3-PIOPS')\
    \ > 0 ), 'Multi-AZ RDS gp3 Provisioned IOPS',\n\t{product_code} = 'AmazonRDS'\
    \ and (locate({usage_type}, 'Multi-AZ-PIOPS') > 0 or locate({usage_type}, 'Mirror-PIOPS')\
    \ > 0 ), 'Multi-AZ RDS io1 PIOPS',\n\t{product_code} = 'AmazonRDS' and (locate({usage_type},\
    \ 'Multi-AZ-IO2-PIOPS') > 0 or locate({usage_type}, 'Mirror-IO2-PIOPS') > 0 ),\
    \ 'Multi-AZ RDS io2 PIOPS',\n\t{product_code} = 'AmazonRDS' and locate({usage_type},\
    \ 'Multi-AZCluster-GP3-PIOPS') > 0 , 'Multi-AZCluster RDS gp3 PIOPS',\n\t{product_code}\
    \ = 'AmazonRDS' and locate({usage_type}, 'Multi-AZCluster-PIOPS') > 0 , 'Multi-AZCluster\
    \ RDS io1 PIOPS',\n\t{product_code} = 'AmazonRDS' and locate({usage_type}, 'Multi-AZCluster-IO2-PIOPS')\
    \ > 0 , 'Multi-AZCluster RDS io2 PIOPS',\n    {product_code} = 'AmazonRDS' and\
    \ (locate({usage_type}, 'Multi-AZ-GP3-Throughput')> 0 or locate({usage_type},\
    \ 'Mirror-GP3-Throughput') > 0 ), 'Multi-AZ RDS gp3 Provisioned Throughput',\n\
    \t{product_code} = 'AmazonRDS' and locate({usage_type}, 'Multi-AZCluster-GP3-Throughput')\
    \ > 0 , 'Multi-AZCluster RDS gp3 Throughput',\n    {product_code} = 'AmazonRDS'\
    \ and locate({usage_type}, 'Aurora:IO-OptimizedStorageUsage')> 0, 'Aurora I/O\
    \ Optimized Storage',\n\t{product_code} = 'AmazonRDS' and locate({usage_type},\
    \ 'Aurora:BackupUsage')> 0, 'Aurora Snapshots',\n\t{product_code} = 'AmazonRDS'\
    \ and locate({usage_type}, 'Aurora:StorageUsage')> 0, 'Aurora Storage',\n\t{product_code}\
    \ = 'AmazonRDS' and locate({usage_type}, 'RDS:ChargedBackupUsage')> 0, 'RDS Snapshots',\n\
    \tconcat('Other: ', {UsageType Short})\n    )"
