  SheetId: fb39632b-0bf1-4680-b63a-1f7c9e30853e
  TextBoxes:
  - Content: "<text-box>\n  <block align=\"center\"/>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#60cdb3\">\n        <b>$/GB (Storage Unit\
      \ Cost)</b>\n      </inline>\n      <b>\_i</b>\n      ndicates how much you're\
      \ paying per gigabyte of provisioned storage. Helps identify if you're overprovisioning\
      \ or using expensive storage types like io1 or gp2.\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#60cdb3\">\n        <b>$/IOPS (IO Cost\
      \ Efficiency)</b>\n      </inline>\n      <b>\_r</b>\n      eflects how much\
      \ you're paying for each unit of provisioned IOPS. High values suggest overprovisioning\
      \ or underutilized IOPS capacity.\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\">\n        <b>Multi-AZ Storage Cost</b>\n\
      \      </inline>\n      <b>\_</b>\n      shows the additional cost incurred\
      \ from enabling Multi-AZ deployments. Useful for evaluating whether the added\
      \ cost aligns with your availability requirements\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#60cdb3\">\n        <b>Backup Cost</b>\n\
      \      </inline>\n      <b>\_</b>\n      measures how much you're spending on\
      \ automated backups, snapshots, and archived transaction logs. High or increasing\
      \ backup costs may indicate excessive retention or unused snapshots.\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      Use\n      <inline color=\"#60cdb3\"\
      >\n        <b>General Purpose (gp3)</b>\n      </inline>\n      \_volumes over\
      \ gp2 for cheaper baseline and configurable IOPS\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: e1018889-c903-4d40-ba41-49cc2ce47a94
