AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            OptimizedViewPortWidth: 1600px
            ResizeOption: FIXED
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: summary_view
  Expression: '{account_name}'
  Name: Account
- DataSetIdentifier: summary_view
  Expression: '{Cost_Amortized}'
  Name: Cost
- DataSetIdentifier: summary_view
  Expression: '{amortized_cost}'
  Name: Cost_Amortized
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    {product_code} = 'AmazonRDS', {instance_type},
    {product_code} = 'AmazonRedshift', {instance_type},
    {product_code} ='AmazoNMemoryDB', {instance_type},
    {product_code} = 'AmazonES', {instance_type},
    {product_code} = 'AmazonNeptune', {instance_type},
    {product_code} = 'AmazonElastiCache', {instance_type},
    {product_code} = 'AmazonDocDB', {instance_type},
    {instance_type}
    )
  Name: DB Instance Type
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
        {product_code} = 'AmazonRDS', {database_engine},
        {product_code} = 'AmazonElastiCache' and split(operation,':',2)='0001','ElastiCache Memcached',
        {product_code} = 'AmazonElastiCache' and split(operation,':',2)='0002','ElastiCache Redis',
        {product_code} = "AmazonDocDB", 'DocumentDB',
        {product_code} = "AmazonRedshift", 'Redshift',
        {product_code} = "AmazonES", 'OpenSearch',
        {product_code} = "AmazonNeptune", 'Neptune',
        {product_code} = "AmazonMemoryDB", 'MemoryDB for Redis',
        ''
     )
  Name: Database Engine
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
        {product_code} = "AmazonRDS", split({instance_type},'.',2),
        {product_code} = "AmazonDocDB", split({instance_type},'.',2),
        {product_code} = "AmazonNeptune", split({instance_type},'.',2),
        {product_code} = "AmazonRedshift", split({instance_type},'.',1),
        {product_code} = "AmazonElastiCache", split({instance_type},'.',2),
        {product_code} = "AmazonMemoryDB", split({instance_type},'.',2),
        {product_code} = "AmazonES", split({instance_type},'.',1),
        "Other"
    )
  Name: Databases Instance Family
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse
    (
        locate({usage_type},'DataTransfer-Out-Bytes')>0, "Data Transfer",
        (locate(operation,'PayPerRequest')>0 and contains({usage_type}, 'ReadRequestUnits')), "OnDemand Throughput - ReadRequests",
        (locate(operation,'PayPerRequest')>0 and contains({usage_type}, 'WriteRequestUnits')), "OnDemand Throughput - WriteRequests",
        locate({purchase_option},'Reserved')>0, "Reserved",
        (locate(operation,'CommittedThroughput')>0 and contains({usage_type}, 'ReadCapacityUnit')), "Commited Throughput - ReadCapacity Unit  ",
        (locate(operation,'CommittedThroughput')>0 and contains({usage_type}, 'WriteCapacityUnit-Hrs')), "Commited Throughput - WriteCapacity Unit",
        locate(operation,'BackupStorage')>0, "Backup & PITR Storage",
        (locate(operation,'StandardStorage')>0 and contains({usage_type}, 'TimedStorage')), "Standard Storage",
        (locate(operation,'StandardStorage')>0 and contains({usage_type}, 'IATimedStorage')), "Infrequent Access Storage",
        locate(operation,'GetRecords')>0, "Streams",
        operation
    )
  Name: DynamoDBChargeType
- DataSetIdentifier: summary_view
  Expression: |2-

    ifelse(
    (contains({usage_type}, 'VolumeUsage') or contains({usage_type}, 'VolumeUsage.st1') or contains({usage_type}, 'VolumeUsage.sc1')
     or contains({usage_type}, 'VolumeUsage.gp2') or contains({usage_type}, 'VolumeUsage.gp3') or contains({usage_type}, 'VolumeUsage.piops') or contains({usage_type}, '%VolumeUsage.io2%')) , 'EBS Storage',
    (contains({usage_type}, 'VolumeIOUsage') or contains({usage_type}, 'VolumeP-IOPS.gp3') or contains({usage_type}, 'VolumeP-IOPS.piops') or contains({usage_type}, 'VolumeP-IOPS.io2') ) , 'EBS Provisioned IOPS',
    (contains({usage_type}, 'VolumeP-Throughput.gp3')) , 'EBS Throughput',
    (contains({usage_type}, 'SnapshotArchiveStorage') or contains({usage_type}, 'SnapshotUsage') or contains({usage_type}, 'FastSnapshotRestore') or contains({usage_type}, 'directAPI') ), 'EBS Snapshots',
    {UsageType Short} )
  Name: EBSChargeType
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(split({usage_type},':',2) = 'VolumeUsage','Magnetic',
           split({usage_type},':',2) = 'VolumeIOUsage','Magnetic IO',
           split({usage_type},':',2) = 'VolumeUsage.st1','Throughput Optimized HDD (st1)',
           split({usage_type},':',2) = 'VolumeUsage.sc1','Cold HDD (sc1)',
           split({usage_type},':',2) = 'VolumeUsage.gp2','EBS General Purpose SSD (gp2)',
           split({usage_type},':',2) = 'VolumeUsage.gp3','EBS GP3',
           split({usage_type},':',2) = 'VolumeP-Throughput.gp3','GP3 Throughput',
           split({usage_type},':',2) = 'VolumeP-IOPS.gp3','GP3 IOPS',
           split({usage_type},':',2) = 'VolumeUsage.piops','EBS Provisioned IOPS SSD (io1)',
           split({usage_type},':',2) = 'VolumeP-IOPS.piops','io1 IOPS',
           split({usage_type},':',2) = 'VolumeP-IOPS.io2','io2 IOPS',
           split({usage_type},':',2) = 'VolumeUsage.io2',' EBS io2',
           split({usage_type},':',2) = 'SnapshotArchiveStorage','SnapshotArchiveStorage',
           split({usage_type},':',2) = 'SnapshotUsage',' SnapshotUsage',
           split({usage_type},':',2) = 'FastSnapshotRestore','FastSnapshotRestore',
           split({usage_type},':',2) = 'directAPI','directAPI',
           split({usage_type},':',2))
  Name: EBSPricing
- DataSetIdentifier: summary_view
  Expression: '(sum({ri_sp_spot_covered_usage}) / sum({usage_quantity}) ) '
  Name: EC2_Covereged_Usage
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    ({product_storage_class} = 'General Purpose' and contains({usage_type}, 'TimedStorage-ByteHrs')), 'Standard [Storage]',
    ({product_storage_class} = 'Infrequent Access' and contains({usage_type}, 'IATimedStorage')), 'Infrequent Access [Storage]',
    ({product_storage_class} = 'Infrequent Access' and contains({usage_type}, 'IADataAccess-Bytes')), 'Infrequent Access Reads and Writes',
    ({product_storage_class} = 'EFS Storage' and contains({usage_type}, 'ETDataAccess-Bytes')), 'Ralstic Throughput Reads and Writes',
    ({product_storage_class} = 'One Zone-General Purpose' and contains({usage_type}, 'TimedStorage-Z-ByteHrs')), 'One Zone-General Purpose [Storage]',
    ({product_storage_class} = 'One Zone-Infrequent Access' and contains({usage_type}, 'IATimedStorage-Z-ByteHrs')), 'One Zone-Infrequent Access [Storage]',
    ({product_storage_class} = 'Infrequent Access-ET' and contains({usage_type}, 'IATimedStorage-ET-ByteHrs')), 'Infrequent Access with Elastic Throughput [Storage]',
    ({product_storage_class} = 'Infrequent Access-SmallFiles' and contains({usage_type}, 'IATimedStorage-SmallFiles')), 'Infrequent Access usage from small file(<128KB) [Overhead]',
    ({product_storage_class} = 'Infrequent Access-OneZone-SmallFiles' and contains({usage_type}, 'IATimedStorage-Z-SmallFiles')), 'Infrequent Access(OneZone) usage from Small files [Overhead]',
    ({product_storage_class} = 'Infrequent Access-ET-SmallFiles' and contains({usage_type}, 'IATimedStorage-ET-SmallFiles')), 'Infrequent Access usage from small file (<128KN) with Elastic Throughput [Overhead]',
    ({product_storage_class} = 'Archive-SmallFiles' and contains({usage_type}, 'ArchiveTimedStorage-SmallFiles')), 'Archive usage from small files (<128KB) [Overhead]',
    ({product_storage_class} = 'Archive-EarlyDelete-SmallFiles' and contains({usage_type}, 'ArchiveEarlyDelete-SmallFiles')), ' Archive-EarlyDelete-SmallFiles Storage',
    ({product_storage_class} = 'Archive' and contains({usage_type}, 'ArchiveTimedStorage')), 'Archive [Storage]',
    ({product_storage_class} = 'Archive' and contains({usage_type}, 'ArchiveDataAccess-Bytes')), 'Archive Reads and Writes',
    contains({usage_type}, 'ProvisionedTP-MiBpsHrs'), 'Provisioned Throughput',
    {UsageType Short}
    )
  Name: EFS_Storage_Class
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    {product_operation} = 'CreateFileSystem:Lustre', 'FS Lustre',
    {product_operation} = 'CreateFileSystem:Windows','FS Windows',
    {product_operation} = 'CreateFileSystem:ONTAP','FS ONTAP',
    {product_operation} = 'CreateFileSystem:OpenZFS','FS OpenZFS',
    'other'
    )
  Name: FSX_File_System_Type
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
      //Lustre
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.HDD.12'), 'Lustre persistent HDD storage with 12 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.500'), 'Lustre persistent SSD storage with 500 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.HDD.40'), 'Lustre persistent HDD storage with 40 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.250'), 'Lustre persistent SSD storage with 250 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.50'), 'Lustre persistent storage with 50 MB/s per T',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.HDD.40.RC20'), 'Lustre persistent HDD storage with 40 MB/s per TiB with SSD cache',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.200'), 'Lustre persistent storage with 200 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.100'), 'Lustre persistent storage with 100 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.HDD.12.RC20'), 'Lustre persistent HDD storage with 12 MB/s per TiB with SSD cache',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.1000'), 'Lustre persistent SSD storage with 1000 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.SSD.125'), 'Lustre persistent SSD storage with 125 MB/s per TiB',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'BackupUsage'), 'Lustre Backup Storage',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.P2:INT_AIA'), 'Lustre Intelligent-Tiering - Archive Instant Access',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.P2:INT_IA'), 'Lustre Intelligent-Tiering - Infrequent Access',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.P2:INT_FA'), 'Lustre Intelligent-Tiering - Frequent Access',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.P2:INT_SSDCache'), 'Lustre Intelligent-Tiering provisioned SSD read cache',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'Storage.P2:INT_Monitoring'), 'Lustre Intelligent-Tiering storage for monitoring and automation',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'ThroughputCapacity.P2'), 'Lustre Intelligent-Tiering provisioned throughput',
      {product_operation} = 'CreateFileSystem:Lustre' and contains({UsageType Short}, 'MetadataIOPS'), 'Lustre Metadata IOPS',
      //ONTAP
       {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'BackupUsage'), 'ONTAP backup storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'MAZ:CPoolStd'), 'ONTAP Multi-AZ standard capacity pool storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'MAZ_2N:CPoolStd'), 'ONTAP Multi-AZ 2-node standard capacity pool storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'SAZ:CPoolStd'), 'ONTAP Single-AZ standard capacity pool storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'SAZ_2N:CPoolStd'), 'ONTAP Single-AZ 2-node standard capacity pool storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'MAZ2:SSD'), 'ONTAP Multi-AZ 2-node SSD storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'MAZ:SSD'), 'ONTAP Multi-AZ SSD storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'SAZ_2N:SSD'), 'ONTAP Single-AZ 2-node SSD storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'SAZ_2N2:SSD'), 'ONTAP Single-AZ 2-node Gen 2 SSD storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'SAZ:SSD'), 'ONTAP Single-AZ SSD storage',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ThroughputCapacity.MAZ'), 'ONTAP Multi-AZ throughput capacity',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ThroughputCapacity.SAZ_2N'), 'ONTAP Single-AZ 2-node throughput capacity',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ThroughputCapacity.SAZ_2N2'), 'ONTAP Single-AZ 2-node Gen 2 throughput capacity',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ThroughputCapacity.MAZ2'), 'ONTAP Multi-AZ 2-node throughput capacity',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ProvisionedSSDIOPS.MAZ'), 'ONTAP Multi-AZ SSD IOPS',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ProvisionedSSDIOPS.MAZ2'), 'ONTAP Multi-AZ 2-node SSD IOPS',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ_2N'), 'ONTAP Single-AZ 2-node SSD IOPS',
      {product_operation} = 'CreateFileSystem:ONTAP' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ_2N2'), 'ONTAP Single-AZ 2-node Gen 2 SSD IOPS',
      //Windows
       {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'Storage'), 'FS Windows Storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'Storage.MultiAZ:HDD'), 'FS Windows MultiAZ HDD storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'Storage.MultiAZ:SSD'), 'FS Windows MultiAZ SSD Storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'Storage:HDD'), 'FS Windows HDD Storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'BackupUsage'), 'FS Windows Backup Storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'BackupUsage.MultiAZ'), 'FS Windows MultiAZ Backup Storage',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'ThroughputCapacity.MultiAZ'), 'Windows Provisioned Throughput MultiAZ',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'ThroughputCapacity'), 'FS Windows Provisioned Throughput',
      {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'ProvisionedSSDIOPS'), 'FS Windows Provisioned IOPS',
       {product_operation} = 'CreateFileSystem:Windows' and contains({UsageType Short}, 'ProvisionedSSDIOPS.MultiAZ'), 'FS Windows Provisioned IOPS MultiAZ',
      //OpenZFS
       {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.SAZ:SSD'), 'OpenZFS Single-AZ SSD storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.SAZ2:SSD'), 'OpenZFS Single-AZ SSD storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:SSD'), 'OpenZFS Multi-AZ SSD storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.SAZ_HA2:SSD'), 'OpenZFS Single-AZ (HA) SSD storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.SAZ_HA:SSD'), 'OpenZFS Single-AZ (HA) SSD storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:INT_FA'), 'OpenZFS  Intelligent-Tiering storage - Frequent Access tier',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:INT_IA'), 'OpenZFS Intelligent-Tiering storage - Infrequent Access tier',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:INT_SSDCache'), 'OpenZFS Intelligent-Tiering Multi-AZ provisioned SSD read cache',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:INT_Monitoring'), 'OpenZFS  Intelligent-Tiering storage for monitoring and automation',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'Storage.MAZ:INT_AIA'), 'OpenZFS Intelligent-Tiering storage - Archive Instant Access tier',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ThroughputCapacity.SAZ'), 'OpenZFS Single-AZ throughput',
      //{product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ThroughputCapacity.SAZ2'), 'OpenZFS Single-AZ throughput',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ThroughputCapacity.SAZ_HA'), 'OpenZFS Single-AZ (HA) throughput',
      //{product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ThroughputCapacity.SAZ_HA2'), 'OpenZFS Single-AZ (HA) throughput',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ThroughputCapacity.MAZ'), 'OpenZFS  Multi-AZ throughput',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ'), 'OpenZFS Single-AZ SSD IOPS',
      //product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ2'), 'OpenZFS Single-AZ SSD IOPS',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ_HA'), 'OpenZFS Single-AZ (HA) SSD IOPS',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ProvisionedSSDIOPS.SAZ_HA2'), 'OpenZFS Single-AZ (HA) SSD IOPS',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'ProvisionedSSDIOPS.MAZ'), 'OpenZFS Multi-AZ SSD IOPS',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'BackupUsage'), 'FS OpenZFS Backup Storage',
      {product_operation} = 'CreateFileSystem:OpenZFS' and contains({UsageType Short}, 'BackupUsage.MultiAZ'), 'FS OpenZFS MultiAZ Backup Storage',
      {UsageType Short}
    )
  Name: FSx_by_UsageType
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    in({product_code}, ['AmazonElastiCache','AmazonRDS','AmazonDocDB','AmazonNeptune','AmazonMemoryDB']),
    split({instance_type},'.',3),
    split({instance_type},'.',2)
    )
  Name: Instance Size
- DataSetIdentifier: summary_view
  Expression: locate({usage_type},'Multi-AZ')>0 OR locate({usage_type},'MirrorUsage')>0
  Name: Multi-AZ
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    locate({usage_type},'Multi-AZClusterUsage') > 0, 3,
    {Multi-AZ} = 1, 2,
    1
    )
  Name: Multi-AZ index
- DataSetIdentifier: summary_view
  Expression: |2-

    coalesce(
        parseInt(replace({Instance Size},'xlarge','')) * 8,
        ifelse(
            {Instance Size} = 'xlarge', 8,
            {Instance Size} = 'large', 4,
            {Instance Size} = 'medium', 2,
            {Instance Size} = 'small', 1,
            {Instance Size} = 'micro', 0.5,
            {Instance Size} = 'nano', 0.25,
            {instance_type_family} = 'a1',32,
            {instance_type_family} = 'c5', ifelse({Instance Size} = 'metal', 192, 144),
            {instance_type_family} = 'c5d', ifelse({Instance Size} = 'metal', 192, 144),
            {instance_type_family} = 'c5n',144,
            {instance_type_family} = 'c6a',384,
            {instance_type_family} = 'c6g',128,
            {instance_type_family} = 'c6gd',128,
            {instance_type_family} = 'c6i',256,
            {instance_type_family} = 'c6id',256,
            {instance_type_family} = 'c6in',256,
            {instance_type_family} = 'c7a',384,
            {instance_type_family} = 'c7g',128,
            {instance_type_family} = 'c7i',192,
            {instance_type_family} = 'c7i',384,
            {instance_type_family} = 'g4dn',192,
            {instance_type_family} = 'g5g',128,
            {instance_type_family} = 'i3',144,
            {instance_type_family} = 'i3en',192,
            {instance_type_family} = 'i4i',256,
            {instance_type_family} = 'm5',192,
            {instance_type_family} = 'm5d',192,
            {instance_type_family} = 'm5dn',192,
            {instance_type_family} = 'm5n',192,
            {instance_type_family} = 'm5zn',96,
            {instance_type_family} = 'm6a',384,
            {instance_type_family} = 'm6g',128,
            {instance_type_family} = 'm6gd',128,
            {instance_type_family} = 'm6i',256,
            {instance_type_family} = 'm6id',256,
            {instance_type_family} = 'm6idn',256,
            {instance_type_family} = 'm6in',256,
            {instance_type_family} = 'm7a',384,
            {instance_type_family} = 'm7g',128,
            {instance_type_family} = 'm7i',192,
            {instance_type_family} = 'm7i',384,
            {instance_type_family} = 'mac1',24,
            {instance_type_family} = 'mac2-m2',24,
            {instance_type_family} = 'mac2',24,
            {instance_type_family} = 'r5',192,
            {instance_type_family} = 'r5b',192,
            {instance_type_family} = 'r5d',192,
            {instance_type_family} = 'r5dn',192,
            {instance_type_family} = 'r5n',192,
            {instance_type_family} = 'r6a',384,
            {instance_type_family} = 'r6g',128,
            {instance_type_family} = 'r6gd',128,
            {instance_type_family} = 'r6i',256,
            {instance_type_family} = 'r6id',256,
            {instance_type_family} = 'r6idn',256,
            {instance_type_family} = 'r6in',256,
            {instance_type_family} = 'r7a',384,
            {instance_type_family} = 'r7g',128,
            {instance_type_family} = 'r7i',192,
            {instance_type_family} = 'r7i',384,
            {instance_type_family} = 'r7iz',128,
            {instance_type_family} = 'r7iz',256,
            {instance_type_family} = 'u-12tb1',896,
            {instance_type_family} = 'u-18tb1',896,
            {instance_type_family} = 'u-24tb1',896,
            {instance_type_family} = 'u-6tb1',896,
            {instance_type_family} = 'u-9tb1',896,
            {instance_type_family} = 'x2gd',128,
            {instance_type_family} = 'x2idn',256,
            {instance_type_family} = 'x2iedn',256,
            {instance_type_family} = 'x2iezn',96,
            {instance_type_family} = 'z1d',96,
            0
        )
    )
  Name: Normalization Factor
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    {product_code} = 'AmazonRDS',
    {usage_quantity}*{Normalization Factor}*{Multi-AZ index},
    {usage_quantity}*{Normalization Factor}
    )
  Name: Normalized Hours
- DataSetIdentifier: summary_view
  Expression: "sum (ifelse ({purchase_option} = 'OnDemand', {Usage Amount Display},\
    \ 0))/  sum({Usage Amount Display})\r\n"
  Name: OnDemand
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    ({product_code} = 'AmazonRDS' OR {product_code} = 'AmazonEC2') AND locate(processor,'Intel') > 0, 'Intel',
    ({product_code} = 'AmazonRDS' OR {product_code} = 'AmazonEC2') AND locate(processor,'AMD') > 0, 'AMD',
    ({product_code} = 'AmazonRDS' OR {product_code} = 'AmazonEC2') AND locate(processor,'Graviton') > 0, 'Graviton',
    ({product_code} = 'AmazonRDS' OR {product_code} = 'AmazonEC2') AND locate(processor,'Apple') > 0, 'Apple',
    ({product_code} = 'AmazonRDS' OR {product_code} = 'AmazonEC2') AND processor = '', 'Intel',
    ({product_code} = 'AmazonDocDB' OR {product_code} = 'AmazonES' OR {product_code} = 'AmazonElastiCache' OR {product_code} = 'AmazonNeptune' OR {product_code} = 'AmazonMemoryDB') AND locate({Databases Instance Family},'a')>0,'AMD',
