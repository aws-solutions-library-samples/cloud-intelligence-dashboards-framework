- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
        // ============ STANDARD STORAGE ============
        operation = 'StandardStorage', 'Standard',
        contains({usage_type}, 'Requests-Tier1') AND contains({usage_type}, 'Standard'), 'Standard',
        contains({usage_type}, 'Requests-Tier2') AND contains({usage_type}, 'Standard'), 'Standard',
        // ============ INTELLIGENT-TIERING ============
        operation = 'IntelligentTieringFAStorage', 'Intelligent-Tiering',
        operation = 'IntelligentTieringIAStorage', 'Intelligent-Tiering',
        operation = 'IntelligentTieringAAStorage', 'Intelligent-Tiering',
        operation = 'IntelligentTieringAIAStorage', 'Intelligent-Tiering',
        operation = 'IntelligentTieringDAAStorage', 'Intelligent-Tiering',
        operation = 'IntelligentTieringStorage', 'Intelligent-Tiering',
        contains({usage_type}, 'Requests-INT'), 'Intelligent-Tiering',
        contains({usage_type}, 'Retrieval-INT'), 'Intelligent-Tiering',
        operation = 'S3-INTTransition', 'Intelligent-Tiering',
        operation = 'IntAAObjectOverhead', 'Intelligent-Tiering',
        operation = 'IntAAS3ObjectOverhead', 'Intelligent-Tiering',
        operation = 'IntDAAObjectOverhead', 'Intelligent-Tiering',
        operation = 'IntDAAS3ObjectOverhead', 'Intelligent-Tiering',
        (contains({usage_type}, 'Requests-Tier4') and contains(operation, 'INTTransition')),'Intelligent-Tiering',
        // ============ STANDARD-IA ============
        operation = 'StandardIAStorage', 'Standard-IA',
        operation = 'StandardIASizeOverhead', 'Standard-IA',
        contains({usage_type}, 'Requests-SIA'), 'Standard-IA',
        contains({usage_type}, 'Retrieval-SIA'), 'Standard-IA',
        operation = 'S3-SIATransition', 'Standard-IA',
        contains({usage_type}, 'EarlyDelete-SIA'), 'Standard-IA',
       (contains({usage_type}, 'Requests-Tier4') and contains(operation, 'SIATransition')),'Standard IA',
        // ============ ONE ZONE-IA ============
        operation = 'OneZoneIAStorage', 'One Zone-IA',
        operation = 'OneZoneIASizeOverhead', 'One Zone-IA',
        contains({usage_type}, 'Requests-ZIA'), 'One Zone-IA',
        contains({usage_type}, 'Retrieval-ZIA'), 'One Zone-IA',
        operation = 'S3-ZIATransition', 'One Zone-IA',
        contains({usage_type}, 'EarlyDelete-ZIA'), 'One Zone-IA',
        (contains({usage_type}, 'Requests-Tier4') and contains(operation, 'ZIATransition')),'One Zone IA',
        // ============ GLACIER INSTANT RETRIEVAL ============
        operation = 'GlacierInstantRetrievalStorage', 'Glacier Instant Retrieval',
        operation = 'GlacierInstantRetrievalSizeOverhead', 'Glacier Instant Retrieval',
        contains({usage_type}, 'Requests-GIR'), 'Glacier Instant Retrieval',
        contains({usage_type}, 'Retrieval-GIR'), 'Glacier Instant Retrieval',
        contains({usage_type}, 'EarlyDelete-GIR'), 'Glacier Instant Retrieval',
        (contains({usage_type}, 'Requests-Tier4') and contains(operation, 'GIRTransition')), 'Glacier Instant Retrieval',
        // ============ GLACIER FLEXIBLE RETRIEVAL ============
        operation = 'GlacierStorage', 'Glacier Flexible Retrieval',
        operation = 'GlacierStagingStorage', 'Glacier Flexible Retrieval',
        operation = 'GlacierObjectOverhead', 'Glacier Flexible Retrieval',
        operation = 'GlacierS3ObjectOverhead', 'Glacier Flexible Retrieval',
        contains({usage_type}, 'Requests-Tier5'), 'Glacier Flexible Retrieval',
        contains({usage_type}, 'Requests-Tier6'), 'Glacier Flexible Retrieval',
        (contains({usage_type}, 'Retrieval-Bytes') AND operation = 'RestoreObject'), 'Glacier Flexible Retrieval',
        contains({usage_type}, 'Expedited'), 'Glacier Flexible Retrieval',
        contains({usage_type}, 'Bulk'), 'Glacier Flexible Retrieval',
        (contains({usage_type}, 'Requests-Tier3') and operation = 'S3-GlacierTransition'), 'Glacier Flexible Retrieval',
        contains({usage_type}, 'EarlyDelete-ByteHrs'), 'Glacier Flexible Retrieval',
        // ============ GLACIER DEEP ARCHIVE ============
        operation = 'DeepArchiveStorage', 'Glacier Deep Archive',
        operation = 'DeepArchiveStagingStorage', 'Glacier Deep Archive',
        operation = 'DeepArchiveObjectOverhead', 'Glacier Deep Archive',
        operation = 'DeepArchiveS3ObjectOverhead', 'Glacier Deep Archive',
        contains({usage_type}, 'Requests-GDA'), 'Glacier Deep Archive',
        operation = 'DeepArchiveRestoreObject', 'Glacier Deep Archive',
        contains({usage_type}, 'EarlyDelete-GDA'), 'Glacier Deep Archive',
        contains({usage_type}, 'Bulk'), 'Glacier Deep Archive',
        (contains({usage_type}, 'Requests-Tier3') and contains(operation, 'GDATransition')), 'Glacier Deep Archive',
        // ============ REDUCED REDUNDANCY STORAGE ============
        operation = 'ReducedRedundancyStorage', 'Reduced Redundancy Storage',
       /* // Data Transfer (not storage-specific)
        contains({usage_type}, 'DataTransfer-Out-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'DataTransfer-In-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'AWS-In-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'AWS-Out-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'CloudFront-Out-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'CloudFront-In-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'DataXfer-In-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'DataXfer-Out-Bytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'AWS-In-ABytes'), 'Shared - Data Transfer',
        contains({usage_type}, 'AWS-Out-ABytes'), 'Shared - Data Transfer',
        contains({usage_type},'MRAP'), 'Data Transfer - Multi-Region Access Point',
        contains({usage_type}, 'S3RTC'), 'Data Transfer - Replication Time Control (RTC)',
     // ============ MONITORING & ANALYTICS ============
        operation = 'StorageLens', 'Monitoring - S3 Storage Lens',
        contains({usage_type}, 'StorageLens-OrgMetrics'), 'Monitoring - S3 Storage Lens Organization Metrics',
        contains({usage_type}, 'Inventory'), 'Monitoring - S3 Inventory',
        contains({usage_type}, 'StorageAnalytics'), 'Monitoring - S3 Storage Class Analysis',
        contains({usage_type}, 'TagStorage'), 'Monitoring - Object Tagging',
    // ============ MANAGEMENT & PROCESSING ============
        contains({usage_type}, 'Batchoperations-Jobs'), 'Management - S3 Batch Operations Jobs',
        contains({usage_type}, 'Batchoperations-Objects'), 'Management - S3 Batch Operations Objects',
        contains({usage_type}, 'Select-Returned'), 'Management - S3 Select Data Returned',
        contains({usage_type}, 'Select-Scanned'), 'Management - S3 Select Data Scanned',
        contains({usage_type}, 'Requests-Tier8'), 'Management - S3 Access Grants Requests',
     */
