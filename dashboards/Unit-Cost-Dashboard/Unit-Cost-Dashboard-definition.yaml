        contains({usage_type}, 'Requests-GIR'), 'Glacier Instant Retrieval Requests',
        contains({usage_type}, 'Requests-INT'), 'Intelligent-Tiering Requests',
     // ============ DATA RETRIEVAL CHARGES ============
        contains({usage_type}, 'Retrieval-SIA'), 'Standard-IA Data Retrieval',
        contains({usage_type}, 'Retrieval-ZIA'), 'One Zone-IA Data Retrieval',
        contains({usage_type}, 'Retrieval-GIR'), 'Glacier Instant Retrieval Data Retrieval',
        contains({usage_type}, 'Retrieval-INT'), 'Intelligent-Tiering Data Retrieval',
        (contains({usage_type}, 'Retrieval-Bytes') and operation = 'RestoreObject'), 'Glacier Flexible Retrieval',
        operation = 'DeepArchiveRestoreObject', 'Glacier Deep Archive Retrieval',
        contains({usage_type}, 'Expedited'), 'Glacier Expedited Retrieval',
        contains({usage_type}, 'Bulk'), 'Glacier Bulk Retrieval',
     // ============ MONITORING & ANALYTICS ============
        operation = 'IntelligentTieringStorage', 'Intelligent-Tiering Monitoring & Automation',
        operation = 'StorageLens', 'S3 Storage Lens',
        contains({usage_type}, 'StorageLens-OrgMetrics'), 'S3 Storage Lens Organization Metrics',
        contains({usage_type}, 'Inventory'), 'S3 Inventory',
        contains({usage_type}, 'StorageAnalytics'), 'S3 Storage Class Analysis',
        contains({usage_type}, 'TagStorage'), 'Object Tagging',
    // ============ DATA TRANSFER CHARGES ============
         contains({usage_type}, 'DataTransfer-Out-Bytes'), 'Data Transfer Out to Internet',
        contains({usage_type}, 'DataTransfer-In-Bytes'), 'Data Transfer In from Internet',
        contains({usage_type}, 'AWS-In-Bytes'), 'Data Transfer In from AWS',
        contains({usage_type}, 'AWS-Out-Bytes'), 'Data Transfer Out to AWS',
        contains({usage_type}, 'CloudFront-Out-Bytes'), 'Data Transfer Out to CloudFront',
        contains({usage_type}, 'CloudFront-In-Bytes'), 'Data Transfer In from CloudFront',
        contains({usage_type}, 'DataXfer-In-Bytes'), 'Direct Connect Data Transfer In',
        contains({usage_type}, 'DataXfer-Out-Bytes'), 'Direct Connect Data Transfer Out',
        contains({usage_type}, 'AWS-In-ABytes'), 'Accelerated Transfer In from AWS',
        contains({usage_type}, 'AWS-Out-ABytes'), 'Accelerated Transfer Out to AWS',
        contains({usage_type},'MRAP'),'Data Transfer - Multi-Region Access Point',
        contains({usage_type}, 'S3RTC'), 'Data transferred for S3 Replication Time Control (RTC)',
    // ============ MANAGEMENT & PROCESSING ============
        contains({usage_type}, 'Batchoperations-Jobs'), 'S3 Batch operations Jobs',
        contains({usage_type}, 'Batchoperations-Objects'), 'S3 Batch operations Objects',
        contains({usage_type}, 'Select-Returned'), 'S3 Select Data Returned',
        contains({usage_type}, 'Select-Scanned'), 'S3 Select Data Scanned',
        operation = 'S3-GlacierTransition', 'Transition to Glacier',
        operation = 'S3-SIATransition', 'Transition to Standard-IA',
        operation = 'S3-ZIATransition', 'Transition to One Zone-IA',
        operation = 'S3-INTTransition', 'Transition to Intelligent-Tiering',
        // ============ EARLY DELETE CHARGES ============
        contains({usage_type}, 'EarlyDelete-SIA'), 'Standard-IA Early Delete',
        contains({usage_type}, 'EarlyDelete-ZIA'), 'One Zone-IA Early Delete',
        contains({usage_type}, 'EarlyDelete-GIR'), 'Glacier Instant Retrieval Early Delete',
        contains({usage_type}, 'EarlyDelete-GDA'), 'Glacier Deep Archive Early Delete',
        contains({usage_type}, 'EarlyDelete-ByteHrs'), 'Glacier Flexible Retrieval Early Delete',
      {UsageType Short}
    )
  Name: S3_All_Charge_types
- DataSetIdentifier: summary_view
  Expression: sum(ifelse({purchase_option} = 'SavingsPlan', {Usage Amount Display},
    0)) / sum({Usage Amount Display})
  Name: SavingsPlan
- DataSetIdentifier: summary_view
  Expression: sum(ifelse({purchase_option} = 'Spot', {Usage Amount Display}, 0)) /
    sum({Usage Amount Display})
  Name: Spot
- DataSetIdentifier: summary_view
  Expression: |-
    sumIf(
        Cost,
        {product_code} = "AmazonS3" OR
        ( {product_code} = "AmazonEC2" and contains({usage_type} , "EBS:")) OR
        {product_code} = "AmazonEFS" OR
        {product_code} = "AmazonFSx"
    )
  Name: Storage_Total_Cost
- DataSetIdentifier: summary_view
  Expression: |-
    sum(
      ifelse(
        ({product_code} = "AmazonS3" AND {pricing_unit}= "GB-Mo")  OR
        ({product_code} = "AmazonEC2" AND ( contains({usage_type}, 'EBS:VolumeUsage') or contains({usage_type}, 'EBS:SnapshotUsage') )) OR
        ({product_code} = "AmazonEFS" AND contains({usage_type}, 'TimedStorage') ) OR
        ({product_code} = "AmazonFSx" AND (contains({usage_type}, 'Storage') or contains({usage_type}, 'BackupUsage')  ) ),
        {usage_quantity},
        0
      )
    )
  Name: Storage_Usage_GBMo
- DataSetIdentifier: summary_view
  Expression: sum(Cost) / sum({Usage Amount Display})
  Name: Unit Cost
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse({Storage_Usage_GBMo} = 0 , NULL,
    {Storage_Total_Cost}/{Storage_Usage_GBMo}
    )
  Name: Unit Cost Combined
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse({Storage_Usage_GBMo} = 0 , NULL,
    sum(Cost)/{Storage_Usage_GBMo}
    )
  Name: Unit Cost Combined - Copy 1
- DataSetIdentifier: summary_view
  Expression: sum(Cost)/ sum({Normalized Hours})
  Name: Unit Cost Normalized Hours
- DataSetIdentifier: summary_view
  Expression: "sum(Cost)/sum({usage_quantity}) \r\n"
  Name: Unit Cost by Usage Quantity
- DataSetIdentifier: summary_view
  Expression: sum(Cost) / sum({vCPU Hours})
  Name: Unit Cost by vCPU Hours
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    ${DisplayUsageIn} = 'Instance Hours', {usage_quantity},
    ${DisplayUsageIn} = 'Normalized Hours', {Normalized Hours},
    ${DisplayUsageIn} = 'vCPU Hours', {vCPU Hours},
    {usage_quantity}
    )
  Name: Usage Amount Display
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    locate({usage_type},'-') <= 5, substring({usage_type},locate({usage_type},'-')+1,strlen({usage_type})), // remove region in front
    {usage_type}
    )
  Name: UsageType Short
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    contains({pricing_unit}, 'GB'), 'Storage',
    contains({pricing_unit}, 'IOPS'), 'Provisioned IOPS',
    contains({pricing_unit}, 'MiBps'), 'Provisioned Throughput',
    {pricing_unit}
    )
  Name: UsageType_Category
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    ${UsageMeasure} = 'Quantity', {usage_quantity},
    ${UsageMeasure} = 'Cost', Cost,
    null
    )
  Name: Usage_Measure
- DataSetIdentifier: summary_view
  Expression: |-
    ifelse(
    {purchase_option} <> 'OnDemand' , {usage_quantity}, 0
    )
  Name: ri_sp_spot_covered_usage
- DataSetIdentifier: summary_view
  Expression: nullif({usage_quantity} * {product_vcpu}, 0)
  Name: vCPU Hours
- DataSetIdentifier: summary_view
  Expression: sum({vCPU Hours})
  Name: vCPU Total Hours
