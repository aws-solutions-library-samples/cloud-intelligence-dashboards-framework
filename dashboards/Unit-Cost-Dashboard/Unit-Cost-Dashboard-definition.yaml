  TextBoxes:
  - Content: |-
      <text-box>
        <ul>
          <li class="ql-indent-0">The overall compute unit cost is influenced by the proportion of EC2 usage across processor type, On-Demand, Reserved Instances, Savings Plans, and Spot Instances.</li>
        </ul>
        <br/>
        <br/>
        <ul>
          <li class="ql-indent-0">A well-optimized blend of these options can significantly reduce the effective cost per compute unit.</li>
        </ul>
      </text-box>
    SheetTextBoxId: 9dd43ad4-fb80-4f31-8794-1dcf0d83bfa7
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <block align=\"center\"/>\n  <br/>\n  <ul>\n    <li\
      \ class=\"ql-indent-0\">\n      <inline color=\"Accent\">\_</inline>\n     \
      \ <inline color=\"#60cdb3\">\n        <b>Cost per vCPU Hour increases while\
      \ Total Cost decreases\_</b>\n      </inline>\n      <inline color=\"Accent\"\
      >\n        <b>-\_</b>\n      </inline>\n      <inline color=\"Accent\">You are\
      \ consuming fewer vCPUs, but the cost per unit is higher.</inline>\n    </li>\n\
      \    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Action</b>\n\
      \      </inline>\n      <inline color=\"Accent\">: Investigate whether workloads\
      \ shifted to more expensive CPU families or whether SP/RI coverage dropped.\
      \ Re-align workloads with cost-efficient instance types and increase coverage.</inline>\n\
      \    </li>\n  </ul>\n  <br/>\n  <inline color=\"Accent\">\_</inline>\n  <br/>\n\
      \  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#60cdb3\">\n\
      \        <b>Cost per vCPU Hour decreases while Total Cost increases</b>\n  \
      \    </inline>\n      <inline color=\"Accent\">\n        <b>\_-\_</b>\n    \
      \  </inline>\n      <inline color=\"Accent\">You are scaling up compute capacity,\
      \ but the unit cost per vCPU is lower - showing strong efficiency.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action</b>\n      </inline>\n      <inline color=\"Accent\">: Validate\
      \ if this is due to migration to more cost-efficient instance families (e.g.,\
      \ Graviton or newer generations) or increased SP/RI coverage. If workloads keep\
      \ growing, increase commitments.</inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 219a3b07-2102-4ee8-8b1e-eea59d02b551
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n    \
      \  <inline color=\"#60cdb3\">\n        <b>Both Cost per Instance Hour and Total\
      \ Cost are increasing</b>\n      </inline>\n      <inline color=\"Accent\">\n\
      \        <b>\_-\_</b>\n      </inline>\n      <inline color=\"Accent\">You are\
      \ running more EC2 instances, and the average price per hour is higher.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action:</b>\n      </inline>\n      <inline color=\"Accent\">\_\
      Investigate if workloads shifted to larger or premium instance families, or\
      \ if SP/RI coverage decreased. If usage is On-Demand heavy, purchase Savings\
      \ Plans or Reserved Instances.</inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n\
      \  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#60cdb3\">\n\
      \        <b>Both Cost per Instance Hour and Total Cost are decreasing</b>\n\
      \      </inline>\n      <inline color=\"Accent\">\n        <b>\_-\_</b>\n  \
      \    </inline>\n      <inline color=\"Accent\">You are using fewer instances\
      \ at a lower effective hourly rate.</inline>\n    </li>\n    <li class=\"ql-indent-1\"\
      >\n      <inline color=\"Accent\">\n        <b>Action</b>\n      </inline>\n\
      \      <inline color=\"Accent\">: Confirm whether this is due to optimization\
      \ or workload scale-down. If usage remains lower, adjust RI/SP commitments to\
      \ avoid over-coverage.</inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 1b9bc8d3-c48e-4fe4-8613-3b6c0af62847
  - Content: "<text-box>\n  Amazon Elastic Compute Cloud Summary of Optimization mechanisms\n\
      \  <img src=\"https://d66mvi2kszsvt.cloudfront.net/resources/dashboard-visual-analytics/Compute%20Summary/header.png\"\
      \ width=\"11\"/>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"Accent\">\n        <b>\_</b>\n      </inline>\n     \
      \ <inline color=\"#acdff5\">\n        <b>\_</b>\n      </inline>\n      <inline\
      \ color=\"#60cdb3\">\n        <b>Instance Rightsizing</b>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>What Good Looks Like:\_</b>\n      </inline>\n      <inline color=\"\
      Accent\">EC2 Running Hours remain steady, but EC2 vCPU Hours decrease, indicating\
      \ smaller instance types are being used efficiently.</inline>\n    </li>\n \
      \   <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>What\
      \ Bad Looks Like:\_</b>\n      </inline>\n      <inline color=\"Accent\">EC2\
      \ Running Hours are high, but EC2 Costs are disproportionately increasing, average\
      \ instance size is increasing, and may indicate a risk of over-provisioned resources.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action:\_</b>\n      </inline>\n      <inline color=\"Accent\">Identify\
      \ underutilized or (and) idle instances and move workloads to smaller instance\
      \ types without performance impact.</inline>\n    </li>\n    <li class=\"ql-indent-1\"\
      >\n      <inline color=\"Accent\">\n        <b>Sources:\_</b>\n      </inline>\n\
      \      <inline color=\"Accent\">\n        <a href=\"https://aws.amazon.com/aws-cost-management/aws-cost-optimization/right-sizing/\"\
      \ target=\"_blank\">https://aws.amazon.com/aws-cost-management/aws-cost-optimization/right-sizing/</a>\n\
      \      </inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#60cdb3\">\n        <b>Modernization (Switching\
      \ Instance Families)</b>\n      </inline>\n    </li>\n    <li class=\"ql-indent-1\"\
      >\n      <inline color=\"Accent\">\n        <b>What Good Looks Like:\_</b>\n\
      \      </inline>\n      <inline color=\"Accent\">Cost per EC2-Instance Hour\
      \ decreases while performance remains stable, showing efficient instance family\
      \ selection.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n      <inline\
      \ color=\"Accent\">\n        <b>What Bad Looks Like:\_</b>\n      </inline>\n\
      \      <inline color=\"Accent\">Cost per vCPU Hour is high, but workloads with\
      \ high CPU utilization and low memory utilization are running on memory-optimized\
      \ or general purpose instances when they should be on compute-optimized ones.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action:\_</b>\n      </inline>\n      <inline color=\"Accent\">Analyze\
      \ workload needs and migrate to the right instance family to optimize costs.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Sources:\_</b>\n      </inline>\n      <inline color=\"Accent\"\
      >\n        <a href=\"https://aws.amazon.com/ec2/\" target=\"_blank\">https://aws.amazon.com/ec2/</a>\n\
      \      </inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#60cdb3\">\n        <b>Elasticity Autoscaling/\
      \ Instance Scheduling (Shutting Down Idle Instances)</b>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>What Good Looks Like:\_\_</b>\n      </inline>\n      <inline color=\"\
      Accent\">EC2 Running Hours decrease in off-peak times without impacting performance.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>What Bad Looks Like:\_</b>\n      </inline>\n      <inline color=\"\
      Accent\">Instances run On Demand 24/7 with no optimization, leading to unnecessary\
      \ costs.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n      <inline\
      \ color=\"Accent\">\n        <b>Action:\_</b>\n      </inline>\n      <inline\
      \ color=\"Accent\">Implement automation to shut down idle instances outside\
      \ working hours.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n     \
      \ <inline color=\"Accent\">\n        <b>Sources:\_</b>\n      </inline>\n  \
      \    <inline color=\"Accent\">\n        <a href=\"https://aws.amazon.com/autoscaling/\"\
      \ target=\"_self\">https://aws.amazon.com/autoscaling/</a>\n      </inline>\n\
      \      <inline color=\"Accent\">\_\_;\_</inline>\n      <inline color=\"Accent\"\
      >\n        <a href=\"https://aws.amazon.com/solutions/implementations/instance-scheduler-on-aws/\"\
      \ target=\"_self\">https://aws.amazon.com/solutions/implementations/instance-scheduler-on-aws/</a>\n\
      \      </inline>\n      <inline color=\"Accent\">\_</inline>\n    </li>\n  </ul>\n\
      \  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #60cdb3\">\n        <b>Savings Plans &amp; Reserved Instances (SP/RI</b>\n \
      \     </inline>\n      <inline color=\"#60cdb3\">)</inline>\n    </li>\n   \
      \ <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>What\
      \ Good Looks Like:\_\_</b>\n      </inline>\n      <inline color=\"Accent\"\
      >Cost per EC2-Instance Hour is consistently low, and a high percentage of workloads\
      \ are covered under SP/RI or Spot.</inline>\n    </li>\n    <li class=\"ql-indent-1\"\
      >\n      <inline color=\"Accent\">\n        <b>What Bad Looks Like:\_\_</b>\n\
      \      </inline>\n      <inline color=\"Accent\">EC2 Costs fluctuate unpredictably\
      \ due to reliance on On Demand pricing with low coverage of SP/RI or Spot.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action:\_\_</b>\n      </inline>\n      <inline color=\"Accent\"\
      >Commit to SP/RI for predictable workloads to lock in lower rates.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Sources:\_</b>\n      </inline>\n      <inline color=\"Accent\"\
      >\n        <a href=\"https://aws.amazon.com/savingsplans/\" target=\"_self\"\
      >https://aws.amazon.com/savingsplans/</a>\n      </inline>\n      <inline color=\"\
      Accent\">\_;\_</inline>\n      <inline color=\"Accent\">\n        <a href=\"\
      https://aws.amazon.com/ec2/pricing/reserved-instances/\" target=\"_self\">https://aws.amazon.com/ec2/pricing/reserved-instances/</a>\n\
      \      </inline>\n      <inline color=\"Accent\">\_</inline>\n    </li>\n  </ul>\n\
      \  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #60cdb3\">\n        <b>Spot instances</b>\n      </inline>\n    </li>\n    <li\
      \ class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>What Good\
      \ Looks Like:\_\_</b>\n      </inline>\n      <inline color=\"Accent\">Cost\
      \ per EC2-Instance Hour decreases significantly while EC2 Running Hours remain\
      \ stable, indicating efficient use of Spot Instances.</inline>\n    </li>\n\
      \    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>What\
      \ Bad Looks Like:\_\_</b>\n      </inline>\n      <inline color=\"Accent\">All\
      \ workloads run on on-demand instances, missing cost-saving opportunities.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action:\_</b>\n      </inline>\n      <inline color=\"Accent\">Move\
      \ workloads to Spot Instances to lower costs.</inline>\n    </li>\n    <li class=\"\
      ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Sources:\_</b>\n\
      \      </inline>\n      <inline color=\"Accent\">\n        <a href=\"https://aws.amazon.com/ec2/spot/\"\
      \ target=\"_self\">https://aws.amazon.com/ec2/spot/</a>\n      </inline>\n \
      \   </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 5bf25903-5abd-4c3a-8616-ad768cc71d42
  - Content: "<text-box>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #60cdb3\" font-size=\"14px\">Normalized Hours</inline>\n      <inline font-size=\"\
      14px\">\_are hours of compute time based on the standard of 1 hour of a small\
      \ size instance  = 1 normalized hour. For example large\_instance size is equivalent\
      \ to 4 normalized hours, xlarge\_instance is equivalent to 8 normalized hours.\
      \ You can view our\_</inline>\n      <inline color=\"#61d1d6\" font-size=\"\
      14px\">\n        <a href=\"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/apply_ri.html\"\
      \ target=\"_blank\">documentation</a>\n      </inline>\n      <inline font-size=\"\
      14px\">\_to see a list of different sizes within an instance family, and the\
      \ corresponding normalization factor per hour</inline>\n    </li>\n  </ul>\n\
      \  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #60cdb3\" font-size=\"14px\">vCPU Hours</inline>\n      <inline font-size=\"\
      14px\">\_are The total virtual CPU cores consumed over time, accounting for\
      \ the number of vCPUs per instance. for example m5.large instance has 2 vCPU\
      \ which is equalent to (2 x 24 hours) 48 CPU hours per day</inline>\n    </li>\n\
      \  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ color=\"#60cdb3\" font-size=\"14px\">Instance Hours\_</inline>\n      <inline\
      \ font-size=\"14px\">accounts for the total time a particular EC2 instance (irrespective\
      \ of size and type) is running, measured in hours.</inline>\n    </li>\n  </ul>\n\
      </text-box>"
    SheetTextBoxId: 4099bcd4-344b-4126-a550-f61673a9ac79
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n    \
      \  <inline color=\"#60cdb3\">\n        <b>Both Cost per Normalized Hour and\
      \ Total Cost Increasing</b>\n      </inline>\n      <b>\_</b>\n      <inline\
      \ color=\"Accent\">You are consuming more normalized compute capacity, and the\
      \ unit cost per normalized hour is also rising.</inline>\n    </li>\n    <li\
      \ class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Actions:\_\
      </b>\n      </inline>\n      <inline color=\"Accent\">Investigate if workloads\
      \ shifted to higher-cost instance families unnecessarily, Analyze if specialized\
      \ instances are being used appropriately, Review SP/RI coverage and purchase\
      \ additional commitments if usage is predictable</inline>\n    </li>\n  </ul>\n\
      \  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #60cdb3\">\n        <b>Both Cost per Normalized Hour and Total Cost Decreasing\_\
      </b>\n      </inline>\n      <inline color=\"Accent\">You are using fewer normalized\
      \ compute units at a lower effective cost per unit.</inline>\n    </li>\n  \
      \  <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Actions</b>\n\
      \      </inline>\n      <inline color=\"Accent\">: Confirm whether reduction\
      \ is due to optimization or business scale-down. If usage permanently decreased,\
      \ adjust RI/SP commitments to avoid over-coverage. Document optimization strategies\
      \ for replication across other workloads. Monitor for potential under-provisioning\
      \ that could impact performance</inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 694052c7-aff3-4d12-a6c3-6a8ddd10b277
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n    \
      \  <inline color=\"#60cdb3\">\n        <b>Cost per Normalized Hour Increases\
      \ While Total Cost Decreases</b>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <b>\_</b>\n      <inline color=\"Accent\">You are consuming\
      \ fewer normalized compute units, but the remaining capacity is more expensive\
      \ per unit.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n      <inline\
      \ color=\"Accent\">\n        <b>Actions</b>\n      </inline>\n      <inline\
      \ color=\"Accent\">: Check forConsolidation onto higher-performance, premium\
      \ instance types. Verify if premium instances are justified by performance requirements</inline>\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\">\n        <b>Cost per Normalized Hour Decreases\
      \ While Total Cost Increases\_</b>\n      </inline>\n      <inline color=\"\
      Accent\">You are scaling up normalized compute capacity efficiently, achieving\
      \ lower unit costs through better optimization.</inline>\n    </li>\n    <li\
      \ class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Actions</b>\n\
      \      </inline>\n      <inline color=\"Accent\">: Validate migration to cost-efficient\
      \ families like Graviton2/3 instances. Validate if increased SP/RI coverage\
      \ is driving unit cost reductions</inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: b869828e-4b30-4ad8-b390-86d6a218cd7d
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n    \
      \  <inline color=\"#60cdb3\">\n        <b>Cost per Instance Hour increases while\
      \ Total Cost decreases</b>\n      </inline>\n      <inline color=\"Accent\"\
      >\n        <b>\_-\_</b>\n      </inline>\n      <inline color=\"Accent\">You\
      \ are running fewer instances, but the remaining ones are higher cost.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action</b>\n      </inline>\n      <inline color=\"Accent\">: Check\
      \ if workloads were moved to larger or specialized instance families, or if\
      \ SP/RI coverage dropped. Consider right-sizing instances or renewing commitments.</inline>\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#60cdb3\">\n        <b>Cost per Instance Hour decreases\
      \ while Total Cost increases</b>\n      </inline>\n      <inline color=\"Accent\"\
      >\n        <b>\_-\_</b>\n      </inline>\n      <inline color=\"Accent\">You\
      \ are running more instances, but at a lower effective hourly cost.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n\
      \        <b>Action</b>\n      </inline>\n      <inline color=\"Accent\">: Investigate\
      \ if SP/RI coverage increased or workloads moved to more cost-efficient instance\
      \ families (e.g., Graviton). If this growth is steady, purchase additional SPs\
      \ to lock in savings.</inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 17d6d44d-d43f-4f2e-a11b-11e511e2935f
  - Content: "<text-box>\n  <block align=\"center\">\n    <inline color=\"Accent\"\
      \ font-size=\"16px\">\n      <b>How to read trends above</b>\n    </inline>\n\
      \  </block>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n    \
      \  <inline color=\"#60cdb3\">\n        <b>Both Cost per vCPU Hour and Total\
      \ Cost are increasing</b>\n      </inline>\n      <inline color=\"#acf5ee\"\
      >\n        <b>\_</b>\n      </inline>\n      <inline color=\"Accent\">\n   \
      \     <b>-\_</b>\n      </inline>\n      <inline color=\"Accent\">You are consuming\
      \ more vCPUs, but the unit cost per vCPU is also going up.</inline>\n    </li>\n\
      \    <li class=\"ql-indent-1\">\n      <inline color=\"Accent\">\n        <b>Action</b>\n\
      \      </inline>\n      <inline color=\"Accent\">: Check if workloads moved\
      \ to compute-optimized or premium CPU families, or if SP/RI coverage declined.\
      \ Evaluate workload requirements and adjust commitments.</inline>\n    </li>\n\
      \  </ul>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ color=\"Accent\">\_</inline>\n      <inline color=\"#60cdb3\">\n        <b>Both\
      \ Cost per vCPU Hour and Total Cost are decreasing</b>\n      </inline>\n  \
      \    <inline color=\"Accent\">\n        <b>\_-\_</b>\n      </inline>\n    \
      \  <inline color=\"Accent\">You are using fewer vCPUs, and the cost per vCPU\
      \ is also lower.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n     \
      \ <inline color=\"Accent\">\n        <b>Action</b>\n      </inline>\n      <inline\
      \ color=\"Accent\">: Confirm if this is intentional (workload reduction, optimization).\
      \ If demand is permanently down, reduce SP/RI commitments to avoid underutilization.</inline>\n\
      \    </li>\n  </ul>\n</text-box>"
