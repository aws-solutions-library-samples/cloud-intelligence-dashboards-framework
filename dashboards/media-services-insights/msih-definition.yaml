          <b>NOTE: Savings value projections can be distorted if the lookback period spans past recent new reservation purchases. Values are estimations only and may vary based on final unit pricing. Precision of hypothetical projections can show negative numbers if the reservations are already near optimization. That is due to minor hourly variances at the most granular level and the impact of marginal over or under provisioning.</b>
