AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            ResizeOption: RESPONSIVE
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: msih_reservation_optimize
  Expression: 'concat({payer_account_id}, " : ", {Reservation Profile})'
  Name: Account Reservation Profile
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(${IncludePricingAdjustments} = "Yes", {cost_od_net_unblended},
    {cost_od_unblended})
  Name: Cost OD
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(${IncludePricingAdjustments} = "Yes", {cost_net_reserved}, {cost_reserved})
  Name: Cost Reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Cost OD} + {Cost Reserved}'
  Name: Cost Total
- DataSetIdentifier: msih_reservation_optimize
  Expression: |2-

    sumOver({Reserved Usage Hours}, [{payer_account_id}, {Reservation Profile}], PRE_AGG) / sumOver({usage_amount_total}, [{payer_account_id}, {Reservation Profile}], PRE_AGG)
  Name: Coverage Rate by Profile
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse({Cost OD} - ({usage_amount_od} * {calc_unit_cost_reserved}) <
    1, NULL, {Cost OD} - ({usage_amount_od} * {calc_unit_cost_reserved})) * .95
  Name: Max Potential New Savings
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_od}'
  Name: On Demand Hours
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "Name" AND strlen({payer_account_name}) > 0, {payer_account_name},
        ${AccountDisplayFormat} = "Name (ID)", {payer_account_formatted},
        {payer_account_id}
    )
  Name: Payer Account
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{range_cost_od} + {range_cost_reserved}'
  Name: Range Cost Total
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{range_cost_od_norm} + {range_cost_reserved_norm}'
  Name: Range Cost Total Norm
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Cost Total} - {Range Cost Total}'
  Name: Range Savings over Current
- DataSetIdentifier: msih_reservation_optimize
  Expression: decimalToInt(sum({Cost Total}) - {Range Cost Total Norm})
  Name: Range Savings over Current Normailzed
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{range_cost_od_max} - {Range Cost Total}'
  Name: Range Total Savings
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    concat(
        ifelse(strlen(region) > 0, concat(region, " : "), ""),
        {Reservation Type},
        ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}), ""),
        ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
        ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
        ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), "")
    )
  Name: Reservation Profile
- DataSetIdentifier: msih_reservation_optimize
  Expression: 'concat({model_account}, " : ", {Reservation Profile}) '
  Name: Reservation Profile Account Owner
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        operation = "CHANNEL_INPUT", "Input",
        operation = "CHANNEL_OUTPUT", "Output",
        operation = "CHANNEL_FEATURE", "Feature",
        NULL
    )
  Name: Reservation Type
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_reserved}'
  Name: Reserved Usage Hours
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    concat(
        {video_flow_direction},
        " : ", {video_pipeline}, " Pipe",
        ifelse(strlen(region) > 0, concat(" : ", region), ""),
        ifelse(contains({usage_profile}, "IDLE"), " : IDLE", ""),
        ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}, " Codec"), ""),
        ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
        ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
        ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), "")
        //,   ifelse(strlen({video_quality}) > 0, concat(" : ", {video_quality}, " Qlty."), "")
    )
  Name: Transcoding Profile
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{reservation_count_candidate} - {current_reservation_count}'
  Name: buy_new_count
- DataSetIdentifier: msih_reservation_optimize
  Expression: ${EmlReservationSavingRate} * ifelse(${IncludePricingAdjustments} =
    "Yes", ${DiscCoefficient}, 1)
  Name: calc_eml_savings_rate
- DataSetIdentifier: msih_reservation_optimize
  Expression: dateDiff(${EmlLookbackStart}, ${EmlLookbackEnd}, "HH") + 1
  Name: calc_lookback_window_hours
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        minOver(1-{cost_reserved}/{cost_public}, [{payer_account_id}, {Reservation Profile}], PRE_FILTER) < 1, minOver(1-{cost_reserved}/{cost_public}, [{payer_account_id}, {Reservation Profile}], PRE_FILTER),
        minOver(1-{cost_reserved}/{cost_public}, [{payer_account_id}], PRE_FILTER) < 1, minOver(1-{cost_reserved}/{cost_public}, [{payer_account_id}], PRE_FILTER),
        ${EmlReservationSavingRate}
    )
  Name: calc_reservation_discount
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse({usage_amount_reserved} > {reservation_count}, {usage_amount_reserved},
    {reservation_count}) * {calc_unit_cost_reserved}
  Name: calc_reserved_true_cost
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        maxOver({unit_cost_od_hour}, [{payer_account_id}, {Reservation Profile}], PRE_AGG) > 0,
            maxOver({unit_cost_od_hour}, [{payer_account_id}, {Reservation Profile}], PRE_AGG),
        {cost_public} / {usage_amount_total} * {calc_eml_savings_rate}
    )
  Name: calc_unit_cost_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        maxOver({unit_cost_reserved_hour}, [{payer_account_id}, {Reservation Profile}], PRE_AGG) > 0,
            maxOver({unit_cost_reserved_hour}, [{payer_account_id}, {Reservation Profile}], PRE_AGG),
        {cost_public} / {usage_amount_total} * {calc_eml_savings_rate}
    )
  Name: calc_unit_cost_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{current_reservation_count}'
  Name: current_reservation_count_for_scope
- DataSetIdentifier: msih_reservation_optimize
  Expression: ({usage_amount_total} * {unit_cost_od_hour}) - {cost_reserved}
  Name: current_savings
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    /*dateDiff({usage_date}, {last_refresh_date}, "DD") < ${EmlLookbackDays}*/
    {usage_time} >= truncDate("DD", ${EmlLookbackStart}) AND {usage_time} <= addDateTime(23, "HH", truncDate("DD", ${EmlLookbackEnd}))
  Name: eml_is_hourly_lookback_window
- DataSetIdentifier: msih_reservation_optimize
  Expression: sumOver(({usage_amount_total}),  [{payer_account_id}, {Reservation Profile},
    {usage_time}, extract("HH", {usage_time})], PRE_AGG)
  Name: eml_usage_amount_by_profile_per_hour
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    /*max(sum({Cost Total} - {Range Cost Total}, [{Payer Account}, {Reservation Profile}]))*/
    maxOver(sum({Cost Total} - {Range Cost Total}), [{Reservation Profile}])
  Name: inventory_max_savings_potential
- DataSetIdentifier: msih_reservation_optimize
  Expression: dateDiff({usage_time}, {last_refresh_date}) < ${EmlLookbackDays}
  Name: is_hourly_lookback_window
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{linked_account_formatted}'
  Name: model_account
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(maxOver(max({range_savings_sumover}), [{model_account}, {Reservation
    Profile}]) = max({range_savings_sumover}), avg({reservation_count_candidate}),
    0)
  Name: range_account_profile_optimal
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{calc_unit_cost_od} * {candidate_od_hours}'
  Name: range_cost_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_total} * {calc_unit_cost_od}'
  Name: range_cost_od_max
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(sum({Cost Total}) - sum({Range Cost Total}) < 0, sum({Cost OD}),
    sum({range_cost_od}))
  Name: range_cost_od_norm
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{calc_unit_cost_reserved} * {reservation_count_candidate}'
  Name: range_cost_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(sum({Cost Total}) - sum({Range Cost Total}) < 0, ifelse(${IncludePricingAdjustments} = "Yes", sum({cost_net_reserved}), sum({cost_reserved})), sum({range_cost_reserved}))
  Name: range_cost_reserved_norm
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    //{range_account_profile_optimal} - max({reservations_end_of_filtered_period})
    ifelse({Range Savings over Current Normailzed} = 0, 0, {range_optimal_reservations} - max({reservations_for_period}))
  Name: range_optimal_net_new
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse({Range Savings over Current Normailzed} = 0, max({reservations_for_period}),
    max({reservation_count_candidate}))
  Name: range_optimal_reservations
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    /*maxOver(sum({Range Savings over Current}), [{model_account}, {Reservation Profile}], PRE_AGG)*/
    /*maxOver(sumOver({Range Savings over Current}, [{model_account}, {Reservation Profile}, {reservation_count_candidate}], PRE_AGG), [{model_account}, {Reservation Profile}], PRE_AGG)
    maxOver(sum({Range Total Savings}), [])*/
    sumOver({Range Total Savings}, [{model_account}, {Reservation Profile}, {reservation_count_candidate}], PRE_AGG)
  Name: range_savings_sumover
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Payer Account}'
  Name: reservation_account_scope
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        {usage_time} = maxOver({usage_time}, [{payer_account_id}, {usage_profile}, region], PRE_AGG),
        {reservation_count},
        NULL
    )
  Name: reservations_for_period
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Cost OD}'
  Name: scenario_current_cost_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Cost Reserved}'
  Name: scenario_current_cost_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{Cost Total}'
  Name: scenario_current_cost_total
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_od}'
  Name: scenario_current_hours_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_reserved}'
  Name: scenario_current_hours_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_amount_total}'
  Name: scenario_current_hours_total
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    /*ifelse({current_reservation_count} = ${EmlReservationTargetScenario}, 0, {scenario_model_cost_total} - {scenario_current_cost_total})*/
    {scenario_current_cost_total} - {scenario_model_cost_total}
  Name: scenario_model_cost_delta
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{scenario_model_hours_od} * {calc_unit_cost_od}'
  Name: scenario_model_cost_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    //ifelse({Range Savings over Current Normailzed} = 0, max({reservations_for_period}), max({reservation_count_candidate}))
    //ifelse(${EmlReservationTargetScenario} = {range_optimal_reservations}, 0, 1)
    {calc_unit_cost_reserved} * {scenario_model_hours_reserved}
  Name: scenario_model_cost_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{scenario_model_cost_od} + {scenario_model_cost_reserved}'
  Name: scenario_model_cost_total
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse({scenario_model_hours_reserved} - {usage_amount_total} > 0, {scenario_model_hours_reserved}
    - {usage_amount_total}, 0)
  Name: scenario_model_excess_reserved_hours
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{candidate_od_hours}'
  Name: scenario_model_hours_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: ${EmlReservationTargetScenario}
  Name: scenario_model_hours_reserved
- DataSetIdentifier: msih_reservation_optimize
  Expression: ${EmlReservationTargetScenario} - {reservations_for_period}
  Name: scenario_net_new
- DataSetIdentifier: msih_reservation_optimize
  Expression: ${EmlReservationTargetScenario}
  Name: scenario_target
- DataSetIdentifier: msih_reservation_optimize
  Expression: |-
    ifelse(
        maxOver({unit_cost_od_hour}, [{reservation_account_scope}, {Reservation Profile}], PRE_FILTER) > 0, maxOver({unit_cost_od_hour}, [{reservation_account_scope}, {Reservation Profile}], PRE_FILTER),
        {cost_public}/{usage_amount_total}*ifelse(${IncludePricingAdjustments} = "Yes", ${DiscCoefficient}, 1)
    )
  Name: scenario_unit_cost_od
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(${IncludePricingAdjustments} = "Yes", {unit_cost_combined_net_unblended},
    {unit_cost_combined_unblended})
  Name: unit_cost_combined
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(${IncludePricingAdjustments} = "Yes", {unit_cost_od_net_unblended},
    {unit_cost_od_unblended})
  Name: unit_cost_od_hour
- DataSetIdentifier: msih_reservation_optimize
  Expression: ifelse(${IncludePricingAdjustments} = "Yes", {unit_cost_net_reserved},
    {unit_cost_reserved})
  Name: unit_cost_reserved_hour
- DataSetIdentifier: msih_reservation_optimize
  Expression: '{usage_profile}'
  Name: usage_type
- DataSetIdentifier: msih_reservations
  Expression: 'concat({linked_account_id}, " : ", {Reservation Profile})'
  Name: Account Reservation Profile
- DataSetIdentifier: msih_reservations
  Expression: ifelse({is_renewal} = 1, "Yes", "No")
  Name: Auto Renew
- DataSetIdentifier: msih_reservations
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "Name" AND strlen({linked_account_name}) > 0, {linked_account_name},
        ${AccountDisplayFormat} = "Name (ID)", {linked_account_formatted},
        {linked_account_id}
    )
  Name: Linked Account
- DataSetIdentifier: msih_reservations
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "Name" AND strlen({payer_account_name}) > 0, {payer_account_name},
        ${AccountDisplayFormat} = "Name (ID)", {payer_account_formatted},
        {payer_account_id}
    )
  Name: Payer Account
- DataSetIdentifier: msih_reservations
  Expression: |-
    concat(
        "ID# ", {reservation_id},
        " : ", {Reservation Profile},
        " : Exp. ", formatDate({reservation_end_time}, 'dd-MMM-yyyy')
    )
  Name: Reservation ID Detail
- DataSetIdentifier: msih_reservations
  Expression: |-
    concat(
        ifelse(strlen({video_region}) > 0, concat({video_region}, " : "), ""),
        {Reservation Type},
        ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}), ""),
        ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
        ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
        ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), "")
    )
  Name: Reservation Profile
- DataSetIdentifier: msih_reservations
  Expression: stdev({reservation_utilization_percent}, [{usage_start_time}, {Reservation
    ID Detail}])
  Name: Reservation Stat
- DataSetIdentifier: msih_reservations
  Expression: |-
    ifelse(
        {reservation_end_time} >= now(), "Active", "Inactive"
    )
  Name: Reservation Status
- DataSetIdentifier: msih_reservations
  Expression: |-
    ifelse(
        {line_item_operation} = "CHANNEL_INPUT", "Input",
        {line_item_operation} = "CHANNEL_OUTPUT", "Output",
        {line_item_operation} = "CHANNEL_FEATURE", "Feature",
        "NA"
    )
  Name: Reservation Type
- DataSetIdentifier: msih_reservations
  Expression: '{reservation_utilization_percent} * 100'
  Name: Reservation Utilization
- DataSetIdentifier: msih_reservations
  Expression: |-
    concat(
        ifelse(contains({line_item_usage_type}, "-IN-"), "In", "Out"),
        " : ", {video_pipeline}, " Pipe",
        " : ", {video_region},
        ifelse(strlen({2b7009a1-5702-4d09-8f89-a2356bc84dc0}) > 0, concat(" : ", {2b7009a1-5702-4d09-8f89-a2356bc84dc0}, " Codec"), ""),
        ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
        ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
        ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), ""),
        ifelse(strlen({video_quality}) > 0, concat(" : ", {video_quality}, " Qlty."), "")
    )
  Name: Transcoding Profile
- DataSetIdentifier: msih_reservations
  Expression: now()
  Name: now
- DataSetIdentifier: msih_reservations
  Expression: sumOver(min({reservation_count}), [{Linked Account},{Transcoding Profile}],
    POST_AGG_FILTER)
  Name: reservation_count_over_profile
- DataSetIdentifier: msih_view
  Expression: 'concat({linked_account_id}, " : ", {Reservation Profile})'
  Name: Account Reservation Profile
- DataSetIdentifier: msih_view
  Expression: Cost
  Name: Actual Cost with Reservations
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${IncludePricingAdjustments} = "Yes", {net_amortized_cost},
        {amortized_cost}
    )
  Name: Amortized Cost
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        dateDiff({billing_period}, truncDate("MM", {last_refresh_date}), "MM") > 0,
            sumOver((Cost), [{billing_period}, {Usage Category}], PRE_FILTER )  / dateDiff({billing_period}, addDateTime(1, "MM", {billing_period}), "DD"),
        sumOver((Cost), [{billing_period}, {Usage Category}], PRE_FILTER )  / dateDiff({billing_period}, {last_refresh_date}, "DD")
    )
  Name: Avg Daily Usage Category Cost by Month
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        dateDiff({billing_period}, truncDate("MM", {last_refresh_date}), "MM") > 0,
            sumOver(({usage_quantity}), [{billing_period}, {Usage Category}], PRE_FILTER )  / dateDiff({billing_period}, addDateTime(1, "MM", {billing_period}), "DD"),
        sumOver(({usage_quantity}), [{billing_period}, {Usage Category}], PRE_FILTER )  / dateDiff({billing_period}, {last_refresh_date}, "DD")
    )
  Name: Avg Daily Usage Category Quantity by Month
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        dateDiff({billing_period}, truncDate("MM", {last_refresh_date}), "MM") > 0,
            sumOver(({usage_quantity}), [{billing_period}, {usage_type}], PRE_FILTER )  / dateDiff({billing_period}, addDateTime(1, "MM", {billing_period}), "DD"),
        sumOver(({usage_quantity}), [{billing_period}, {usage_type}], PRE_FILTER )  / dateDiff({billing_period}, {last_refresh_date}, "DD")
    )
  Name: Avg Daily Usage Type Quantity by Month
- DataSetIdentifier: msih_view
  Expression: '{charge_type}'
  Name: Charge Type
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${CostModel} = "Invoice", {Invoiced Cost},
        {Amortized Cost}
    )
  Name: Cost
- DataSetIdentifier: msih_view
  Expression: 'concat({location_destination}, " : ", replace(replace({Usage Category},
    "Data Transfer ", ""), "Data ", ""))'
  Name: Data Transfer Destination Type
- DataSetIdentifier: msih_view
  Expression: "ifelse(\n\tcontains({product_code}, \"MediaLive\"),\n\t\tifelse(\n\t\
    \t\tcontains({usage_type}, \"in-bytes\"), \"In\",\n            contains({usage_type},\
    \ \"out-bytes\"), \"Out\",\n            contains(operation, \"INPUT\"), \"In\"\
    ,\n            contains(operation, \"OUTPUT\"), \"Out\",\n\t\t\tNULL\n\t\t),\n\
    \tcontains({product_code}, \"MediaConvert\"), NULL,\n\tcontains({product_code},\
    \ \"MediaPackage\"),\n\t\tifelse(\n\t\t\tcontains({usage_type}, \"in-bytes\"),\
    \ \"In\",\n            contains({usage_type}, \"out-bytes\"), \"Out\",\n\t\t\t\
    NULL\n\t\t),\n\tcontains({product_code}, \"MediaTailor\"),\n\t\tifelse(\n\t\t\t\
    contains({usage_type}, \"in-bytes\"), \"In\",\n            contains({usage_type},\
    \ \"out-bytes\"), \"Out\",\n\t\t\tNULL\n\t\t),\n\tcontains({product_code}, \"\
    MediaConnect\"), NULL,\n\tNULL\n)"
  Name: Data Transfer Flow Direction
- DataSetIdentifier: msih_view
  Expression: split({resource_id},":",7)
  Name: EML Channel ID
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        {product_code} = "AWSElementalMediaLive" and startsWith(operation, "INACTIVE_"), "Idle",
        {product_code} = "AWSElementalMediaLive" and startsWith(operation, "CHANNEL_"), "Running",
        ""
    )
  Name: EML Channel Status
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        isNull(${EmlIdleResourceType}) and contains(operation, "INACTIVE_"), Cost,
        ${EmlIdleResourceType} = "Channels" and operation = "INACTIVE_CHANNEL", Cost,
        ${EmlIdleResourceType} = "Inputs" and operation = "INACTIVE_INPUT", Cost,
        0
    )
  Name: EML Idle Cost
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        operation = "INACTIVE_CHANNEL", "Channel",
        operation = "INACTIVE_INPUT", "Input",
        ""
    )
  Name: EML Idle Resource Type
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        isNull(${EmlIdleResourceType}) and contains(operation, "INACTIVE_"), {usage_quantity},
        ${EmlIdleResourceType} = "Channels" and operation = "INACTIVE_CHANNEL", {usage_quantity},
        ${EmlIdleResourceType} = "Inputs" and operation = "INACTIVE_INPUT", {usage_quantity},
        0
    )
  Name: EML Idle Usage
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${EmlParameterFocus} = "Bitrate", {video_bit_rate},
        ${EmlParameterFocus} = "Codec", {video_codec},
        ${EmlParameterFocus} = "Framerate", {video_frame_rate},
        ${EmlParameterFocus} = "Pipeline", {video_pipeline},
        ${EmlParameterFocus} = "Quality", {video_quality},
        ${EmlParameterFocus} = "Resolution", {video_resolution},
        ${EmlParameterFocus}
    )
  Name: EML Parameter Value
- DataSetIdentifier: msih_view
  Expression: sum(ifelse({charge_type} <> "RIFee", Cost/{days_in_month}, 0), [{billing_period},
    {linked_account_id}, {Reservation Profile}])
  Name: EML Profile Cost per Day by Month
- DataSetIdentifier: msih_view
  Expression: sum(ifelse({charge_type} <> "RIFee", {usage_quantity}/{days_in_month},
    0), [{billing_period}, {linked_account_id}, {Reservation Profile}])
  Name: EML Profile Usage Hours per Day by Month
- DataSetIdentifier: msih_view
  Expression: sum({EML Transcoding Reserved Quantity}, [{billing_period}])/(sum({EML
    Transcoding Reserved Quantity}, [{billing_period}])+sum({EML Transcoding On Demand
    Quantity}, [ {billing_period}]))
  Name: EML Reservation Coverage Pct
- DataSetIdentifier: msih_view
  Expression: sumOver(({EML Transcoding Reserved Quantity}), [{billing_period}, {Transcoding
    Profile}], PRE_FILTER)/(sumOver(({EML Transcoding Reserved Quantity}), [{billing_period},
    {Transcoding Profile}], PRE_FILTER) + sumOver(({EML Transcoding On Demand Quantity}),
    [{billing_period}, {Transcoding Profile}], PRE_FILTER))
  Name: EML Reservation Coverage by Profile
- DataSetIdentifier: msih_view
  Expression: 1 - (sum(ifelse(contains({charge_type}, "Usage") and {is_eml_active_transcode}=1,{unblended_cost},0))
    / sum(ifelse(contains({charge_type}, "Usage") and {is_eml_active_transcode}=1,{public_cost},0)))
  Name: EML Reservation Savings Rate
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ({product_code} = "AWSElementalMediaLive" and {charge_type} = "RIFee" and {reservation_end_time} >= now()), "Active",
        ({product_code} = "AWSElementalMediaLive" and {charge_type} = "RIFee"), "Inactive",
        NULL
    )
  Name: EML Reservation Status
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        operation = "CHANNEL_INPUT", "Input",
        operation = "CHANNEL_OUTPUT", "Output",
        operation = "CHANNEL_FEATURE", "Feature",
        NULL
    )
  Name: EML Reservation Type
- DataSetIdentifier: msih_view
  Expression: ifelse(contains({product_code}, "MediaLive") and {is_transcode_or_idle_usage}
    = 1 and {Purchase Option} = "On Demand", Cost, 0)
  Name: EML Transcoding On Demand Cost
- DataSetIdentifier: msih_view
  Expression: ifelse(contains({product_code}, "MediaLive") and {is_transcode_or_idle_usage}
    = 1 and {Purchase Option} = "On Demand", {usage_quantity}, 0)
  Name: EML Transcoding On Demand Quantity
- DataSetIdentifier: msih_view
  Expression: ifelse(contains({product_code}, "MediaLive") and {is_transcode_or_idle_usage}
    = 1 and {Purchase Option} = "Reserved", Cost, 0)
  Name: EML Transcoding Reserved Cost
- DataSetIdentifier: msih_view
  Expression: ifelse(contains({product_code}, "MediaLive") and {is_transcode_or_idle_usage}
    = 1 and {Purchase Option} = "Reserved", {usage_quantity}, 0)
  Name: EML Transcoding Reserved Quantity
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(ifelse({is_transcode_or_idle_usage}=1 and {is_eml_idle}=0,Cost,0)),
    [Resource])/sumOver(sum(ifelse({is_transcode_or_idle_usage}=1 and {is_eml_idle}=0,{usage_quantity},0)),
    [Resource])
  Name: EML Transcoding Unit Cost
- DataSetIdentifier: msih_view
  Expression: concat({linked_account_id}, ":", region, ":", {EML Channel ID})
  Name: EML Unique Channel Name
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(ifelse(contains({product_code},"MediaPackage"), Cost, 0)),
    [{Usage Category}])/sumOver(sum(ifelse(contains({product_code},"MediaPackage"),
    {usage_quantity}, 0)), [{Usage Category}])
  Name: EMP Data Transfer Unit Cost
- DataSetIdentifier: msih_view
  Expression: sum(ifelse(contains({Usage Category}, "Ad In"),Cost,0))/sum(ifelse(contains({Usage
    Category}, "Ad In"),{usage_quantity},0))
  Name: EMT Ad Insertion Unit Cost
- DataSetIdentifier: msih_view
  Expression: ((100 - ${EmlReservationSavingRate})/100) * Cost
  Name: Estimated Cost with Reservations
- DataSetIdentifier: msih_view
  Expression: ifelse({Purchase Option} = "On Demand" and {is_transcode_or_idle_usage}
    = 1, Cost * (${EmlReservationSavingRate}/125), 0)
  Name: Estimated Potential Savings
- DataSetIdentifier: msih_view
  Expression: '{Public Cost}'
  Name: Estimated Public On Demand Cost
- DataSetIdentifier: msih_view
  Expression: '{public_vs_actual_cost_delta}'
  Name: Estimated Savings with Reservations
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${GroupBy} = "Account", {Linked Account},
        ${GroupBy} = "Usage Category", {Usage Category},
        ${GroupBy} = "Purchase Option", {Purchase Option},
        ${GroupBy} = "Usage Type", {usage_type},
        region
    )
  Name: Group By
- DataSetIdentifier: msih_view
  Expression: ifelse(dateDiff({usage_date}, now(), "DD") <= 30, Cost, 0)
  Name: Hourly Cost
- DataSetIdentifier: msih_view
  Expression: ifelse({pricing_unit} = "Hrs", {usage_quantity}, 0)
  Name: Hours
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${IncludePricingAdjustments} = "Yes", {net_unblended_cost},
        {unblended_cost}
    )
  Name: Invoiced Cost
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "Name" AND strlen({linked_account_name}) > 0, {linked_account_name},
        ${AccountDisplayFormat} = "Name (ID)", concat(ifelse(strlen({linked_account_name}) > 0, {linked_account_name}, {linked_account_id}), " (", {linked_account_id}, ")"),
        {linked_account_id}
    )
  Name: Linked Account
- DataSetIdentifier: msih_view
  Expression: difference(sum(Cost), [{billing_period} ASC], -1, [{Usage Category}])
  Name: MoM Usage Category Cost
- DataSetIdentifier: msih_view
  Expression: percentDifference(sum(Cost), [{billing_period} ASC], -1, [{Usage Category}])
  Name: MoM Usage Category Pct
- DataSetIdentifier: msih_view
  Expression: difference(sum({usage_quantity}), [{billing_period} ASC], -1, [{Usage
    Category}])
  Name: MoM Usage Category Quantity Pct
- DataSetIdentifier: msih_view
  Expression: "sumOver(sum({Amortized Cost}), [{billing_period}])/sumOver(sum({usage_quantity}),\
    \ [{billing_period}])\r\n"
  Name: Monthly Unit Cost Combined
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(ifelse({Purchase Option}<>"Reserved",{amortized_cost},0)),
    [{billing_period}])/sumOver(sum(ifelse({Purchase Option}<>"Reserved",{usage_quantity},0)),
    [{billing_period}])
  Name: Monthly Unit Cost On Demand
- DataSetIdentifier: msih_view
  Expression: |-
    /*sumOver(sum(ifelse({elemental_purchase_option}="Reserved",{public_cost},0)), [{billing_period}])/sumOver(sum(ifelse({elemental_purchase_option}="Reserved",{usage_quantity},0)), [{billing_period}])*/
    sumOver(sum({Public Cost}), [{billing_period}])/sumOver(sum({usage_quantity}), [{billing_period}])
  Name: Monthly Unit Cost Public Equivalent
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(ifelse({Purchase Option}="Reserved",{Amortized Cost},0)),
    [{billing_period}])/sumOver(sum(ifelse({Purchase Option}="Reserved",{usage_quantity},0)),
    [{billing_period}])
  Name: Monthly Unit Cost Reserved
- DataSetIdentifier: msih_view
  Expression: operation
  Name: Operation
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "Name" AND strlen({payer_account_name}) > 0, {payer_account_name},
        ${AccountDisplayFormat} = "Name (ID)", concat(ifelse(strlen({payer_account_name}) > 0, {payer_account_name}, {payer_account_id}), " (", {payer_account_id}, ")"),
        {payer_account_id}
    )
  Name: Payer Account
- DataSetIdentifier: msih_view
  Expression: '{product_family}'
  Name: Product Family
- DataSetIdentifier: msih_view
  Expression: concat(Service, " ", {Usage Category})
  Name: Product Usage Category
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(Cost), [{Product Usage Category}, {billing_period}])/sumOver(sum(Cost),
    [{billing_period}])
  Name: Product Usage Category Monthly Cost Pct
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        contains({product_code}, "MediaLive") and {charge_type} = 'RIFee', 0,
        {public_cost}
    )
  Name: Public Cost
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        contains({purchase_option}, "Reserved", CASE_INSENSITIVE), "Reserved",
        contains({pricing_unit}, "Reserved", CASE_INSENSITIVE), "Reserved",
        "On Demand"
    )
  Name: Purchase Option
- DataSetIdentifier: msih_view
  Expression: ifelse(strlen(region) > 0, region, "(not specified)")
  Name: Region
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        {product_code} = "AWSElementalMediaLive" and {is_transcode_or_idle_usage} = 1,
            concat(
                ifelse(strlen(region) > 0, concat(region, " : "), ""),
                {EML Reservation Type},
                ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}), ""),
                ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
                ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
                ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), "")
        ),
        NULL
    )
  Name: Reservation Profile
- DataSetIdentifier: msih_view
  Expression: 'concat({reservation_account_scope}, " : ", {Reservation Profile})'
  Name: Reservation Profile Account Owner
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        operation = "CHANNEL_INPUT", "Input",
        operation = "CHANNEL_OUTPUT", "Output",
        operation = "CHANNEL_FEATURE", "Feature",
        "NA"
    )
  Name: Reservation Type
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        contains({product_code}, "MediaLive"), {EML Unique Channel Name},
        {Resource Short ID}
    )
  Name: Resource
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        left({resource_id}, 4) <> "arn:", {resource_id},
        contains({product_code}, "MediaLive"),
            concat(
                split({resource_id}, ":", 4), ":",
                split({resource_id}, ":", 5), ":",
                split({resource_id}, ":", 6), ":",
                split({resource_id}, ":", 7), ":"
            ),
        strlen(split({resource_id}, ":", 7)) > 0, split({resource_id}, ":", 7),
        strlen(split({resource_id}, ":", 6)) > 0, split({resource_id}, ":", 6),
        {resource_id}
    )
  Name: Resource Short ID
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        contains({product_code}, "MediaPackage"),
            ifelse(
                contains({resource_id}, "origin_endpoint"), "Origin endpoint",
                contains({resource_id}, "channel"), "Channel",
                {resource_id}
            ),
        contains({product_code}, "MediaTailor"),
            ifelse(
                contains({resource_id}, "playback"), "Playback config",
                contains({resource_id}, "channel"), "Channel",
                "TBD"
            ),
        NULL
    )
  Name: Resource Type
- DataSetIdentifier: msih_view
  Expression: replace(replace({product_code}, "AWS", ""), "Elemental", "")
  Name: Service
- DataSetIdentifier: msih_view
  Expression: 'concat(Service, ": ", Resource)'
  Name: Service Resource
- DataSetIdentifier: msih_view
  Expression: '"Total"'
  Name: Total
- DataSetIdentifier: msih_view
  Expression: ifelse({is_transcode_or_idle_usage} = 1, Cost, 0)
  Name: Transcoding Cost
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        {product_code} = "AWSElementalMediaConvert" and contains({charge_type}, "Usage"),
            concat(ifelse(${TranscodeParamFormat} = "Regional", region, "(non-regional)"),
                ifelse(strlen({video_tier}) > 0, concat(" : ", {video_tier}, " Tier"), ""),
                ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}, " Codec"), ""),
                ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}, " Resolution"), ""),
                ifelse(strlen({video_quality}) > 0, concat(" : ", {video_quality}), ""),
                ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), ""),
                ifelse(operation = "reserve", " : Reserved Transcoding", "")
            ),
        {product_code} = "AWSElementalMediaLive" and {is_transcode_or_idle_usage} = 1,
            concat(
                {video_flow_direction},
                " : ", {video_pipeline}, " Pipe",
                ifelse(strlen(region) > 0, concat(" : ", region), ""),
                ifelse({is_eml_idle} = 1, " : IDLE", ""),
                ifelse(strlen({video_codec}) > 0, concat(" : ", {video_codec}, " Codec"), ""),
                ifelse(strlen({video_resolution}) > 0, concat(" : ", {video_resolution}), ""),
                ifelse(strlen({video_bit_rate}) > 0, concat(" : ", {video_bit_rate}), ""),
                ifelse(strlen({video_frame_rate}) > 0, concat(" : ", {video_frame_rate}), ""),
                ifelse(strlen({video_quality}) > 0, concat(" : ", {video_quality}, " Qlty."), "")
            ),
        NULL
    )
  Name: Transcoding Profile
- DataSetIdentifier: msih_view
  Expression: ifelse({is_transcode_or_idle_usage} = 1, {usage_quantity}, 0)
  Name: Transcoding Usage Quantity
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(ifelse({is_eml_active_transcode} = 1, Cost, 0)), [{billing_period},
    {Reservation Profile}], POST_AGG_FILTER )/sumOver(sum(ifelse({is_eml_active_transcode}
    = 1, {Usage Quantity}, 0)), [{billing_period}, {Reservation Profile}], POST_AGG_FILTER
    )
  Name: Unit Cost by Reservation Profile
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(Cost), [Resource])/sumOver(sum({Usage Quantity}), [Resource])
  Name: Unit Cost by Resource
- DataSetIdentifier: msih_view
  Expression: sumOver(sum(Cost), [region,{billing_period}])/sumOver(sum({usage_quantity}),
    [region,{billing_period}])
  Name: Unit Cost per Region by Month
- DataSetIdentifier: msih_view
  Expression: "ifelse(\n\t{charge_type} = \"Tax\", NULL,\n\tcontains({product_code},\
    \ \"MediaLive\"),\n\t\tifelse(\n\t\t\t{charge_type} = \"RIFee\", \"Reserved Hours\
    \ (Hrs)\",\n\t\t\toperation = \"CHANNEL_BANDWIDTH\", \"Data Transfer (GB)\",\n\
    \t\t\toperation = \"CHANNEL_INPUT\", \"Input Transcoding (Hrs)\",\n\t\t\toperation\
    \ = \"CHANNEL_OUTPUT\", \"Output Transcoding (Hrs)\",\n\t\t\toperation = \"CHANNEL_ACTIVE\"\
    , \"Output Transcoding (Hrs)\",\n\t\t\toperation = \"INACTIVE_CHANNEL\", \"Idle\
    \ Channel (Hrs)\",\n\t\t\toperation = \"INACTIVE_INPUT\", \"Idle Input (Hrs)\"\
    ,\n\t\t\toperation = \"INACTIVE_MULTIPLEX\", \"Idle Multiplex (Hrs)\",\n\t\t\t\
    operation = \"CHANNEL_FEATURE\", \"Channel Feature (Hrs)\",\n\t\t\tconcat(\"EML\
    \ other: \", {product_family}, \":\", operation, \":\", {usage_type})\n\t\t),\n\
    \tcontains({product_code}, \"MediaConvert\"),\n\t\tifelse(\n\t\t\tcontains({product_family},\
    \ \"Transcod\"), \"Transcoding (Mins)\",\n\t\t\toperation = \"reserve\", \"Reserved\
    \ Transcoding (Mins)\",\n\t\t\toperation = \"CreateJob\", \"Create Job (Count)\"\
    ,\n\t\t\t{product_family} = \"API Calls\", \"API Call (Invoke)\",\n\t\t\tconcat(\"\
    EMC other: \", {product_family}, \":\", operation, \":\", {usage_type})\n\t\t\
    ),\n\tcontains({product_code}, \"MediaPackage\"),\n\t\tifelse(\n\t\t\tcontains({usage_type},\
    \ \"DataTransfer\"), \"Data Transfer Internet (GB)\",\n\t\t\tcontains({usage_type},\
    \ \"AWS-Out\"), \"Data Transfer Cross Region Out (GB)\",\n\t\t\tcontains({usage_type},\
    \ \"AWS-In\"), \"Data Transfer Cross Region In (GB)\",\n\t\t\tcontains({usage_type},\
    \ \"CloudFront\"), \"Data Transfer CloudFront (GB)\",\n\t\t\tcontains({usage_type},\
    \ \"ingest-bytes\"), \"Live Ingest (GB)\",\n\t\t\tcontains({usage_type}, \"origin-packaging\"\
    ), \"Live Origination & Packaging (GB)\",\n\t\t\tcontains({usage_type}, \"vod-origin\"\
    ), \"VOD Origination & Packaging (GB)\",\n\t\t\tconcat(\"EMP other: \", {product_family},\
    \ \":\", operation, \":\", {usage_type})\n\t\t),\n\tcontains({product_code}, \"\
    MediaTailor\"),\n\t\tifelse(\n\t\t\t(startsWith({usage_type}, \"EU-DataTransfer\"\
    ) or startsWith({usage_type}, \"US-DataTransfer\") or startsWith({usage_type},\
    \ \"APC-DataTransfer\")), \"Ad Delivery CloudFront to Internet (GB)\",\n\t\t\t\
    contains({usage_type}, \"DataTransfer\"), \"Ad Delivery Direct to Internet (GB)\"\
    ,\n\t\t\tcontains({usage_type}, \"CloudFront\"), \"Ad Delivery to CloudFront (GB)\"\
    ,\n\t\t\tcontains({usage_type}, \"AWS-Out-Bytes\") or contains({usage_type}, \"\
    AWS-In-Bytes\"), \"Data Transfer Cross Region (GB)\",\n\t\t\toperation = \"VOD\"\
    , \"Ad Insertions VOD (Count)\",\n\t\t\tcontains({usage_type}, \"AdInsertion\"\
    ), \"Ad Insertions Live (Count)\",\n\t\t\tcontains({usage_type}, \"ChannelHoursB\"\
    ), \"Channel Assembly Basic (Hrs)\",\n\t\t\tcontains({usage_type}, \"ChannelHoursS\"\
    ), \"Channel Assembly Standard (Hrs)\",\n\t\t\tconcat(\"EMT other: \", {product_family},\
    \ \":\", operation, \":\", {usage_type})\n\t\t),\n\tcontains({product_code}, \"\
    MediaConnect\"),\n\t\tifelse(\n\t\t\toperation = \"RunningFlow\", \"Running Flow\
    \ (Hrs)\",\n\t\t\tcontains({usage_type}, \"DataTransfer-In-Bytes\") or contains({usage_type},\
    \ \"AWS-In-Bytes\"), \"Data Ingress (GB)\",\n\t\t\tcontains({usage_type}, \"DataTransfer-Out-Bytes\"\
    ), \"Data Transfer Internet (GB)\",\n\t\t\tcontains({usage_type}, \"DataTransfer-Regional-Bytes\"\
    ), \"Data Transfer Intra-Region (GB)\",\n\t\t\tcontains({usage_type}, \"AWS-Out-Bytes\"\
    ), \"Data Transfer Cross Region (GB)\",\n\t\t\tconcat(\"EMX other: \", {product_family},\
    \ \":\", operation, \":\", {usage_type})\n\t\t),\n\tcontains({product_code}, \"\
    MediaStore\"), {product_family},\n\tNULL\n)"
  Name: Usage Category
- DataSetIdentifier: msih_view
  Expression: truncDate("DD", {usage_date})
  Name: Usage Day
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        {product_code}='AWSElementalMediaConvert' and {product_family}='Reserved Transcoding', ({usage_quantity} * {hours_in_month} * 60),
        {usage_quantity}
    )
  Name: Usage Quantity
- DataSetIdentifier: msih_view
  Expression: '{usage_type}'
  Name: Usage Type
- DataSetIdentifier: msih_view
  Expression: dateDiff({billing_period}, ifelse(truncDate("MM", {billing_period})
    = truncDate("MM", now()), now(), addDateTime(1, "MM", {billing_period})), "DD")
  Name: days_in_month
- DataSetIdentifier: msih_view
  Expression: |-
    /*distinctCountOver(ifelse({product_code} = "AWSElementalMediaLive", {reservation_id}, NULL), [{usage_type}], PRE_FILTER)*/
    sumOver((ifelse({product_code} = "AWSElementalMediaLive" and {charge_type} = "DiscountedUsage", {usage_quantity},0) ), [{billing_period}, {Reservation Profile}], PRE_FILTER)
  Name: eml_active_reservations_per_profile
- DataSetIdentifier: msih_view
  Expression: |-
    /*dateDiff({usage_date}, {last_refresh_date}, "DD") < ${EmlLookbackDays}*/
    {usage_date} >= ${EmlLookbackStart} AND {usage_date} <= ${EmlLookbackEnd}
  Name: eml_is_hourly_lookback_window
- DataSetIdentifier: msih_view
  Expression: 'sumOver(sum({usage_quantity} / {days_in_month}), [{billing_period},
    {Reservation Profile}]) '
  Name: eml_reservation_profile_hours_per_day
- DataSetIdentifier: msih_view
  Expression: ifelse(strlen({Transcoding Profile}) > 0 and {is_eml_idle} = 0, concat({linked_account_id},
    {Transcoding Profile}, formatDate({usage_date}, "yyyyMMdd'T'HHmmss")), "")
  Name: eml_transcode_profile_hour
- DataSetIdentifier: msih_view
  Expression: sumOver(sum({Amortized Cost}), [{Reservation Profile}])/sumOver(sum({usage_quantity}),
    [{Reservation Profile}])
  Name: eml_unit_cost_by_reservation_profile
- DataSetIdentifier: msih_view
  Expression: |-
    floor(sum(ifelse({charge_type} <> "RIFee" and strlen({Reservation Profile}) > 0 and {is_eml_idle} = 0, {usage_quantity} / ifelse({usage_date} > {first_hourly_date}, 1, 24), 0),
        [concat({payer_account_id}, {Reservation Profile}, formatDate({usage_date}, "yyyyMMdd'T'HHmmss"))]
    ))
  Name: eml_usage_amount_by_profile_per_hour
- DataSetIdentifier: msih_view
  Expression: median({usage_quantity}, [{eml_transcode_profile_hour}])
  Name: eml_usage_amount_per_hour_median
- DataSetIdentifier: msih_view
  Expression: sumOver((ifelse({EML Reservation Status} = "Active" and truncDate("MM",
    {billing_period}) = truncDate("MM", now()) , {reservation_count}, 0)), [{reservation_account_scope},{Reservation
    Profile}], PRE_FILTER)
  Name: existing_reservation_count
- DataSetIdentifier: msih_view
  Expression: minOver(ifelse(extract("HH", {usage_date}) = 1, {usage_date}, null),
    [{product_code}], PRE_FILTER)
  Name: first_hourly_date
- DataSetIdentifier: msih_view
  Expression: parseInt(substring(formatDate({usage_date}, "dd/MM/yyyy HH:mm:ss"),
    12, 2))
  Name: hour_of_day
- DataSetIdentifier: msih_view
  Expression: dateDiff({billing_period}, addDateTime(1, "MM", {billing_period}), "HH")
  Name: hours_in_month
- DataSetIdentifier: msih_view
  Expression: |-
    ifelse(
        ${IncludePricingAdjustments} = "Yes", 1,
        locate({charge_type}, "Discount", 0) > 0, 0,
        1
    )
  Name: is_discount_line
- DataSetIdentifier: msih_view
  Expression: ifelse(locate({product_code},"Media",0) > 0, 1, 0)
  Name: is_elemental_service
- DataSetIdentifier: msih_view
  Expression: "ifelse(\n\toperation = \"CHANNEL_INPUT\" or operation = \"CHANNEL_OUTPUT\"\
    , 1,\n    0\n)"
  Name: is_eml_active_transcode
- DataSetIdentifier: msih_view
  Expression: ifelse(contains({usage_type}, "IDLE"),1,0)
  Name: is_eml_idle
- DataSetIdentifier: msih_view
  Expression: "ifelse(\n\tcontains({product_code}, \"MediaPackage\"),\n\t\tifelse(\n\
    \t\t\tcontains({usage_type}, \"DataTransfer\") or contains({usage_type}, \"AWS-Out\"\
    ) or contains({usage_type}, \"CloudFront\"), 1,\n\t\t\t0\n\t\t),\n    0\n)"
  Name: is_emp_data_transfer
- DataSetIdentifier: msih_view
  Expression: ifelse(dateDiff({usage_date}, {last_refresh_date}, "DD") < 25, 1, 0)
  Name: is_last_30days_collected
- DataSetIdentifier: msih_view
  Expression: "ifelse(\n\toperation = \"CHANNEL_INPUT\" or operation = \"CHANNEL_OUTPUT\"\
    , 1,\n    contains({Usage Category}, \"Transcod\"), 1,\n    contains({Usage Category},\
    \ \"Idle Input\"), 1,\n    0\n)"
  Name: is_transcode_or_idle_usage
- DataSetIdentifier: msih_view
  Expression: '{Public Cost} - Cost'
  Name: public_vs_actual_cost_delta
- DataSetIdentifier: msih_view
  Expression: ifelse(strlen(region) = 0, NULL, region)
  Name: region_or_null
- DataSetIdentifier: msih_view
  Expression: ifelse(${ReservationLevel} = "Payer", concat({Payer Account}, " (payer)"),
    {Linked Account})
  Name: reservation_account_scope
- DataSetIdentifier: msih_view
  Expression: ({usage_quantity}/(24 * (${EmlLookbackDays}-1)))
  Name: usage_divided_by_lookback_hours
- DataSetIdentifier: msih_view
  Expression: '{usage_quantity}/24'
  Name: usage_hour_days_per_day
ColumnConfigurations:
- Column:
    ColumnName: reservation_count_candidate
    DataSetIdentifier: msih_reservation_optimize
  Role: MEASURE
- Column:
    ColumnName: existing_reservation_count
    DataSetIdentifier: msih_view
  Role: DIMENSION
DataSetIdentifierDeclarations:
- DataSetArn: arn:aws:quicksight:::dataset/media-services-insights-reservations
  Identifier: msih_reservations
- DataSetArn: arn:aws:quicksight:::dataset/msih_reservation_optimize
  Identifier: msih_reservation_optimize
- DataSetArn: arn:aws:quicksight:::dataset/media-services-insights-main
  Identifier: msih_view
FilterGroups:
- CrossDataset: ALL_DATASETS
  FilterGroupId: 0c1a1d55-3914-41f3-8497-7e244b3f89fc
  Filters:
  - CategoryFilter:
      Column:
        ColumnName: product_code
        DataSetIdentifier: msih_view
      Configuration:
        FilterListConfiguration:
          CategoryValues:
          - AWSElementalMediaLive
          MatchOperator: CONTAINS
          NullOption: NON_NULLS_ONLY
      FilterId: b322af57-cd19-4a40-bc4a-7f167234cea0
  ScopeConfiguration:
    SelectedSheets:
      SheetVisualScopingConfigurations:
      - Scope: ALL_VISUALS
        SheetId: dfa09e95-605b-41cc-8a7d-a55153c9d0dc
  Status: ENABLED
