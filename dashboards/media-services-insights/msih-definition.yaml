      \  <inline color=\"#fec48c\" font-size=\"30px\">SAGE</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"36px\">\_C</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      30px\">ATEGORIES</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Data Transfer CloudFront (GB):\_</i>\n        </b>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Data transfer\
      \ outbound through CloudFront</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Data Transfer Cross Region In (GB):\_</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n    \
      \    <i>Data transfer inbound from one region to another</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Data Transfer Cross Region\
      \ Out (GB):\_</i>\n        </b>\n      </inline>\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>Data transfer outbound from one region to\
      \ another</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n        \
      \  <i>Data Transfer Internet (GB):\_</i>\n        </b>\n      </inline>\n  \
      \    <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Data transfer\
      \ outbound to the Internet</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Live Ingest (GB):\_</i>\n        </b>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Size of ingested\
      \ live streams into AEMP live channels</i>\n      </inline>\n    </li>\n   \
      \ <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\"\
      >\n        <b>\n          <i>Live Origination &amp; Packaging (GB):\_</i>\n\
      \        </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>Size of live content delivered as output streams from AEMP</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>VOD Origination &amp;\
      \ Packaging (GB):</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <b>\n          <i>\_</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n    \
      \    <i>Size of VOD content delivered as output from AEMP</i>\n      </inline>\n\
      \    </li>\n  </ul>\n</text-box>"
