  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-size=\"40px\">\n    <b>AWS\_\
      </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"40px\">\n    <b>Elemental\
      \ MediaTailor\_</b>\n  </inline>\n  <inline color=\"#cbcbcb\" font-size=\"30px\"\
      >\n    <b>(AEMT)</b>\n  </inline>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      20px\">\_\_\_</inline>\n  <inline color=\"#fec48c\" font-size=\"22px\">\n  \
      \  <b>S</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"18px\">\n\
      \    <b>ECTIONS</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Usage Summary</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <i>\_</i>\n      </inline>\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <i>looks at usage by various\
      \ categories, including usage hours and ad activity.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Cost Summary</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n    \
      \    <i>\_provides breakouts by various dimensions.</i>\n      </inline>\n \
      \   </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Resource Detail\_</i>\n        </b>\n   \
      \   </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n       \
      \ <i>reveals different dimensions of specific service resources.</i>\n     \
      \ </inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\"\
      \ font-size=\"22px\">\n    <b>\_\_\_G</b>\n  </inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"18px\">\n    <b>UIDANCE</b>\n  </inline>\n  <br/>\n  <ul>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline color=\"#09add4\" font-size=\"\
      16px\">\n        <a href=\"https://aws.amazon.com/mediatailor/pricing/\" target=\"\
      _blank\">\n          <b>\n            <i>\n              <u>AEMT pricing and\
      \ cost</u>\n            </i>\n          </b>\n        </a>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_is primarily\
      \ driven by ad insertions and channel assembly.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>Select the Usage Category or categories you wish to view\
      \ from the list.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>To analyze\
      \ Usage, avoid mixing categories that measure by different units. For example,\
      \ \"Hrs\"  and \"Count\".</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\">\n      \
      \  <i>To analyze Cost, you can mix different units because the end measure is\
      \ cost.</i>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
