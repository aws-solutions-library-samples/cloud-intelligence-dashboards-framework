            \          <i>\_</i>\n            </b>\n          </inline>\n        \
            \  <inline color=\"Accent\">\n            <i>increased by\_</i>\n    \
            \      </inline>\n        </if>\n        <if condition=\"ifelse(BottomMovers.isPercentDifference,\
            \ BottomMovers.items[index].percentDifference.value, BottomMovers.items[index].absoluteDifference.value)\
            \ &lt; 0\" level=\"inline\">\n          <inline color=\"Accent\">\n  \
            \          <b>\n              <i>\_</i>\n            </b>\n          </inline>\n\
