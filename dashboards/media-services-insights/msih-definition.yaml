  SheetId: c6a5a412-51db-47f6-bf6f-ef99f809571e
  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-size=\"40px\">\n    <b>AWS\_\
      </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"40px\">\n    <b>Elemental\
      \ MediaConnect\_</b>\n  </inline>\n  <inline color=\"#cbcbcb\" font-size=\"\
      30px\">\n    <b>(AEMX)</b>\n  </inline>\n  <br/>\n  <inline color=\"#fec48c\"\
      \ font-size=\"20px\">\_\_\_</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      22px\">\n    <b>S</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      18px\">\n    <b>ECTIONS</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Usage Summary</i>\n        </b>\n      </inline>\n    \
      \  <inline color=\"#fc850d\" font-size=\"16px\">\n        <i>\_</i>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>looks at the\
      \ overall stream usage from Data Transfer In and Out and running flows, broken\
      \ down to forecasted, monthly and hourly charts.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Cost Summary</i>\n        </b>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <b>\n        \
      \  <i>\_</i>\n        </b>\n      </inline>\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>looks at total costs of streams  cost per\
      \ usage category breakdowns from flow hours to data transfer.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Data Transfer</i>\n       \
      \ </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\"\
      >\n        <b>\n          <i>\_</i>\n        </b>\n      </inline>\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <i>explores usage and trends\
      \ specific to differnt types of data transfer</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Resource Detail\_</i>\n        </b>\n   \
      \   </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n       \
      \ <i>reveals different dimensions of specific service resources.</i>\n     \
      \ </inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\"\
      \ font-size=\"22px\">\n    <b>\_\_\_G</b>\n  </inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"18px\">\n    <b>UIDANCE</b>\n  </inline>\n  <br/>\n  <ul>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline color=\"#09add4\" font-size=\"\
      16px\">\n        <a href=\"https://aws.amazon.com/mediaconnect/pricing/\" target=\"\
      _blank\">\n          <b>\n            <i>\n              <u>AEMX pricing and\
      \ costs</u>\n            </i>\n          </b>\n        </a>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_are driven\
      \ by Running Flows and Data Transfer.</i>\n      </inline>\n    </li>\n    <li\
      \ class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\"\
      >\n        <i>Select the Usage Category or categories you wish to view from\
      \ the list.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>To analyze\
      \ Usage, avoid mixing categories that measure by different units. For example,\
      \ \"Hrs\"  and \"GB\".</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>To analyze\
      \ Cost, you can mix different units because the end measure is cost.</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Identify average Internet data transfer;\
      \ Reserved Outbound Bandwidth can reduce such cost by up to 70%.</i>\n     \
      \ </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Check your AMEX flows inventory for\
      \ flows that has no destination output, which still incur hourly cost.</i>\n\
      \      </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 7aa11026-e9a8-4278-aea8-0fe2fd7c882c
