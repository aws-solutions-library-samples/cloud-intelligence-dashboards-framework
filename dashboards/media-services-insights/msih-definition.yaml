  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-size=\"36px\">\n    <b>AWS\_\
      </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"36px\">\n    <b>Elemental\
      \ MediaConvert\_</b>\n  </inline>\n  <inline color=\"#cbcbcb\" font-size=\"\
      30px\">\n    <b>(AEMC)</b>\n  </inline>\n  <br/>\n  <inline color=\"#fec48c\"\
      \ font-size=\"20px\">\_\_\_</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      22px\">\n    <b>S</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      18px\">\n    <b>ECTIONS</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Usage Summary</i>\n        </b>\n      </inline>\n    \
      \  <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_looks at channel\
      \ usage by various categories.</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Cost Summary</i>\n        </b>\n      </inline>\n     \
      \ <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_provides breakouts\
      \ by various dimensions.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Transcoding</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <b>\n          <i>\_</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n    \
      \    <i>explores trends by parameter profiles.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Job Detail</i>\n        </b>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <b>\n        \
      \  <i>\_</i>\n        </b>\n      </inline>\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>reveals different dimensions of individual\
      \ jobs.</i>\n      </inline>\n    </li>\n  </ul>\n  <br/>\n  <inline font-size=\"\
      16px\">\n    <i>\_</i>\n  </inline>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      22px\">\n    <b>\_\_\_G</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      18px\">\n    <b>UIDANCE</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#09add4\" font-size=\"16px\">\n      \
      \  <a href=\"https://aws.amazon.com/mediaconvert/pricing/\" target=\"_blank\"\
      >\n          <b>\n            <i>\n              <u>AEMC pricing and cost</u>\n\
      \            </i>\n          </b>\n        </a>\n      </inline>\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <b>\n          <i>\n      \
      \      <u>\_</u>\n          </i>\n        </b>\n      </inline>\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <i>is primarily driven by\_\
      </i>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n\
      \        <b>\n          <i>transcoding time</i>\n        </b>\n      </inline>\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>, as measured\
      \ in minutes (Mins).</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Select the\
      \ Usage Category or categories you wish to view from the list.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>To analyze Usage, avoid mixing categories\
      \ that measure by different units. For example, \"Hrs\"  and \"GB\".</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>To analyze Cost, you can mix different\
      \ units because the end measure is cost.</i>\n      </inline>\n    </li>\n \
      \ </ul>\n</text-box>"
