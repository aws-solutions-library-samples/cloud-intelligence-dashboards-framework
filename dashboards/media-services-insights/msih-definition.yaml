  - Content: "<text-box>\n  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      36px\">I</inline>\n  <inline color=\"#fec48c\" font-size=\"30px\">DLE</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"32px\">\_</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"36px\">R</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      30px\">ESOURCES</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Idle channels\
      \ and inputs should be reviewed for potential cost inefficiencies because they\
      \ are billed like active channels but at a lower rate.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>Idle Input hours usage should be lowered \
      \ as much as possible, by deleting MediaLive Inputs that are not attached to\
      \ any channel.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Idle channel\
      \ hours usage should be lowered as much as possible whenever possible, you can\
      \ do this by deleting stopped channel.</i>\n      </inline>\n    </li>\n  </ul>\n\
      \  <br/>\n</text-box>"
    SheetTextBoxId: 0e3cebf0-8e51-4f8a-8a6d-d7decda31c44
  - Content: "<text-box>\n  <inline color=\"#fec48c\" font-size=\"24px\">T</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"20px\">RANSCODING</inline>\n  <inline\
      \ color=\"#fec48c\" font-size=\"24px\">\_P</inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"20px\">ROFILE</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      24px\">\_K</inline>\n  <inline color=\"#fec48c\" font-size=\"20px\">EY</inline>\n\
      \  <br/>\n  <br/>\n  <inline font-size=\"16px\">Transcoding profiles are combinations\
      \ of the following:</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Pipes:</i>\n        </b>\n      </inline>\n      <inline font-size=\"\
      16px\">\n        <i>\_Standard Pipeline (2 AZs) or a single pipeline</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>Region:</i>\n     \
      \   </b>\n      </inline>\n      <inline font-size=\"16px\">\n        <i>\_\
      AWS region for the channel</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Flow Direction:</i>\n        </b>\n      </inline>\n  \
      \    <inline font-size=\"16px\">\n        <i>\_In or Out</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Codec:</i>\n        </b>\n\
      \      </inline>\n      <inline font-size=\"16px\">\n        <i>\_Video codec\
      \ or Audio</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n        \
      \  <i>Resolution:</i>\n        </b>\n      </inline>\n      <inline font-size=\"\
      16px\">\n        <i>\_SD, HD. UHD</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <b>\n          <i>Bitrate:</i>\n        </b>\n      </inline>\n      <inline\
      \ font-size=\"16px\">\n        <i>\_Measured in megabits per second</i>\n  \
      \    </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>Framerate:\_</i>\n\
      \        </b>\n      </inline>\n      <inline font-size=\"16px\">\n        <i>Frames-per-second\
      \ (fps)</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n  \
      \    <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n          <i>Video\
      \ quality:</i>\n        </b>\n      </inline>\n      <inline font-size=\"16px\"\
      >\n        <i>\_Standard vs. Enhanced</i>\n      </inline>\n    </li>\n  </ul>\n\
      </text-box>"
    SheetTextBoxId: e77d2466-9c09-4144-be75-c202f7707ba6
  - Content: "<text-box>\n  <inline color=\"#fec48c\" font-size=\"36px\">U</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"30px\">SAGE</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"36px\">\_C</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      30px\">ATEGORIES</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Channel Feature (Hrs):</i>\n        </b>\n      </inline>\n      <inline\
      \ font-size=\"16px\">\n        <b>\n          <i>\_</i>\n        </b>\n    \
      \  </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Duration\
      \ of add-on features, such as Advanced audio and Motion graphics.</i>\n    \
      \  </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>Data Transfer (GB):</i>\n\
      \        </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <b>\n          <i>\_</i>\n        </b>\n      </inline>\n \
      \     <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Amount of data\
      \ transferred as an input to or output from channels</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Idle Channel (Hrs):</i>\n \
      \       </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <b>\n          <i>\_</i>\n        </b>\n      </inline>\n \
      \     <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Duration of\
      \ inactive (stopped) MediaLive channels</i>\n      </inline>\n    </li>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Idle Inputs (Hrs):</i>\n        </b>\n  \
      \    </inline>\n      <inline color=\"#fec48c\" font-size=\"16px\">\n      \
      \  <b>\n          <i>\_</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Duration in hours for an active MediaLive\
      \ input not attached to any channel.</i>\n      </inline>\n    </li>\n    <li\
      \ class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\"\
      >\n        <b>\n          <i>Input Transcoding (Hrs):</i>\n        </b>\n  \
      \    </inline>\n      <inline color=\"#fc850d\" font-size=\"16px\">\n      \
      \  <i>\_</i>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>\_Duration of actively processing a channel attached input\
      \ video streams</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Output Transcoding (Hrs):</i>\n        </b>\n      </inline>\n     \
      \ <inline color=\"#efefe9\" font-size=\"16px\">\n        <b>\n          <i>\_\
      </i>\n        </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>Duration of actively processing output transcoding profiles</i>\n\
      \      </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 79cf4f10-38ee-495a-bb56-3af585cfdaca
