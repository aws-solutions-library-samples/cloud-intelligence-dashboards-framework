  - Content: "<text-box>\n  <inline color=\"#fec48c\" font-size=\"36px\">U</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"30px\">SAGE</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"36px\">\_C</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      30px\">ATEGORIES</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n        \
      \  <i>Ad Delivery (GB):</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <b>\n          <i>\_</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n    \
      \    <i>Measures the bandwidth used to serve personalized ads to end-users.\
      \ You incur charges when you deliver ad segments and personalized manifests\
      \ viar the internet or Amazon CloudFront.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Ad Insertions (count):</i>\n        </b>\n\
      \      </inline>\n      <inline color=\"#fec48c\" font-size=\"16px\">\n    \
      \    <b>\n          <i>\_</i>\n        </b>\n      </inline>\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <i>Measures the number of ads\
      \ inserted into video streams, either Live or VOD.</i>\n      </inline>\n  \
      \  </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Channel Assembly (Hrs):</i>\n        </b>\n\
      \      </inline>\n      <inline font-size=\"16px\">\n        <b>\n         \
      \ <i>\_</i>\n        </b>\n      </inline>\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>Measures the duration that a channel assembly\
      \ is active and running; it accounts for linear streaming channels from existing\
      \ video-on-demand (VOD) and live content and is either Basic or Standard tiers.</i>\n\
      \      </inline>\n    </li>\n  </ul>\n</text-box>"
