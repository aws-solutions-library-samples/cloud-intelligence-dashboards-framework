  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-size=\"40px\">\n    <b>AEML\_\
      </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"40px\">\n    <b>Reservations\
      \ &amp; Savings</b>\n  </inline>\n  <br/>\n  <inline color=\"#efefe9\" font-size=\"\
      16px\">\n    <i>This tab analyzes AWS Elemental MediaLive reservation usage\
      \ and opportunity.</i>\n  </inline>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\"\
      \ font-size=\"24px\">\n    <b>\_S</b>\n  </inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"20px\">\n    <b>ECTIONS</b>\n  </inline>\n  <br/>\n  <ul>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <b>\n          <i>Savings Overview</i>\n        </b>\n    \
      \  </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <b>\n\
      \          <i>\_</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>summarizes the past and some potential\
      \ savings opportunities and compares to od-demand costs.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n        <b>\n          <i>Efficiency Tracking</i>\n \
      \       </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <b>\n          <i>\_</i>\n        </b>\n      </inline>\n \
      \     <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>looks at the\
      \ overall utilization of existing reservations as well as coverage effectiveness\
      \ for various transcoding profiles.</i>\n      </inline>\n    </li>\n    <li\
      \ class=\"ql-indent-0\">\n      <inline color=\"#fc850d\" font-size=\"16px\"\
      >\n        <b>\n          <i>Additional Opportunity</i>\n        </b>\n    \
      \  </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_\
      explores opportunity for new or additional savings.</i>\n      </inline>\n \
      \   </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      24px\">\_\_</inline>\n  <inline color=\"#fec48c\" font-size=\"24px\">\n    <b>G</b>\n\
      \  </inline>\n  <inline color=\"#fec48c\" font-size=\"20px\">\n    <b>UIDANCE</b>\n\
      \  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ color=\"#efefe9\" font-size=\"16px\">\n        <i>Savings estimations are\
      \ based on up to\_</i>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>\n          <expression>${EmlReservationSavingRate}</expression>\n\
      \        </i>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>% discount from public on demand pricing.\_</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>Adjust the discount % to model your particular\
      \ usage patterns and regional pricing.</i>\n      </inline>\n    </li>\n   \
      \ <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\"\
      >\n        <i>Use the controls at the top of the tab to filter your profile\
      \ scope.</i>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 9b2dd7a7-0f08-4323-8bc5-1addd986224b
  - Content: "<text-box>\n  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      36px\"/>\n  <inline color=\"#fec48c\" font-size=\"36px\">S</inline>\n  <inline\
      \ color=\"#fec48c\" font-size=\"30px\">AVINGS</inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"36px\">\_O</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      30px\">VERVIEW</inline>\n</text-box>"
    SheetTextBoxId: 25ae5434-01af-4fd6-b505-ca73df85ee6e
  - Content: "<text-box>\n  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      36px\">A</inline>\n  <inline color=\"#fec48c\" font-size=\"30px\">DDITIONAL</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"36px\">\_O</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"30px\">PPORTUNITY\_</inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"36px\">M</inline>\n  <inline color=\"#fec48c\" font-size=\"30px\"\
      >ODELER</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Use these visuals\
      \ to identify parameter combinations that could benefit from additional reservation\
      \ coverage.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Adjust the\
      \ Lookback Days to change the time scope of the calculations.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>The modeler is currently based on purchasing\
      \ at the payer account level only.</i>\n      </inline>\n    </li>\n    <li\
      \ class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\"\
      >\n        <b>\n          <i>NOTE:</i>\n        </b>\n      </inline>\n    \
      \  <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>\_Values can be\
      \ distorted if the lookback period spans past recent new reservation purchases.</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>See also:\_</i>\n      </inline>\n\
      \      <inline color=\"#09add4\" font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/medialive/latest/ug/input-output-reservations.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\n              <u>How input\
      \ and output reservations work</u>\n            </i>\n          </b>\n     \
      \   </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n     \
      \ <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>See also:\_</i>\n\
      \      </inline>\n      <inline color=\"#09add4\" font-size=\"16px\">\n    \
      \    <a href=\"https://docs.aws.amazon.com/medialive/latest/ug/purchasing-reservations.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\n              <u>Purchasing\
      \ Elemental MediaLive reservations</u>\n            </i>\n          </b>\n \
      \       </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n \
      \     <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>The Minimum\
      \ number represents the lowest concurrent usage rate of channels during any\
      \ 1-hour window over the last 30 days. Purchasing reservations at that level\
      \ should be 100% utilized, if past patterns continue.</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>The Maximum number represents the highest\
      \ concurrent usage rate of channels during any 1-hour window over the last 30\
      \ days. Purchasing reservations at that level might not be 100% utilized, if\
      \ past patterns continue.</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\">\n      \
      \  <i>The Median number shows the 50% threshold at which half of the 1-hour\
      \ windows had a concurrency rate of less than the median number and half had\
      \ more. Purchasing reservations at this level might not be 100% utilized but\
      \ should be more utilized than the Maximum number, if past patterns over the\
      \ last 30 days continue. You may consider purchasing at this levels and still\
      \ save money, even if they are not 100% utilized, because the cost savings of\
      \ the overall amount to transcoding time being discounted is significant enough\
      \ to offset the unused time for that reservation.\_</i>\n      </inline>\n \
      \   </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline color=\"#efefe9\" font-size=\"\
      16px\">An EML reservation can only be used on one channel at a time. The recommendations\
      \ presented below have three types of calculations to project a potential purchase\
      \ amount for your consideration. In all cases, you should consider if your future\
      \ usage for each account and profile will continue as your previous usage evaluated\
      \ in the lookback scope. You can further tweak the number for more refined savings\
      \ estimations.</inline>\n</text-box>"
    SheetTextBoxId: 3f2bab35-3767-4932-b8ea-b11eec5dcdae
  - Content: "<text-box>\n  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#fec48c\" font-size=\"\
      36px\"/>\n  <inline color=\"#fec48c\" font-size=\"36px\">E</inline>\n  <inline\
      \ color=\"#fec48c\" font-size=\"32px\">FFICIENCY</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"36px\">\_T</inline>\n  <inline color=\"#fec48c\" font-size=\"\
      32px\">RACKING</inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Use these\
      \ visuals to track overall coverage and utilization for your existing reservations.</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Median reservation utilization is\
      \ based on an accounting for each hour of the month. In some cases a few hours\
      \ of a day may reflect low utilization, which can be masked by the larger proportion\
      \ of higher utilization.\_</i>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"16px\">\n      \
      \  <i>Use the threshold slider to inspect for reservations that potentially\
      \ have brief periods of low utilization.</i>\n      </inline>\n    </li>\n \
      \ </ul>\n</text-box>"
    SheetTextBoxId: d51c35cd-d554-4639-82ec-713b929e75a6
  - Content: "<text-box>\n  <inline color=\"#fec48c\" font-size=\"24px\">A</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"20px\">BOUT\_</inline>\n  <inline color=\"\
      #fec48c\" font-size=\"24px\">AEML R</inline>\n  <inline color=\"#fec48c\" font-size=\"\
