        CustomNarrative:
          Narrative: "<narrative>\n  <if condition=\"TopMovers.itemsCount = 0\" level=\"\
            block\">\n    <b>\n      <i>There are no top movers.</i>\n    </b>\n \
            \ </if>\n  <br/>\n  <if condition=\"TopMovers.itemsCount &gt; 0\" level=\"\
            block\">\n    <b>Top movers</b>\n    <if condition=\"TopMovers.itemsCount\
            \ &gt; 1\" level=\"inline\"/>\n    <b>\_for\_</b>\n    <b>\n      <expression>TopMovers.endTimeValue.formattedValue</expression>\n\
            \    </b>\n    <if condition=\"TopMovers.itemsCount &gt; 1\" level=\"\
            inline\">\n      <b>\_are:</b>\n    </if>\n    <if condition=\"TopMovers.itemsCount\
            \ &lt; 2\" level=\"inline\">\n      <b>\_is:</b>\n    </if>\n  </if>\n\
            \  <br/>\n  <for level=\"block\" listExpression=\"TopMovers.items\">\n\
            \    <ul>\n      <li class=\"ql-indent-0\">\n        <inline color=\"\
            #fc850d\">\n          <b>\n            <i>\n              <expression>TopMovers.items[index].categoryValue.formattedValue</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <if condition=\"\
            ifelse(TopMovers.isPercentDifference, TopMovers.items[index].percentDifference.value,\
            \ TopMovers.items[index].absoluteDifference.value) &gt;= 0\" level=\"\
            inline\">\n          <inline color=\"Accent\">\n            <b>\n    \
            \          <i>\_</i>\n            </b>\n          </inline>\n        \
            \  <inline color=\"Accent\">\n            <i>usage increased by\_</i>\n\
            \          </inline>\n        </if>\n        <if condition=\"ifelse(TopMovers.isPercentDifference,\
            \ TopMovers.items[index].percentDifference.value, TopMovers.items[index].absoluteDifference.value)\
            \ &lt; 0\" level=\"inline\">\n          <inline color=\"Accent\">\n  \
            \          <i>\_decreased by\_</i>\n          </inline>\n        </if>\n\
            \        <inline color=\"Accent\">\n          <b>\n            <i>\n \
            \             <expression>ifelse(TopMovers.isPercentDifference, TopMovers.items[index].percentDifference.formattedAbsoluteValue,\
            \ TopMovers.items[index].absoluteDifference.formattedAbsoluteValue)</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <inline\
            \ color=\"Accent\">\n          <b>\n            <i>\_(</i>\n         \
            \ </b>\n        </inline>\n        <inline color=\"Accent\">\n       \
            \   <b>\n            <i>\n              <expression>ifelse(TopMovers.isPercentDifference,\
            \ TopMovers.items[index].absoluteDifference.formattedValue, TopMovers.items[index].percentDifference.formattedValue)</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <inline\
            \ color=\"Accent\">\n          <b>\n            <i>)\_</i>\n         \
            \ </b>\n        </inline>\n        <i>from\_</i>\n        <i>\n      \
            \    <expression>TopMovers.items[index].previousMetricValue.formattedValue</expression>\n\
            \        </i>\n        <i>\_to\_</i>\n        <i>\n          <expression>TopMovers.items[index].currentMetricValue.formattedValue</expression>\n\
            \        </i>\n        <i>.</i>\n      </li>\n    </ul>\n  </for>\n  <br/>\n\
            \  <if condition=\"BottomMovers.itemsCount = 0\" level=\"inline\">\n \
            \   <b>\n      <i>There are no bottom movers</i>\n    </b>\n  </if>\n\
            \  <br/>\n  <if condition=\"BottomMovers.itemsCount &gt; 0\" level=\"\
            block\">\n    <b>Bottom movers</b>\n    <if condition=\"BottomMovers.itemsCount\
            \ &gt; 1\" level=\"inline\">\n      <b>s</b>\n    </if>\n    <b>\_for\_\
            </b>\n    <b>\n      <expression>BottomMovers.endTimeValue.formattedValue</expression>\n\
            \    </b>\n    <if condition=\"BottomMovers.itemsCount &gt; 1\" level=\"\
            inline\"/>\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"\
            BottomMovers.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n  \
            \      <inline color=\"#fc850d\">\n          <b>\n            <i>\n  \
            \            <expression>BottomMovers.items[index].categoryValue.formattedValue</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <if condition=\"\
            ifelse(BottomMovers.isPercentDifference, BottomMovers.items[index].percentDifference.value,\
            \ BottomMovers.items[index].absoluteDifference.value) &gt;= 0\" level=\"\
            inline\">\n          <inline color=\"Accent\">\n            <b>\n    \
            \          <i>usage\_</i>\n            </b>\n          </inline>\n   \
            \       <inline color=\"Accent\">\n            <i>increased by\_</i>\n\
            \          </inline>\n        </if>\n        <if condition=\"ifelse(BottomMovers.isPercentDifference,\
            \ BottomMovers.items[index].percentDifference.value, BottomMovers.items[index].absoluteDifference.value)\
            \ &lt; 0\" level=\"inline\">\n          <inline color=\"Accent\">\n  \
            \          <b>\n              <i>\_</i>\n            </b>\n          </inline>\n\
            \          <inline color=\"Accent\">\n            <i>decreased by</i>\n\
            \          </inline>\n          <inline color=\"Accent\">\n          \
            \  <b>\n              <i>\_</i>\n            </b>\n          </inline>\n\
            \        </if>\n        <inline color=\"Accent\">\n          <b>\n   \
            \         <i>\n              <expression>ifelse(BottomMovers.isPercentDifference,\
            \ BottomMovers.items[index].percentDifference.formattedAbsoluteValue,\
            \ BottomMovers.items[index].absoluteDifference.formattedAbsoluteValue)</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <inline\
            \ color=\"Accent\">\n          <b>\n            <i>\_(</i>\n         \
            \ </b>\n        </inline>\n        <inline color=\"Accent\">\n       \
            \   <b>\n            <i>\n              <expression>ifelse(BottomMovers.isPercentDifference,\
            \ BottomMovers.items[index].absoluteDifference.formattedValue, BottomMovers.items[index].percentDifference.formattedValue)</expression>\n\
            \            </i>\n          </b>\n        </inline>\n        <inline\
            \ color=\"Accent\">\n          <b>\n            <i>)\_</i>\n         \
            \ </b>\n        </inline>\n        <i>from\_</i>\n        <i>\n      \
            \    <expression>BottomMovers.items[index].previousMetricValue.formattedValue</expression>\n\
            \        </i>\n        <i>\_to\_</i>\n        <i>\n          <expression>BottomMovers.items[index].currentMetricValue.formattedValue</expression>\n\
            \        </i>\n        <i>.</i>\n      </li>\n    </ul>\n  </for>\n</narrative>"
