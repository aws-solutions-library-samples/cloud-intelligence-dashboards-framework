      \      </inline>\n      <inline font-size=\"16px\">\n        <i>\_</i>\n   \
      \   </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n       \
      \ <i>look at total costs of input and output transcoding hours across different\
      \ profile parameters.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#fc850d\" font-size=\"16px\">\n        <b>\n      \
      \    <i>Transcoding</i>\n        </b>\n      </inline>\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <b>\n          <i>\_looks</i>\n     \
      \   </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\"\
      >\n        <i>\_at usage and cost by profile and purchase option.</i>\n    \
      \  </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>Channel Detail</i>\n\
      \        </b>\n      </inline>\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>\_explores usage and trends for individual channels.</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #fc850d\" font-size=\"16px\">\n        <b>\n          <i>Idle Resources</i>\n\
      \        </b>\n      </inline>\n      <inline color=\"#fc850d\" font-size=\"\
      16px\">\n        <i>\_</i>\n      </inline>\n      <inline color=\"#efefe9\"\
      \ font-size=\"16px\">\n        <i>explores usage and cost of idle input and\
      \ channel resources.</i>\n      </inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n\
      \  <inline color=\"#fec48c\" font-size=\"22px\">\n    <b>\_\_\_G</b>\n  </inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"18px\">\n    <b>UIDANCE</b>\n  </inline>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#09add4\"\
      \ font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/medialive/latest/ug/pricing.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\n              <u>AEML\
      \ pricing and cost</u>\n            </i>\n          </b>\n        </a>\n   \
      \   </inline>\n      <inline color=\"#efefe9\" font-size=\"16px\">\n       \
      \ <i>\_is primarily driven by transcoding time, as measured in hours (Hrs).</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Additional cost influencers include\
      \ channel features and idle resource time.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>Select the Usage Category or categories you wish to view\
      \ from the list.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>To analyze\
      \ Usage, avoid mixing categories that measure by different units. For example,\
      \ \"Hrs\"  and \"GB\".</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>To analyze\
      \ Cost, you can mix different units because the end measure is cost.</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Cost spikes may be driven by reservation\
      \ purchases; adjust the Cost Model to show either Invoice or Amortized views\
      \ of reserved usage.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>Consider\
      \ using MediaPackage or Cloudfront to reduce Data Transfer Out costs.</i>\n\
      \      </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 8cbd6d6e-1de4-4585-bb72-980c3f633759
  - Content: |-
      <text-box>
        <br/>
        <br/>
        <br/>
        <inline color="#fec48c" font-size="36px"/>
        <inline color="#fec48c" font-size="36px">T</inline>
        <inline color="#fec48c" font-size="30px">RANSCODING</inline>
        <br/>
        <br/>
        <ul>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Transcoding metering is based on several parameters that form a profile, including: number of pipes, region, flow direction, codec, resolution, bitrate, framerate and quality</i>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Charts in this section EXCLUDE idle resource time</i>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Identify transcoding profiles that will have steady or increase traffic for the coming 12 months and proceed with the reservations to reduce their cost.</i>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Identify expensive transcoding profiles and leverage reservations if usage is expected to be the same or greater for the next 12 months.</i>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Review if high-resolution/frame-rate outputs align with viewer needs. Adjust the profiles if needed</i>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#efefe9" font-size="16px">
              <i>Use the Parameter Type toggle to compare between options for a given parameter. For example, select Resolution to compare SD vs HD</i>
            </inline>
          </li>
        </ul>
      </text-box>
    SheetTextBoxId: 143b2dcb-b6ac-4b19-a31d-3523842a0691
