      \ <i>\_is primarily driven by data transfer.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#efefe9\" font-size=\"\
      16px\">\n        <i>Select the Usage Category or categories you wish to view\
      \ from the list.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>For analyzing\
      \ Usage, avoid mixing categories that measure by different units. For example,\
      \ \"Hrs\"  and \"GB\".</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#efefe9\" font-size=\"16px\">\n        <i>For analyzing\
      \ Cost, you can mix different units because the end measure is cost.</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Identify Data Transfer to Internet\
      \ usage and consider delivering through CloudFront to optimize cost.</i>\n \
      \     </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #efefe9\" font-size=\"16px\">\n        <i>Regularly check the CloudFront Cache/hit\
      \ ratio, which should approach the 100% to reduce costs.</i>\n      </inline>\n\
      \    </li>\n  </ul>\n</text-box>"
