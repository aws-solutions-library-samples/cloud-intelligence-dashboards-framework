        CustomNarrative:
          Narrative: "<narrative>\n  <inline font-size=\"19.2px\">&#128260;\_</inline>\n\
            \  <inline font-size=\"19.2px\">\n    <b>Snapshot Backup month over month\
            \ insights for\_</b>\n  </inline>\n  <inline font-size=\"19.2px\">\n \
            \   <b>\n      <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \    </b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"19.2px\"\
            >Average Backup Percentage for\_</inline>\n  <inline font-size=\"19.2px\"\
            >\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </inline>\n  <if condition=\"PeriodOverPeriod.percentDifference.value\
            \ &gt;= 0\" level=\"inline\">\n    <inline color=\"Accent\" font-size=\"\
            19.2px\">\n      <b>\_</b>\n    </inline>\n    <inline color=\"#92ac61\"\
            \ font-size=\"19.2px\">\n      <b>increased by</b>\n    </inline>\n  \
            \  <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\_</b>\n \
            \   </inline>\n  </if>\n  <if condition=\"PeriodOverPeriod.percentDifference.value\
            \ &lt; 0\" level=\"inline\">\n    <inline color=\"#e86b5f\" font-size=\"\
            19.2px\">\n      <b>\_decreased by</b>\n    </inline>\n  </if>\n  <inline\
            \ color=\"Accent\" font-size=\"19.2px\">\n    <b>\_</b>\n  </inline>\n\
            \  <inline color=\"Accent\" font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.absoluteDifference.formattedValue</expression>\n\
            \    </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"19.2px\"\
            >\n    <b>\_\_</b>\n  </inline>\n  <inline font-size=\"19.2px\">from\_\
            </inline>\n  <inline font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.previousMetricValue.formattedValue</expression>\n\
            \    </b>\n  </inline>\n  <inline font-size=\"19.2px\">\_to\_</inline>\n\
            \  <inline font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.currentMetricValue.formattedValue</expression>\n\
            \    </b>\n  </inline>\n  <inline font-size=\"19.2px\">.</inline>\n  <br/>\n\
            \  <br/>\n  \u2197\uFE0FTop Movers :\n  <br/>\n  <if condition=\"TopMovers.itemsCount\
            \ = 0\" level=\"inline\">\n    \_No Top movers for\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  <br/>\n  <if condition=\"TopMovers.itemsCount &gt; 0\" level=\"\
            block\">\n    &#128314;There is\n    <b>\n      <expression>TopMovers.itemsCount</expression>\n\
            \    </b>\n    \_top mover for the month of\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \    \_:\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"TopMovers.items\"\
            >\n    <ul>\n      <li class=\"ql-indent-0\">\n        <b>\_Account\_\
            </b>\n        <b>\n          <expression>TopMovers.items[index].categoryValue.value</expression>\n\
            \        </b>\n        <b>\_backup percentage\_</b>\n        <inline color=\"\
            #92ac61\">\n          <b>\_increased from\_</b>\n        </inline>\n \
            \       <b>\n          <expression>TopMovers.items[index].previousMetricValue.formattedValue</expression>\n\
            \        </b>\n        <b>\_in\_</b>\n        <expression>PeriodToDate.previousTimeValue.formattedValue</expression>\n\
            \        \_to\n        <b>\n          <expression>TopMovers.items[index].currentMetricValue.formattedValue</expression>\n\
            \        </b>\n        <b>\_in\_</b>\n        <expression>PeriodToDate.currentTimeValue.formattedValue</expression>\n\
            \      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  \u2198\uFE0F Bottom\
            \ Movers :\n  <br/>\n  <if condition=\"BottomMovers.itemsCount = 0\" level=\"\
            inline\">\n    \_No Bottom Movers for\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  <br/>\n  <if condition=\"BottomMovers.itemsCount &gt; 0\"\
            \ level=\"block\">\n    &#128315;There is\n    <expression>BottomMovers.itemsCount</expression>\n\
            \    \_bottom movers for the month of\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \    \_:\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"BottomMovers.items\"\
            >\n    <ul>\n      <li class=\"ql-indent-0\">\n        <b>\_Account\_\
            </b>\n        <b>\n          <expression>BottomMovers.items[index].categoryValue.value</expression>\n\
            \        </b>\n        <b>\_backup percentage\_</b>\n        <inline color=\"\
            #e86b5f\">\n          <b>\_decreased from\_</b>\n        </inline>\n \
            \       <b>\n          <expression>BottomMovers.items[index].previousMetricValue.formattedValue</expression>\n\
            \        </b>\n        <b>\_in\_</b>\n        <expression>PeriodToDate.previousTimeValue.formattedValue</expression>\n\
            \        \_to\n        <b>\n          <expression>BottomMovers.items[index].currentMetricValue.formattedValue</expression>\n\
            \        </b>\n        <b>\_in\_</b>\n        <expression>PeriodToDate.currentTimeValue.formattedValue</expression>\n\
            \      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  &#128161; Key Insights:\n\
            \  <br/>\n  <if condition=\"BottomMovers.itemsCount &gt; 0\" level=\"\
            inline\">\n    - Atleast\n    <expression>BottomMovers.itemsCount</expression>\n\
            \    \_\_\_account[s] require immediate attention\n  </if>\n  <if condition=\"\
            BottomMovers.itemsCount = 0\" level=\"inline\">\n    \_- No Bottom movers\
            \ for the the month of\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  <br/>\n  <if condition=\"TopMovers.itemsCount &gt; 0\" level=\"\
            inline\">\n    - Total\n    <expression>TopMovers.itemsCount</expression>\n\
            \    account[s] showed improved backup coverage\n  </if>\n  <if condition=\"\
            TopMovers.itemsCount &lt; 1\" level=\"inline\">\n    \_- No top movers\
            \ for the month of\n    <expression>PeriodToDate.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  <br/>\n  <if condition=\"PeriodOverPeriod.percentDifference.value\
            \ &gt;= 0\" level=\"inline\">\n    - Overall RDS Backup Coverage improved\
            \ in\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  <if condition=\"PeriodOverPeriod.percentDifference.value &lt;\
            \ 0\" level=\"inline\">\n    \_- Overall RDS backup Coverage declined\
            \ in\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  </if>\n  \uFEFF\uFEFF\n  <br/>\n  <if condition=\"PeriodOverPeriod.percentDifference.value\
            \ &lt; 0\" level=\"inline\">\_- Recommended Action: Review the backup\
            \ policies to improve backup percentage</if>\n  <br/>\n  <if condition=\"\
            BottomMovers.itemsCount &gt; 0\" level=\"inline\">- Recommended Action:\
            \ Review Backup Policies for declining account[s]</if>\n  <br/>\n  <br/>\n\
            \  <br/>\n  <br/>\n  \u26A0\uFE0F Note: Overall average includes all accounts\
            \ in each period. New accounts added in\n  <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n\
            \  \_may impact the comparison.\n</narrative>"
