    SheetTextBoxId: 813d5dc3-ffba-4e19-b8aa-ff3d890a0305
  - Content: "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS\
      \ Cost and Usage Summary</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"\
      20px\">Comprehensive insights into AWS RDS usage and spending patterns across\
      \ the organization showcasing cost distribution across accounts, database engines,\
      \ and regions, with month-over-month cost trend.\_</inline>\n  <br/>\n  <inline\
      \ font-size=\"20px\">It includes analysis of RDS Extended Support charges and\
      \ backup storage costs, that can help to track and optimize RDS cost and usage.\_\
      </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">For Detailed Cost\
      \ and Usage Dashboard for all Service usage refer Cost Intelligence Dashboard\
      \  -\_</inline>\n  <inline color=\"#56b5e0\" font-size=\"20px\">\n    <a href=\"\
      https://catalog.workshops.aws/awscid/en-US/dashboards/foundational/cudos-cid-kpi#cudos-dashboard\"\
