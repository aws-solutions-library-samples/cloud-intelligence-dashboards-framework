  - Content: |-
      <text-box>
        <br/>
        <inline font-size="20px">Aurora IO Optimized is a cluster configuration that eliminates IO charges in exchange for higher compute (+30%) and storage (+125%) costs. It's recommended when IO costs exceed 25% of your total Aurora cluster cost.</inline>
        <br/>
        <br/>
        <inline font-size="20px">Reference Documentation and blogs:</inline>
        <br/>
        <ul>
          <li class="ql-indent-0">
            <inline color="#56b5e0" font-size="20px">
              <a href="https://aws.amazon.com/blogs/aws/new-amazon-aurora-i-o-optimized-cluster-configuration-with-up-to-40-cost-savings-for-i-o-intensive-applications/" target="_blank">Amazon Aurora I/O-Optimized cluster configuration</a>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#56b5e0" font-size="20px">
              <a href="https://builder.aws.com/content/2xTeU6O1MGlKSrA48Gexj7hjJZ1/aurora-io-optimized-cut-costs-for-io-intensive-workloads" target="_blank">Aurora I/O-Optimized: Cut Costs for I/O-Intensive Workloads</a>
            </inline>
          </li>
          <li class="ql-indent-0">
            <inline color="#56b5e0" font-size="20px">
              <a href="https://aws.amazon.com/rds/aurora/pricing/" target="_blank">Aurora pricing - I/O-Optimized</a>
            </inline>
          </li>
        </ul>
      </text-box>
