AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            OptimizedViewPortWidth: 1600px
            ResizeOption: FIXED
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: concat(formatDate(addDateTime(-30, 'DD', now()),'dd-MMM-yyyy'),' - ',formatDate(now(),'dd-MMM-yyyy'))
  Name: Backup - Last30Days
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: |-
    ifelse(
      dateDiff(
        parseDate(left(snapshotcreatetime, 10), 'yyyy-MM-dd'),
        parseDate(left({collection_date}, 10), 'yyyy-MM-dd'),
        "DD"
      ) <= 1,
      1,
      0
    )
  Name: Backup Percentage (24hrs)
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: ifelse(backupretentionperiod=0,1,0)
  Name: Backup Retention Status
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')
  Name: CollectionDay
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: toString('RDS Console Link')
  Name: RDS Console Link
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: countIf(dbinstanceidentifier, {Backup Percentage (24hrs)} = 0)
  Name: RDS_backup_status
- DataSetIdentifier: rds_analysis_daily_backup_dataset
  Expression: concat(accountid, '|', dbinstanceidentifier, '|', region)
  Name: dbinstanceidentifier_distinct
- DataSetIdentifier: rds_analysis_dataset
  Expression: ' ifelse({DB Certificate Status}=''Active'',1,0)'
  Name: Analysis DB Certificate Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(autominorversionupgrade='true','True','False')
  Name: Auto Minor Version Upg Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(backupretentionperiod >= 1, "BackupEnabled", "BackupNotEnabled")
  Name: Backup Enabled Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')
  Name: CollectionDay
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(performanceinsightsenabled='true','True','False')
  Name: DB / Perf Insights Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
      parseDate(
        left(split(certificatedetails, 'validtill=', 2), 10),
        'yyyy-MM-dd'
      ) > now(),
      'Active',
      'Expired'
    )
  Name: DB Certificate Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(${pDBEngine}=engine and ${pDBEngineRegion}=region,${pDBEngine},NULL)
  Name: DB_Engine_Name
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(${pDBEngineRegion}=region,region,${pDBEngineRegion})
  Name: DB_Engine_Region
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(storageencrypted = 'true', 'Encrypted', 'Unencrypted')
  Name: Encryption Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(dateDiff(parseDate(latestrestorabletime),now(),"DD") <= 30,'True','False')
  Name: "LastRestorableTime\_\_ < 30 Days"
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(dateDiff(parseDate(latestrestorabletime),now(),"DD") <= 7,'True','False')
  Name: "LastRestorableTime\_\_ < 7 Days"
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse({current_major_version}={latest_major_version},'True','False')
  Name: Latest Major Version Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse({current_minor_version}={latest_minor_version},'True','False')
  Name: Latest Minor Version Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse({Selected Major Version Status}='True',1,0)
  Name: Latest_major_version_percent
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(isNotNull(preferredmaintenancewindow),'True','False')
  Name: Maintenance Window Enabled
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(multiaz='true','True','False')
  Name: MultiAZ Enabled Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(publiclyaccessible='true','True','False')
  Name: Publicly Accessible Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: toString('RDS Console Link')
  Name: RDS Console Link
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(${pMajorVersionCompare}='Latest_Major_Version_N',{latest_major_version},
    ${pMajorVersionCompare}='Latest_Major_Version_N-1',{latest_major_version_N-1},
    ${pMajorVersionCompare}='Latest_Major_Version_N-2',{latest_major_version_N-2},
    {latest_major_version})
  Name: Selected Latest Major Version
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(${pMinorVersionCompare}='Latest_Minor_Version_N',{latest_minor_version},
    ${pMinorVersionCompare}='Latest_Minor_Version_N-1',{latest_minor_version_N-1},
    ${pMinorVersionCompare}='Latest_Minor_Version_N-2',{latest_minor_version_N-2},
    {latest_minor_version})
  Name: Selected Latest Minor Version
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
        isNull({Selected Latest Major Version}) or {Selected Latest Major Version} = '',
        'True',
        ifelse(
            isNull({current_major_version}) or {current_major_version} = '',
            'True',
            ifelse(
            contains(toString({current_major_version}), '.'),
            ifelse(
                parseInt(split({current_major_version}, '.', 1)) * 100 + parseInt(split({current_major_version}, '.', 2)) >=
                parseInt(split({Selected Latest Major Version}, '.', 1)) * 100 + parseInt(split({Selected Latest Major Version}, '.', 2)),
                'True',
                'False'
            ),
            ifelse(
                parseInt({current_major_version}) >= parseInt({Selected Latest Major Version}),
                'True',
                'False'
            )
        )
    )
    )
  Name: Selected Major Version Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    // Compare the normalized versions
    ifelse(
      {extracted_current_minor_version} >= {extracted_compare_minor_version},'True','False'
    )
  Name: Selected Minor Version Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(maxallocatedstorage <> 0,'True','False')
  Name: Storage Autoscaling Status
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
    taglist = ':', NULL,
    endsWith(taglist, ', :'), left(taglist, strlen(taglist) - 3),
    startsWith(taglist, ':, '), right(taglist, strlen(taglist) - 3),
    taglist
    )
  Name: Taglist Value
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(autominorversionupgrade='true',1,0)
  Name: auto_minorversionupg_enabled
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(backupretentionperiod>0,1,0)
  Name: backup_enabled
- DataSetIdentifier: rds_analysis_dataset
  Expression: concat(accountid, '|', dbinstanceidentifier, '|', region)
  Name: distinct-dbinstanceidentifier
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    // First check if it's an Aurora version or RDS Oracle version
    ifelse(
        locate({current_minor_version},'aurora') > 0,
        // Aurora version handling - modified weights and parsing
        (coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 10000000000 +
         coalesce(parseInt(split({current_minor_version}, '.', 2)), 0) * 1000000000 +
         coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 1)), 0) * 1000000 +
         // Handle the double-digit version numbers (04, 09) by padding
         coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 2)), 0) * 1000 +
         coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 3)), 0)),
        // Check if it's RDS Oracle version (contains 'ru-')
        ifelse(
            locate({current_minor_version},'ru-') > 0,
            // Oracle version handling
            (// Base version (19) -> 19000000000
            coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 1000000000 +
            // Year (2025) -> 202500000
            coalesce(parseInt(substring(split(split({current_minor_version}, 'ru-', 2), '-', 1), 1, 4)), 0) * 100000 +
            // Month (01 or 04) -> 100 or 400
            coalesce(parseInt(substring(split(split({current_minor_version}, 'ru-', 2), '-', 2), 1, 2)), 0) * 100
            ) + // Separate calculation for r value
            coalesce(parseInt(right({current_minor_version}, 1)), 0),
            // Original version handling
            (coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 10000 +
             coalesce(
                ifelse(
                    locate('-', split({current_minor_version}, '.', 2)) > 0,
                    parseInt(split(split({current_minor_version}, '.', 2), '-', 1)),
                    parseInt(split({current_minor_version}, '.', 2))
                ), 0) * 100 +
             coalesce(
                ifelse(
                    locate('-', split({current_minor_version}, '.', 3)) > 0,
                    parseInt(split(split(split({current_minor_version}, '.', 3), '-', 1), '_', 1)),
                    parseInt(split(split({current_minor_version}, '.', 3), '_', 1))
                ), 0))
        )
    )
  Name: extract_current_minor_version
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    // First check if it's an Aurora version or RDS Oracle version
    ifelse(
        locate({Selected Latest Minor Version},'aurora') > 0,
        // Aurora version handling - modified weights and parsing
        (coalesce(parseInt(split({Selected Latest Minor Version}, '.', 1)), 0) * 10000000000 +
         coalesce(parseInt(split({Selected Latest Minor Version}, '.', 2)), 0) * 1000000000 +
         coalesce(parseInt(split(split({Selected Latest Minor Version}, 'aurora.', 2), '.', 1)), 0) * 1000000 +
         // Handle the double-digit version numbers (04, 09) by padding
         coalesce(parseInt(split(split({Selected Latest Minor Version}, 'aurora.', 2), '.', 2)), 0) * 1000 +
         coalesce(parseInt(split(split({Selected Latest Minor Version}, 'aurora.', 2), '.', 3)), 0)),
        // Check if it's RDS Oracle version (contains 'ru-')
        ifelse(
            locate({Selected Latest Minor Version},'ru-') > 0,
            // Oracle version handling
            (// Base version (19) -> 19000000000
            coalesce(parseInt(split({Selected Latest Minor Version}, '.', 1)), 0) * 1000000000 +
            // Year (2025) -> 202500000
            coalesce(parseInt(substring(split(split({Selected Latest Minor Version}, 'ru-', 2), '-', 1), 1, 4)), 0) * 100000 +
            // Month (01 or 04) -> 100 or 400
            coalesce(parseInt(substring(split(split({Selected Latest Minor Version}, 'ru-', 2), '-', 2), 1, 2)), 0) * 100
            ) + // Separate calculation for r value
            coalesce(parseInt(right({Selected Latest Minor Version}, 1)), 0),
            // Original version handling
            (coalesce(parseInt(split({Selected Latest Minor Version}, '.', 1)), 0) * 10000 +
             coalesce(
                ifelse(
                    locate('-', split({Selected Latest Minor Version}, '.', 2)) > 0,
                    parseInt(split(split({Selected Latest Minor Version}, '.', 2), '-', 1)),
                    parseInt(split({Selected Latest Minor Version}, '.', 2))
                ), 0) * 100 +
             coalesce(
                ifelse(
                    locate('-', split({Selected Latest Minor Version}, '.', 3)) > 0,
                    parseInt(split(split(split({Selected Latest Minor Version}, '.', 3), '-', 1), '_', 1)),
                    parseInt(split(split({Selected Latest Minor Version}, '.', 3), '_', 1))
                ), 0))
        )
    )
  Name: extract_latest_minor_version
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
        contains({Selected Latest Minor Version}, 'ru-'),
        {Selected Latest Minor Version},
        ifelse(
            contains({Selected Latest Minor Version}, 'aurora'),
            {Selected Latest Minor Version},
            ifelse(
                contains({Selected Latest Minor Version}, 'rur'),
                {Selected Latest Minor Version},
                toString(
                    coalesce(parseInt(split({Selected Latest Minor Version}, '.', 1)), 0) * 1000000 +
                    coalesce(parseInt(split({Selected Latest Minor Version}, '.', 2)), 0) * 1000 +
                    coalesce(parseInt(split({Selected Latest Minor Version}, '.', 3)), 0)
                )
            )
        )
    )
  Name: extracted_compare_minor_version
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
        contains({current_minor_version}, 'ru-'),
        {current_minor_version},
        ifelse(
            contains({current_minor_version}, 'aurora'),
            {current_minor_version},
            ifelse(
                contains({current_minor_version}, 'rur'),
                {current_minor_version},
                toString(
                    coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 1000000 +
                    coalesce(parseInt(split({current_minor_version}, '.', 2)), 0) * 1000 +
                    coalesce(parseInt(split({current_minor_version}, '.', 3)), 0)
                )
            )
        )
    )
  Name: extracted_current_minor_version
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(isNull(dbclusteridentifier) or dbclusteridentifier='','false','true')
  Name: is_cluster
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse({Selected Minor Version Status}='True',1,0)
  Name: latest_minor_version_percent
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(multiaz='true',1,0)
  Name: multiaz_enabled_status
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(
    locate(dbinstanceclass, 'db.serverless') > 0, 'Serverless',
    locate(dbinstanceclass, 'g.') > 0, 'Graviton',
    locate(dbinstanceclass, 'gd.') > 0, 'Graviton',
    'x86 (Intel/AMD)'
    )
  Name: processor_type
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(publiclyaccessible='true',1,0)
  Name: publiclyaccessible_status
- DataSetIdentifier: rds_analysis_dataset
  Expression: |-
    ifelse(${pRDSMonthDimension} = 'Account', accountname,
    ${pRDSMonthDimension} = 'Region', region,
    ${pRDSMonthDimension} = 'Tag Environment', {Taglist Value},
    ${pRDSMonthDimension} = 'Database Engine', engine,
    ${pRDSMonthDimension} = 'DB Instance Class',dbinstanceclass,
    ${pRDSMonthDimension} = 'Processor Type', {processor_type},
    NULL)
  Name: rds-dimension-field
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(maxallocatedstorage <> 0,1,0)
  Name: storage_autoscaling_count
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(storageencrypted='true',1,0)
  Name: storage_encrypted_status
- DataSetIdentifier: rds_analysis_dataset
  Expression: ifelse(storageencrypted='true',0,1)
  Name: storage_unencrypted_status
- DataSetIdentifier: rds_analysis_endofsupport_dataset
  Expression: parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')
  Name: CollectionDay
- DataSetIdentifier: rds_analysis_endofsupport_dataset
  Expression: toString('RDS Console Link')
  Name: RDS Console Link
- DataSetIdentifier: rds_analysis_endofsupport_dataset
  Expression: concat(accountid, '|', dbinstanceidentifier, '|', region)
  Name: dbinstanceidentifier_distinct
- DataSetIdentifier: rds_analysis_endofsupport_dataset
  Expression: ifelse({rds_support_status}='Extended Support',1,0)
  Name: rds_support_status_count
- DataSetIdentifier: rds_analysis_endofsupport_dataset
  Expression: |-
    ifelse(
        isNull({standard_support_end})
        or trim({standard_support_end}) = '',
        0,
        ifelse(dateDiff(parseDate({standard_support_end}), now(), "DD") > 1, 1, 0)
    )
  Name: status_extended
- DataSetIdentifier: rds_analysis_maintenance_dataset
  Expression: parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')
  Name: CollectionDay
- DataSetIdentifier: rds_analysis_maintenance_dataset
  Expression: toString('RDS Console Link')
  Name: RDS_Console_Link
- DataSetIdentifier: rds_analysis_maintenance_dataset
  Expression: |-
    ifelse(
    taglist = ':', NULL,
    endsWith(taglist, ', :'), left(taglist, strlen(taglist) - 3),
    startsWith(taglist, ':, '), right(taglist, strlen(taglist) - 3),
    taglist
    )
  Name: Taglist Value
- DataSetIdentifier: rds_analysis_maintenance_dataset
  Expression: |-
    ifelse(
        isNull(currentapplydate) and isNull(forcedapplydate) and isNull(autoappliedafterdate),
        0,
        1
    )
  Name: rds_maintenance_status
- DataSetIdentifier: rds_aurora_io_optimized_view
  Expression: sum({io_cost}) / (sum({compute_cost}) + sum({io_cost}) + sum({storage_cost}))
    * 100
  Name: Aurora_Fleet_IO_Pct
- DataSetIdentifier: rds_aurora_io_optimized_view
  Expression: ifelse(recommendation='Aurora IO Optimized - Recommended',1,0)
  Name: aurora_io_optimized_clusters
- DataSetIdentifier: rds_cost_summary_view
  Expression: |-
    ifelse
    (contains({usage_type}, 'micro'), 1,
    contains({usage_type}, 'small'), 2,
    contains({usage_type}, 'medium'), 2,
    contains({usage_type}, 'large'), 2,
    contains({usage_type}, 'xlarge'), 4,
    contains({usage_type}, '2xlarge'), 8,
    contains({usage_type}, '3xlarge'), 12,
    contains({usage_type}, '4xlarge'), 16,
    contains({usage_type}, '6xlarge'), 24,
    contains({usage_type}, '8xlarge'), 32,
    contains({usage_type}, '12xlarge'), 48,
    contains({usage_type}, '16xlarge'), 64,
    contains({usage_type}, '24xlarge'), 96,
    contains({usage_type}, '32xlarge'), 128,
    contains({usage_type}, '48xlarge'), 192,
    0)
  Name: Instance_VCPUs
- DataSetIdentifier: rds_cost_summary_view
  Expression: sum({unblended_cost}) / sum({usage_quantity})
  Name: cost_per_hour
- DataSetIdentifier: rds_cost_summary_view
  Expression: sum({unblended_cost}) /  distinct_count({usage_date})
  Name: daily_avg_cost_mom
- DataSetIdentifier: rds_cost_summary_view
  Expression: |-
    ifelse(${pRDSCostDimension}='Account',{account_name},
    ${pRDSCostDimension}='Region',region,
    ${pRDSCostDimension}='Database Engine',{database_engine},
    ${pRDSCostDimension}='Instance Class',{instance_type},
    'Other'
    )
  Name: rds_cost_dimension
