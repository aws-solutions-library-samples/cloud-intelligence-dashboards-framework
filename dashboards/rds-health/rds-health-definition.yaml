  TextBoxes:
  - Content: |-
      <text-box>
        <block align="center">
          <inline color="#f0f6f6" font-size="25px">
            <b>RDS Health Dashboard - RHD</b>
          </inline>
        </block>
      </text-box>
    SheetTextBoxId: 05aa1555-56ae-4c02-a0aa-4ffcf885fb3d
  - Content: "<text-box>\n  <inline font-size=\"32px\">&#128221;\_</inline>\n  <inline\
      \ color=\"#f0f6f6\" font-size=\"35px\">RDS Inventory View</inline>\n  <br/>\n\
      \  <br/>\n  <inline font-size=\"16px\">\n    <b>Collection Date Filter</b>\n\
      \  </inline>\n  <inline font-size=\"16px\">\_: View historical DB inventory\
      \ details by selecting a specific date</inline>\n  <br/>\n  <br/>\n  <inline\
      \ font-size=\"16px\">\n    <b>Quick Tips :</b>\n  </inline>\n  <br/>\n  <ul>\n\
      \    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Export the\
      \ data to CSV / Excel for detailed offline analysis</inline>\n    </li>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Use Athena to\
      \ query the base tables and views for custom filtering and analysis</inline>\n\
      \    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Additional\
      \ Resources :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#56b5e0\" font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/athena/latest/ug/querying-athena-tables.html\"\
      \ target=\"_blank\">Athena Query Best Practices Guide</a>\n      </inline>\n\
      \    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 04bcf799-133a-404d-a407-692603855fbc
  - Content: "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS\
      \ Inventory Dashboard</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"\
      20px\">A consolidated view of Amazon RDS database instances across your organization,\
      \ providing insights into version status, security configurations, backup settings,\
      \ and operational health. Use this dashboard to identify upgrade requirements,\
      \ review resilence and security best practices, and plan database maintenance\
      \ activities.</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n  \
      \  <i>\u2139\uFE0F Note : Visuals showing \"No data\" indicate data is not yet\
      \ available. Verify data in the corresponding Athena views.</i>\n  </inline>\n\
      </text-box>"
    SheetTextBoxId: 4fd71b99-12e4-4084-a84f-6ea109ee7a3b
