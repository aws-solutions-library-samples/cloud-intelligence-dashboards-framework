  SheetId: 2447e71b-7457-4709-afae-612280e70efc
  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"30px\">\n    <b>RDS\
      \ Version and Maintenance Analysis</b>\n  </inline>\n  <inline color=\"#f0f6f6\"\
      \ font-size=\"40px\">\_</inline>\n  <inline font-size=\"32px\">&#128202;</inline>\n\
      </text-box>"
    SheetTextBoxId: 2d463e09-4c3c-4c64-80f6-74a194ba1829
  - Content: "<text-box>\n  <inline font-size=\"20px\">Keeping RDS databases updated\
      \ with latest Major and Minor version provides multiple benefits: enhanced security\
      \ through patched vulnerabilities, improved performance from optimized query\
      \ engines and resource utilization, access to new features that can streamline\
      \ operations, and continued vendor support avoiding any extended support cost.</inline>\n\
      \  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation</inline>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\"\
      \ font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Upgrading.html\"\
      \ target=\"_blank\">Upgrading a DB instance engine version</a>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\"\
      \ font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/extended-support.html\"\
      \ target=\"_blank\">Amazon RDS Extended Support with\_Amazon RDS</a>\n     \
      \ </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 6155e824-8c37-490c-9fba-527d695aee16
  - Content: "<text-box>\n  <inline font-size=\"20px\">Latest Major and Minor version\
      \ % -\_</inline>\n  <inline font-size=\"20px\">\n    <expression>${pCollectionDate}</expression>\n\
      \  </inline>\n</text-box>"
    SheetTextBoxId: fa17d49e-8862-40db-97ab-17324a3ea1bb
  - Content: "<text-box>\n  <br/>\n  <inline font-size=\"20px\">\n    <b>End Of Standard\
      \ and Extended Support Dates\_</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline\
      \ color=\"#f5f6f9\" font-size=\"18px\">RDS Standard Support and Extended Support\
      \ dates for RDS MySQL, RDS MariaDB, RDS PostgreSQL, Aurora MySQL, and Aurora\
      \ PostgreSQL engine versions.</inline>\n  <br/>\n  <inline font-size=\"18px\"\
      >You can refer to below AWS documentation for detailed end of support dates\
      \ for these mentioned engines.\_\_</inline>\n  <br/>\n  <inline font-size=\"\
      18px\">It doesn't include commercial RDS DB Engines (Db2, SQL Server, and Oracle).</inline>\n\
      \  <br/>\n  <br/>\n  <br/>\n  <inline font-size=\"18px\">Reference Documentation:</inline>\n\
      \  <br/>\n  <inline font-size=\"18px\">\_Amazon RDS</inline>\n  <br/>\n  <ul>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"\
      18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/PostgreSQLReleaseNotes/postgresql-release-calendar.html\"\
      \ target=\"_self\">PostgreSQL</a>\n      </inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n      \
      \  <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/MySQL.Concepts.VersionMgmt.html\"\
      \ target=\"_self\">MySQL</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/MariaDB.Concepts.VersionMgmt.html\"\
      \ target=\"_blank\">MariaDB</a>\n      </inline>\n    </li>\n  </ul>\n  <br/>\n\
      \  <inline font-size=\"18px\">\_Amazon Aurora</inline>\n  <br/>\n  <ul>\n  \
      \  <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"\
      18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/AuroraPostgreSQLReleaseNotes/aurorapostgresql-release-calendar.html\"\
      \ target=\"_self\">PostgreSQL-Compatible Edition</a>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"\
      18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/AuroraMySQLReleaseNotes/AuroraMySQL.release-calendars.html\"\
      \ target=\"_self\">MySQL-Compatible Edition</a>\n      </inline>\n    </li>\n\
      \  </ul>\n</text-box>"
    SheetTextBoxId: 7c44bf98-d055-4406-9e1a-f92ac638559d
  - Content: "<text-box>\n  <inline font-size=\"18px\">Note</inline>\n  <inline font-size=\"\
      16px\">:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline\
      \ font-size=\"16px\">Minor versions can reach the end of standard support before\
      \ the corresponding major versions.\_</inline>\n    </li>\n    <li class=\"\
      ql-indent-1\">\n      <inline font-size=\"16px\">For example, PostgreSQL minor\
      \ version 14.9 can reach its end of standard support in March 2025, while major\
      \ version 14 will reach its end of standard support in February 2027.</inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\"\
      >Minor versions can also reach end of Extended Support before major versions\
      \ do.</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n      <inline font-size=\"\
      16px\">For example, minor version 5.7.44-RDS.20240529 reaches its end of Extended\
      \ Support date in September 2025 while major version 5.7 reaches this date on\
      \ February 28, 2027.\_</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline font-size=\"16px\">Amazon RDS will support additional minor versions\
      \ between these dates.\_</inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline font-size=\"16px\">We recommend that you upgrade to the latest\
      \ available minor version as often as possible for all major versions.</inline>\n\
      \    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: 8773727e-74d8-46d3-917d-d2c807f4489f
  - Content: "<text-box>\n  <br/>\n  <inline font-size=\"20px\"/>\n  <inline font-size=\"\
      20px\">\n    <b>RDS Maintenance Window</b>\n  </inline>\n  <br/>\n  <br/>\n\
      \  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Amazon\
      \ RDS periodically performs maintenance on the resources associated with your\
      \ DB instances. This includes updates to the underlying hardware, operating\
      \ system, and database engine version.</inline>\n    </li>\n    <li class=\"\
      ql-indent-0\">\n      <inline font-size=\"20px\">Operating system updates are\
      \ often done for security reasons, and Amazon RDS recommends applying these\
      \ updates as soon as possible.</inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline font-size=\"20px\">You can find more details on applying updates\
      \ to your DB instance in\_</inline>\n      <inline color=\"#56b5e0\" font-size=\"\
      20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.OSUpgrades\"\
      \ target=\"_blank\">Applying updates to a DB instance\_</a>\n      </inline>\n\
      \      <inline font-size=\"20px\">section.</inline>\n    </li>\n  </ul>\n  <br/>\n\
      \  <br/>\n  <inline font-size=\"20px\">Reference Documentation:</inline>\n \
      \ <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\"\
      \ font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.Maintenance.Overview\"\
      \ target=\"_blank\">Overview of</a>\n      </inline>\n      <inline color=\"\
      #56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.Maintenance.Overview\"\
      \ target=\"_blank\">\n          <b>\_DB instance</b>\n        </a>\n      </inline>\n\
      \      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.Maintenance.Overview\"\
      \ target=\"_blank\">\_maintenance updates</a>\n      </inline>\n    </li>\n\
      \  </ul>\n</text-box>"
    SheetTextBoxId: a00a11b8-8950-49be-bfe9-f2ec97817247
  - Content: |-
      <text-box>
        <inline font-size="15px">Use the filter condition to compare the current RDS database major and minor versions against the latest versions and previous supported versions.</inline>
        <br/>
        <br/>
        <inline font-size="15px">
          <b>What You Can Compare:</b>
        </inline>
        <br/>
        <ul>
          <li class="ql-indent-0">
            <inline font-size="15px">Current version vs Latest available version N</inline>
          </li>
          <li class="ql-indent-0">
            <inline font-size="15px">Current version vs Latest version N - 1</inline>
          </li>
          <li class="ql-indent-0">
            <inline font-size="15px">Current version vs Latest version N - 2</inline>
          </li>
        </ul>
      </text-box>
