      \ font-size=\"16px\">\n    <b>Quick Tips :</b>\n  </inline>\n  <br/>\n  <ul>\n\
      \    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Export the\
      \ data to CSV / Excel for detailed offline analysis</inline>\n    </li>\n  \
