        ((("optimization_data".rds_analysis_data
      LEFT JOIN latest_instance_snapshots s ON ((s.accountid = rds_analysis_data.accountid) AND (s.dbinstanceidentifier = rds_analysis_data.dbinstanceidentifier) AND (s.maxsnapshotcreatetime = 1) AND (rds_analysis_data.dbclusteridentifier IS NULL) AND (date(parse_datetime(s.collection_date, 'yyyy-MM-dd HH:mm:ss')) = date(parse_datetime(rds_analysis_data.collection_date, 'yyyy-MM-dd HH:mm:ss')))))
      LEFT JOIN latest_cluster_snapshots cs ON ((cs.accountid = rds_analysis_data.accountid) AND (cs.dbclusteridentifier = rds_analysis_data.dbclusteridentifier) AND (cs.maxsnapshotcreatetime = 1) AND (rds_analysis_data.dbclusteridentifier IS NOT NULL) AND (date(parse_datetime(cs.collection_date, 'yyyy-MM-dd HH:mm:ss')) = date(parse_datetime(rds_analysis_data.collection_date, 'yyyy-MM-dd HH:mm:ss')))))
      LEFT JOIN "optimization_data".organization_data ON ("optimization_data".rds_analysis_data.accountid = organization_data.id))
