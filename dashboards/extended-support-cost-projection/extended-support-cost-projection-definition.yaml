  - Content: |-
      <text-box>
        <inline font-size="20px">EKS Extended Support Cost Projection</inline>
        <br/>
        <br/>
        <ul>
          <li>Estimated cost values are based on the last 30 days of usage data.</li>
          <li class="ql-indent-0">
            Amazon EKS controls for Kubernetes version policy allows you to choose the end of standard support behavior for your EKS clusters. With these controls you can decide which clusters should enter extended support and which clusters should be automatically upgraded at the end of standard support for a Kubernetes version. Learn more in EKS
            <a href="https://docs.aws.amazon.com/eks/latest/userguide/view-upgrade-policy.html" target="_blank">documentation</a>
            .
          </li>
        </ul>
      </text-box>
