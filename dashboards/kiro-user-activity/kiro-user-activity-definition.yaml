CalculatedFields:
- DataSetIdentifier: kiro_user_activity
  Expression: ifelse({monthly_plan_utilization_pct} >= 0.75, 1, 0)
  Name: at_risk_flag
- DataSetIdentifier: kiro_user_activity
  Expression: ifelse({plan_credits} > 0, sumOver({credits_used_num}, [userid, truncDate("MM",
    {report_date})], PRE_AGG) / {plan_credits}, 0)
  Name: monthly_plan_utilization_pct
