DataSetIdentifierDeclarations:
  - Identifier: kiro_user_activity
    DataSetArn: ${dataset_arn_kiro_user_activity}
CalculatedFields:
  - DataSetIdentifier: kiro_user_activity
    Expression: ifelse({plan_credits} > 0, sumOver({credits_used_num}, [{userid}, truncDate("MM", {report_date})], PRE_AGG) / {plan_credits}, 0)
    Name: monthly_plan_utilization_pct
  - DataSetIdentifier: kiro_user_activity
    Expression: ifelse({monthly_plan_utilization_pct} >= 0.75, 1, 0)
    Name: at_risk_flag
ColumnConfigurations:
  - Column:
      ColumnName: credits_used_num
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 2
  - Column:
      ColumnName: overage_credits_used_num
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 2
  - Column:
      ColumnName: plan_utilization_pct
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          PercentageDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 1
            Suffix: '%'
  - Column:
      ColumnName: overage_utilization_pct
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          PercentageDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 1
            Suffix: '%'
  - Column:
      ColumnName: plan_credits
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 0
  - Column:
      ColumnName: credits_per_message
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 3
FilterGroups:
  # Global date filter
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-date-global
    Filters:
      - RelativeDatesFilter:
          AnchorDateConfiguration:
            AnchorOption: NOW
          Column:
            ColumnName: report_date
            DataSetIdentifier: kiro_user_activity
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultRelativeDateTimeOptions:
                DisplayOptions:
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
            Title: Lookback period
          FilterId: filter-date
          MinimumGranularity: DAY
          NullOption: NON_NULLS_ONLY
          RelativeDateType: THIS
          TimeGranularity: MONTH
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # Account ID filter
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-account-id
    Filters:
      - CategoryFilter:
          Column:
            ColumnName: account_id
            DataSetIdentifier: kiro_user_activity
          Configuration:
            FilterListConfiguration:
              MatchOperator: CONTAINS
              SelectAllOptions: FILTER_ALL_VALUES
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultDropdownOptions:
                DisplayOptions:
                  SelectAllOptions:
                    Visibility: VISIBLE
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
                Type: MULTI_SELECT
            Title: AWS Account
          FilterId: filter-account-id
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # User filter
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-user
    Filters:
      - CategoryFilter:
          Column:
            ColumnName: user_email
            DataSetIdentifier: kiro_user_activity
          Configuration:
            FilterListConfiguration:
              MatchOperator: CONTAINS
              SelectAllOptions: FILTER_ALL_VALUES
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultDropdownOptions:
                DisplayOptions:
                  SelectAllOptions:
                    Visibility: VISIBLE
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
                Type: MULTI_SELECT
            Title: User
          FilterId: filter-user
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # Model filter
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-model
    Filters:
      - CategoryFilter:
          Column:
            ColumnName: model_name
            DataSetIdentifier: kiro_user_activity
          Configuration:
            FilterListConfiguration:
              MatchOperator: CONTAINS
              SelectAllOptions: FILTER_ALL_VALUES
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultDropdownOptions:
                DisplayOptions:
                  SelectAllOptions:
                    Visibility: VISIBLE
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
                Type: MULTI_SELECT
            Title: Model
          FilterId: filter-model
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # Client Type filter
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-client-type
    Filters:
      - CategoryFilter:
          Column:
            ColumnName: client_type
            DataSetIdentifier: kiro_user_activity
          Configuration:
            FilterListConfiguration:
              MatchOperator: CONTAINS
              SelectAllOptions: FILTER_ALL_VALUES
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultDropdownOptions:
                DisplayOptions:
                  SelectAllOptions:
                    Visibility: VISIBLE
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
                Type: MULTI_SELECT
            Title: Client Type
          FilterId: filter-client-type
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # Users in overage scope
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-users-in-overage
    Filters:
      - NumericEqualityFilter:
          Column:
            ColumnName: in_overage_flag
            DataSetIdentifier: kiro_user_activity
          FilterId: filter-in-overage-flag
          MatchOperator: EQUALS
          NullOption: NON_NULLS_ONLY
          Value: 1
    ScopeConfiguration:
      SelectedSheets:
        SheetVisualScopingConfigurations:
        - Scope: SELECTED_VISUALS
          SheetId: cc1e9b7e-c53b-4063-b58c-0677619cfe42
          VisualIds:
          - vis-users-in-overage
    Status: ENABLED
  # Users at risk scope
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-users-at-risk
    Filters:
      - NumericEqualityFilter:
          Column:
            ColumnName: at_risk_flag
            DataSetIdentifier: kiro_user_activity
          FilterId: filter-at-risk-flag
          MatchOperator: EQUALS
          NullOption: NON_NULLS_ONLY
          Value: 1
    ScopeConfiguration:
      SelectedSheets:
        SheetVisualScopingConfigurations:
        - Scope: SELECTED_VISUALS
          SheetId: cc1e9b7e-c53b-4063-b58c-0677619cfe42
          VisualIds:
          - vis-utilization-kpi
    Status: ENABLED
