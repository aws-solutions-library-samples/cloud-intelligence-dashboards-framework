DataSetIdentifierDeclarations:
  - Identifier: kiro_user_activity
    DataSetArn: ${dataset_arn_kiro_user_activity}
CalculatedFields:
  # Monthly plan utilization per user, computed at pre-aggregation level.
  # For each row, returns the user's total credits in that calendar month divided by their plan.
  - DataSetIdentifier: kiro_user_activity
    Expression: ifelse({plan_credits} > 0, sumOver({credits_used}, [{userid}, truncDate("MM", {report_date})], PRE_AGG) / {plan_credits}, 0)
    Name: monthly_plan_utilization_pct
  # Flag: is this user-month at or above the "at risk" threshold (75% of plan)?
  - DataSetIdentifier: kiro_user_activity
    Expression: ifelse({monthly_plan_utilization_pct} >= 0.75, 1, 0)
    Name: at_risk_flag
ColumnConfigurations:
  - Column:
      ColumnName: credits_used
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 2
  - Column:
      ColumnName: overage_credits_used
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 2
  - Column:
      ColumnName: overage_cap
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 0
  - Column:
      ColumnName: plan_utilization_pct
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          PercentageDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 1
            Suffix: '%'
  - Column:
      ColumnName: overage_utilization_pct
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          PercentageDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 1
            Suffix: '%'
  - Column:
      ColumnName: plan_credits
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 0
  - Column:
      ColumnName: credits_per_message
      DataSetIdentifier: kiro_user_activity
    FormatConfiguration:
      NumberFormatConfiguration:
        FormatConfiguration:
          NumberDisplayFormatConfiguration:
            DecimalPlacesConfiguration:
              DecimalPlaces: 3
FilterGroups:
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: 443d2f8d-a5ef-4435-a0b9-5c0b3f4bce77
    Filters:
      - RelativeDatesFilter:
          AnchorDateConfiguration:
            AnchorOption: NOW
          Column:
            ColumnName: report_date
            DataSetIdentifier: kiro_user_activity
          DefaultFilterControlConfiguration:
            ControlOptions:
              DefaultRelativeDateTimeOptions:
                DisplayOptions:
                  TitleOptions:
                    FontConfiguration: {}
                    Visibility: VISIBLE
            Title: Lookback period
          FilterId: 1bddcfb3-5d42-41ab-8cee-8feb0ed55b3e
          MinimumGranularity: DAY
          NullOption: NON_NULLS_ONLY
          RelativeDateType: THIS
          TimeGranularity: MONTH
    ScopeConfiguration:
      AllSheets: {}
    Status: ENABLED
  # Restrict the "Users in Overage" KPI to rows where overage credits were used
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-users-in-overage
    Filters:
      - NumericEqualityFilter:
          Column:
            ColumnName: in_overage_flag
            DataSetIdentifier: kiro_user_activity
          FilterId: filter-in-overage-flag
          MatchOperator: EQUALS
          NullOption: NON_NULLS_ONLY
          Value: 1
    ScopeConfiguration:
      SelectedSheets:
        SheetVisualScopingConfigurations:
        - Scope: SELECTED_VISUALS
          SheetId: cc1e9b7e-c53b-4063-b58c-0677619cfe42
          VisualIds:
          - vis-users-in-overage
    Status: ENABLED
  # Restrict the "Users at Risk" KPI to rows where monthly plan utilization >= 75%
  - CrossDataset: SINGLE_DATASET
    FilterGroupId: fg-users-at-risk
    Filters:
      - NumericEqualityFilter:
          Column:
            ColumnName: at_risk_flag
            DataSetIdentifier: kiro_user_activity
          FilterId: filter-at-risk-flag
          MatchOperator: EQUALS
          NullOption: NON_NULLS_ONLY
          Value: 1
    ScopeConfiguration:
      SelectedSheets:
        SheetVisualScopingConfigurations:
        - Scope: SELECTED_VISUALS
          SheetId: cc1e9b7e-c53b-4063-b58c-0677619cfe42
          VisualIds:
          - vis-utilization-kpi
    Status: ENABLED
