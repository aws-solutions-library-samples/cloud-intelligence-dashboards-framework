dashboards:
  KIRO USER ACTIVITY:
    dependsOn:
      datasets:
      - kiro_user_activity
    name: Kiro User Activity Dashboard
    dashboardId: kiro-user-activity
    category: Advanced
    theme: MIDNIGHT
    version: v1.0.0
    file: ./kiro-user-activity-definition.yaml
    nonTaxonomyColumns:
    - date
    - userid
    - user
    - user_email
    - client_type
    - subscription_tier
    - profileid
    - account_id
    - region
    - model_name
datasets:
  kiro_user_activity:
    data:
      DataSetId: 6ec4cfba-7ad1-43e2-9485-c2e027855025
      Name: kiro_user_activity
      ImportMode: SPICE
      PhysicalTableMap:
        90eb30a0-71b0-4338-b0a0-b8ca792d820a:
          RelationalTable:
            DataSourceArn: ${athena_datasource_arn}
            Catalog: AwsDataCatalog
            Schema: ${athena_database_name}
            Name: kiro_user_activity_view
            InputColumns:
            - Name: date
              Type: STRING
            - Name: userid
              Type: STRING
            - Name: client_type
              Type: STRING
            - Name: subscription_tier
              Type: STRING
            - Name: profileid
              Type: STRING
            - Name: total_messages
              Type: STRING
            - Name: chat_conversations
              Type: STRING
            - Name: credits_used
              Type: STRING
            - Name: overage_enabled
              Type: STRING
            - Name: overage_cap
              Type: STRING
            - Name: overage_credits_used
              Type: STRING
            - Name: new_user
              Type: STRING
            - Name: user_email
              Type: STRING
            - Name: account_id
              Type: STRING
            - Name: region
              Type: STRING
            - Name: model_name
              Type: STRING
            - Name: model_messages
              Type: STRING
            - Name: year
              Type: STRING
            - Name: month
              Type: STRING
            - Name: day
              Type: STRING
      LogicalTableMap:
        143318b6-a4fb-4a0d-9a98-e510a387c36c:
          Alias: kiro_user_activity
          Source:
            PhysicalTableId: 90eb30a0-71b0-4338-b0a0-b8ca792d820a
          DataTransforms:
          - CreateColumnsOperation:
              Columns:
              - ColumnName: report_date
                ColumnId: col-report-date
                Expression: parseDate({date}, "yyyy-MM-dd")
          - CreateColumnsOperation:
              Columns:
              - ColumnName: user
                ColumnId: col-user-display
                Expression: ifelse(strlen(coalesce({user_email}, "")) > 0, {user_email}, replace(replace({userid}, '"', ''), "'", ""))
          - CreateColumnsOperation:
              Columns:
              - ColumnName: total_messages_num
                ColumnId: col-total-messages-num
                Expression: parseInt({total_messages})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: chat_conversations_num
                ColumnId: col-conversations-num
                Expression: parseInt({chat_conversations})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: credits_used_num
                ColumnId: col-credits-used-num
                Expression: parseDecimal({credits_used})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: overage_cap_num
                ColumnId: col-overage-cap-num
                Expression: parseDecimal({overage_cap})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: overage_credits_used_num
                ColumnId: col-overage-credits-used-num
                Expression: parseDecimal({overage_credits_used})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: model_messages_num
                ColumnId: col-model-messages-num
                Expression: parseInt({model_messages})
          - CreateColumnsOperation:
              Columns:
              - ColumnName: plan_credits
                ColumnId: col-plan-credits
                Expression: ifelse(toLower({subscription_tier}) = 'power', 10000, toLower({subscription_tier}) = 'promax', 5000, toLower({subscription_tier}) = 'proplus', 2000, toLower({subscription_tier}) = 'pro', 1000, toLower({subscription_tier}) = 'free', 50, 0)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: plan_utilization_pct
                ColumnId: col-plan-utilization-pct
                Expression: ifelse({plan_credits} > 0, {credits_used_num} / {plan_credits}, 0)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: overage_utilization_pct
                ColumnId: col-overage-utilization-pct
                Expression: ifelse({overage_cap_num} > 0, {overage_credits_used_num} / {overage_cap_num}, 0)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: in_overage_flag
                ColumnId: col-in-overage-flag
                Expression: ifelse({overage_credits_used_num} > 0, 1, 0)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: credits_per_message
                ColumnId: col-credits-per-message
                Expression: ifelse({total_messages_num} > 0, {credits_used_num} / {total_messages_num}, 0)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: is_new_user
                ColumnId: col-is-new-user
                Expression: ifelse(toLower({new_user}) = 'true', 1, 0)
          # Tier right-sizing recommendation
          - CreateColumnsOperation:
              Columns:
              - ColumnName: tier_recommendation
                ColumnId: col-tier-recommendation
                Expression: ifelse({plan_utilization_pct} < 0.3, 'Downgrade Candidate', {in_overage_flag} > 0, 'Upgrade Candidate', 'Right-Sized')
          - ProjectOperation:
              ProjectedColumns:
              - date
              - report_date
              - userid
              - user
              - user_email
              - client_type
              - subscription_tier
              - profileid
              - account_id
              - region
              - model_name
              - model_messages_num
              - total_messages_num
              - chat_conversations_num
              - credits_used_num
              - plan_credits
              - plan_utilization_pct
              - overage_enabled
              - overage_cap_num
              - overage_credits_used_num
              - overage_utilization_pct
              - in_overage_flag
              - credits_per_message
              - is_new_user
              - tier_recommendation
              - year
              - month
    dependsOn:
      views:
      - kiro_user_activity_view
    schedules:
    - default
crawlers: {}
views:
  kiro_user_activity_view:
    # Bounded window over the unbounded Glue table: keeps ~2 years of data so
    # SPICE refresh and Athena scans stay performant as the table grows. The
    # underlying kiro_user_activity table remains the full historical record.
    data: |-
      CREATE OR REPLACE VIEW "${athena_database_name}".kiro_user_activity_view AS
      SELECT *
      FROM
        "${athena_database_name}".kiro_user_activity
      WHERE
        CAST(
          date_parse(
            concat(year, '-', month, '-', day),
            '%Y-%m-%d'
          ) AS date
        ) >= date_add('year', -2, current_date)
