AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            OptimizedViewPortWidth: 1600px
            ResizeOption: FIXED
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: focus_resource_view
  Expression: concat(billingaccountname,':',billingaccountid)
  Name: Billing Account
- DataSetIdentifier: focus_resource_view
  Expression: |-
    ifelse(
    ${Cost} = 'Billed Cost', billedcost,
    ${Cost} = 'Contracted Cost', contractedcost,
    ${Cost} = 'Effective Cost', effectivecost,
    ${Cost} = 'List Cost', listcost,
    effectivecost
    )
  Name: Cost
- DataSetIdentifier: focus_resource_view
  Expression: |-
    ifelse(
    ${MomGroupBy1} = 'Provider', providername,
    ${MomGroupBy1} = 'Billing Account', {Billing Account},
    ${MomGroupBy1} = 'Sub Account', {Sub Account},
    ${MomGroupBy1} = 'Charge Category', chargecategory,
    ${MomGroupBy1} = 'Service Category', servicecategory,
    ${MomGroupBy1} = 'Service Name', servicename,
    // Add ${MomGroupBy1}
    null
    )
  Name: MoM Group By One
- DataSetIdentifier: focus_resource_view
  Expression: |-
    ifelse(
    ${MomGroupByTwo} = 'Provider', providername,
    ${MomGroupByTwo} = 'Billing Account', {Billing Account},
    ${MomGroupByTwo} = 'Sub Account', {Sub Account},
    ${MomGroupByTwo} = 'Charge Category', chargecategory,
    ${MomGroupByTwo} = 'Service Category', servicecategory,
    ${MomGroupByTwo} = 'Service Name', servicename,
    // Add ${MomGroupByTwo}
    null
    )
  Name: MoM Group By Two
- DataSetIdentifier: focus_resource_view
  Expression: concat(subaccountname,':', subaccountid)
  Name: Sub Account
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    chargecategory = 'Adjustment', effectivecost,
    0
    )
  Name: Adjustments
- DataSetIdentifier: focus_summary_view
  Expression: concat(billingaccountname,':', billingaccountid)
  Name: Billing Account
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    ${Cost} = 'Billed Cost', billedcost,
    ${Cost} = 'Contracted Cost', contractedcost,
    ${Cost} = 'Effective Cost', effectivecost,
    ${Cost} = 'List Cost', listcost,
    effectivecost
    )
  Name: Cost
- DataSetIdentifier: focus_summary_view
  Expression: abs(Cost)
  Name: Cost Absolute
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    chargecategory = 'Credit',
    effectivecost,
    0
    )
  Name: Credits
- DataSetIdentifier: focus_summary_view
  Expression: effectivecost
  Name: Effective Cost
- DataSetIdentifier: focus_summary_view
  Expression: 1 - sum(effectivecost)/sum({List Cost amortized})
  Name: Effective Discount Rate
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    in(chargecategory,  ['Usage','Tax']),
    listcost,
    0
    )
  Name: List Cost amortized
- DataSetIdentifier: focus_summary_view
  Expression: difference(sum(effectivecost),[billingperiodstart ASC],-1,[{MoM Group
    By One}])
  Name: MoM $ Group By One
- DataSetIdentifier: focus_summary_view
  Expression: difference(sum(effectivecost),[billingperiodstart ASC],-1,[{MoM Group
    By Two}])
  Name: MoM $ Group By Two
- DataSetIdentifier: focus_summary_view
  Expression: percentDifference(sum(effectivecost),[billingperiodstart ASC],-1,[{MoM
    Group By One}])
  Name: MoM % Group By One
- DataSetIdentifier: focus_summary_view
  Expression: percentDifference(sum(effectivecost),[billingperiodstart ASC],-1,[{MoM
    Group By Two}])
  Name: MoM % Group By Two
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    ${MomGroupBy1} = 'Provider', providername,
    ${MomGroupBy1} = 'Billing Account', {Billing Account},
    ${MomGroupBy1} = 'Sub Account', {Sub Account},
    ${MomGroupBy1} = 'Charge Category', chargecategory,
    ${MomGroupBy1} = 'Service Category', servicecategory,
    ${MomGroupBy1} = 'Service Name', servicename,
    // Add ${MomGroupBy1}
    null
    )
  Name: MoM Group By One
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    ${MomGroupByTwo} = 'Provider', providername,
    ${MomGroupByTwo} = 'Billing Account', {Billing Account},
    ${MomGroupByTwo} = 'Sub Account', {Sub Account},
    ${MomGroupByTwo} = 'Charge Category', chargecategory,
    ${MomGroupByTwo} = 'Service Category', servicecategory,
    ${MomGroupByTwo} = 'Service Name', servicename,
    // Add ${MomGroupByTwo}
    null
    )
  Name: MoM Group By Two
- DataSetIdentifier: focus_summary_view
  Expression: concat(subaccountname,':',subaccountid)
  Name: Sub Account
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    ${summaryGroupByOne} = 'Provider', providername,
    ${summaryGroupByOne} = 'Charge Category', chargecategory,
    ${summaryGroupByOne} = 'Billing Account', {Billing Account},
    ${summaryGroupByOne} = 'Sub Account', {Sub Account},
    ${summaryGroupByOne} = 'Service Category', servicecategory,
    ${summaryGroupByOne} = 'Invoice', invoiceid,
    ${summaryGroupByOne} = 'Service', servicename,
    // Add ${summaryGroupByOne}
    providername
    )
  Name: Summary Group By One
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    ${summaryGroupByTwo} = 'Provider', providername,
    ${summaryGroupByTwo} = 'Charge Category', chargecategory,
    ${summaryGroupByTwo} = 'Billing Account', {Billing Account},
    ${summaryGroupByTwo} = 'Sub Account', {Sub Account},
    ${summaryGroupByTwo} = 'Service Category', servicecategory,
    ${summaryGroupByTwo} = 'Invoice', invoiceid,
    ${summaryGroupByTwo} = 'Service', servicename,
    // Add ${summaryGroupByTwo}
    servicename
    )
  Name: Summary Group By Two
- DataSetIdentifier: focus_summary_view
  Expression: |-
    ifelse(
    chargecategory = 'Purchase', 0,
    effectivecost - listcost
    )
  Name: Total Discounts
- DataSetIdentifier: focus_summary_view
  Expression: abs({Total Discounts})
  Name: Total Discounts Absolute
