dashboards:
  HEALTH EVENTS DASHBOARD:
    dependsOn:
      datasets:
      - health_events_view
    name: Health Events Dashboard
    dashboardId: health-events-dashboard
    category: Advanced
    theme: MIDNIGHT
    version: v3.0.0
    file: ./health-events-definition.yaml
datasets:
  health_events_view:
    data:
      DataSetId: 046a43c0-16fb-4633-9039-980052ff237e
      Name: health_events_view
      PhysicalTableMap:
        b6e834d2-c61b-4327-a27a-e1d4b53d3d92:
          RelationalTable:
            DataSourceArn: ${athena_datasource_arn}
            Catalog: AwsDataCatalog
            Schema: ${athena_database_name}
            Name: health_events_view
            InputColumns:
            - Name: payer_account_id
              Type: STRING
            - Name: account_id
              Type: STRING
            - Name: event_code
              Type: STRING
            - Name: event_category
              Type: STRING
            - Name: event_scope
              Type: STRING
            - Name: status_code
              Type: STRING
            - Name: service
              Type: STRING
            - Name: region
              Type: STRING
            - Name: event_description1
              Type: STRING
            - Name: event_description2
              Type: STRING
            - Name: event_description3
              Type: STRING
            - Name: event_description4
              Type: STRING
            - Name: event_description5
              Type: STRING
            - Name: is_alt_language
              Type: INTEGER
            - Name: affected_entity_value
              Type: STRING
            - Name: affected_entity_arn
              Type: STRING
            - Name: affected_entity_status_code
              Type: STRING
            - Name: affected_entity_last_update
              Type: DATETIME
            - Name: affected_entity_url
              Type: STRING
            - Name: availability_zone
              Type: STRING
            - Name: deprecated_versions
              Type: STRING
            - Name: tags
              Type: STRING
            - Name: start_time
              Type: DATETIME
            - Name: end_time
              Type: DATETIME
            - Name: last_updated_time
              Type: DATETIME
            - Name: ingestion_time
              Type: DATETIME
            - Name: event_metadata
              Type: STRING
            - Name: event_source
              Type: STRING
            - Name: event_arn
              Type: STRING
            - Name: event_arn_hash
              Type: STRING
            - Name: event_code_common
              Type: STRING
            - Name: personas
              Type: STRING
            - Name: persona_01
              Type: STRING
            - Name: persona_02
              Type: STRING
            - Name: persona_03
              Type: STRING
            - Name: persona_04
              Type: STRING
            - Name: actionability
              Type: STRING
            - Name: duration_hours
              Type: INTEGER
            - Name: qs_refresh
              Type: DATETIME
        fcf163c9-994b-477d-ace3-2c0873880793:
          RelationalTable:
            DataSourceArn: ${athena_datasource_arn}
            Catalog: AwsDataCatalog
            Schema: ${athena_database_name}
            Name: account_map
            InputColumns:
            - Name: account_id
              Type: STRING
            - Name: account_name
              Type: STRING
      ImportMode: SPICE
      LogicalTableMap:
        46cadef7-f68d-4244-8e74-5a8fa370bd62:
          Alias: account_map
          DataTransforms:
          - RenameColumnOperation:
              ColumnName: account_id
              NewColumnName: account_id[account_map]
          Source:
            PhysicalTableId: fcf163c9-994b-477d-ace3-2c0873880793
        6e7189b3-1618-41d1-b05f-b20e26559031:
          Alias: Intermediate Table
          DataTransforms:
          - CreateColumnsOperation:
              Columns:
              - ColumnName: deprecated_versions_friendly
                ColumnId: bfb0a728-0167-4141-aa44-66a7c7931d61
                Expression: |-
                  ifelse(
                      strlen(deprecated_versions) > 0, concat("(Deprecation) ", replace(replace(deprecated_versions, "Deprecation of ", ""), " deprecation", "")),
                      ""
                  )
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_group_code_service
                ColumnId: 51aaca91-344e-4ed7-8996-6a1cf2cd0065
                Expression: 'concat(service, '' : '', event_code_common)'
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_group_title_service
                ColumnId: bc6ae5a8-55dc-4d8b-950c-06c3eeaf4080
                Expression: 'concat(service, " : ", ifelse(strlen(deprecated_versions_friendly)
                  > 0, deprecated_versions_friendly, event_code_common))'
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_group
                ColumnId: 8ab9aea1-d6af-45dd-a96d-cb7e92b8844f
                Expression: 'concat(service, " : ", ifelse(strlen({deprecated_versions})
                  = 0, event_code_common, deprecated_versions), " : ", (formatDate(start_time,
                  "yyyy-MM-dd")))'
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_title
                ColumnId: 10dff21f-8b92-4cc5-9b5d-410e11a2443e
                Expression: ifelse(strlen(deprecated_versions_friendly) > 0, deprecated_versions_friendly,
                  event_code_common)
          - CreateColumnsOperation:
              Columns:
              - ColumnName: resource_status_icon
                ColumnId: fb278e11-caf6-4a47-8d22-946a5907185d
                Expression: "ifelse(\n    {affected_entity_status_code} = \"IMPAIRED\"\
                  , \"\U0001F7EA Impaired\",\n    {affected_entity_status_code} =\
                  \ \"UNIMPAIRED\", \"\U0001F7E6 Unimpaired\",\n    {affected_entity_status_code}\
                  \ = \"UNKNOWN\", \"\U0001F7E8 Unknown\",\n    {affected_entity_status_code}\
                  \ = \"PENDING\", \"\U0001F7E5 Pending\",\n    {affected_entity_status_code}\
                  \ = \"RESOLVED\", \"\U0001F7E9 Resolved\",\n    \"\u2B1C No status\"\
                  \n)"
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_status_icon
                ColumnId: daced9b2-0c83-4c02-8648-ef42ba805c2b
                Expression: "ifelse(\n    {status_code} = \"upcoming\" AND dateDiff(now(),\
                  \ start_time, \"DD\") < 60, \"\U0001F7E0 Near\",\n    {status_code}\
                  \ = \"upcoming\" AND dateDiff(now(), start_time, \"DD\") >= 60,\
                  \ \"\U0001F7E1 Future\",\n    {status_code} = \"open\", \"\U0001F534\
                  \ Open\",\n    {status_code} = \"closed\", \"\U0001F7E2 Closed\"\
                  ,\n    {status_code}\n)"
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_category_icon
                ColumnId: e6f5e0b0-bad0-48b8-8235-44292efa9c35
                Expression: "ifelse(\n    {event_category} = \"issue\", \"\U0001F525\
                  \ Issue\",\n    {event_category} = \"accountNotification\", \"\U0001F514\
                  \ Account Notification\",\n    {event_category} = \"scheduledChange\"\
                  , \"\U0001F4C6 Scheduled Change\",\n    {event_category} = \"investigation\"\
                  , \"\U0001F50D Investigation\",\n    {event_category}\n)"
          - CreateColumnsOperation:
              Columns:
              - ColumnName: start_day
                ColumnId: cd751592-44ec-4684-a3ba-bef690000c99
                Expression: formatDate({start_time}, "yyyy-MM-dd")
          - CreateColumnsOperation:
              Columns:
              - ColumnName: account_name_id
                ColumnId: 4eb42eab-133b-4867-9bbd-802fb692b1a6
                Expression: |-
                  ifelse(
                      strlen({account_name}) > 0, concat({account_name}, " (", {account_id}, ")"),
                      {account_id}
                  )
          - CreateColumnsOperation:
              Columns:
              - ColumnName: is_lifecycle_event
                ColumnId: 5c92765c-f7e2-4912-bcbd-614326c3f2fb
                Expression: "ifelse(\n    strlen({deprecated_versions}) > 0, \"Yes\"\
                  ,\n\tcontains({event_code}, \"PLANNED_LIFECYCLE_EVENT\"), \"Yes\"\
                  ,\n\tcontains({event_code}, \"DEPRECATION\"), \"Yes\",\n\t\"No\"\
                  \n)"
          - CreateColumnsOperation:
              Columns:
              - ColumnName: event_title_full
                ColumnId: 214e030d-01b0-4e36-b617-806221d69db5
                Expression: |-
                  concat(
                      service, ": ",
                      ifelse({is_lifecycle_event} = "Yes", " PLE ", ""),
                      ifelse(strlen(deprecated_versions_friendly) > 0, deprecated_versions_friendly, event_code_common)
                  )
          - ProjectOperation:
              ProjectedColumns:
              - payer_account_id
              - account_id
              - event_code
              - event_category
              - event_scope
              - status_code
              - service
              - region
              - event_description1
              - event_description2
              - event_description3
              - event_description4
              - event_description5
              - is_alt_language
              - affected_entity_value
              - affected_entity_arn
              - affected_entity_status_code
              - affected_entity_last_update
              - affected_entity_url
              - availability_zone
              - deprecated_versions
              - tags
              - start_time
              - end_time
              - last_updated_time
              - ingestion_time
              - event_metadata
              - event_source
              - event_arn
              - event_arn_hash
              - event_code_common
              - personas
              - persona_01
              - persona_02
              - persona_03
              - persona_04
              - actionability
              - duration_hours
              - qs_refresh
              - account_name
              - deprecated_versions_friendly
              - event_group_code_service
              - event_group_title_service
              - event_group
              - event_title
              - resource_status_icon
              - event_status_icon
              - event_category_icon
              - start_day
              - account_name_id
              - event_title_full
              - is_lifecycle_event
          Source:
            JoinInstruction:
              LeftOperand: 831bafaa-7ba4-4096-bb93-1a519a76c576
              RightOperand: 46cadef7-f68d-4244-8e74-5a8fa370bd62
              Type: LEFT
              OnClause: '{account_id} = {account_id[account_map]}'
        831bafaa-7ba4-4096-bb93-1a519a76c576:
          Alias: health_events_view
          Source:
            PhysicalTableId: b6e834d2-c61b-4327-a27a-e1d4b53d3d92
    dependsOn:
      views:
      - health_events_view
      - account_map
    schedules:
    - default
crawlers: {}
views:
  health_events_view:
    dependsOn: {}
    data: |-
      CREATE OR REPLACE VIEW "${athena_database_name}".health_events_view AS
      WITH
        "core" AS (
         SELECT
           "payer_account_id"
         , "account_id"
         , "event_code"
         , "event_category"
         , "event_scope"
         , "status_code"
         , "service"
         , "region"
         , substr(replace("event_description", chr(10), '\n'), 1, 2047) "event_description1"
         , substr(replace("event_description", chr(10), '\n'), 2048, 2047) "event_description2"
         , substr(replace("event_description", chr(10), '\n'), 4095, 2047) "event_description3"
         , substr(replace("event_description", chr(10), '\n'), 6142, 2047) "event_description4"
         , substr(replace("event_description", chr(10), '\n'), 8189) "event_description5"
         , (CASE WHEN starts_with("event_description", 'English follows') THEN 1 ELSE 0 END) "is_alt_language"
         , "affected_entity_value"
         , "affected_entity_arn"
         , "affected_entity_status_code"
         , TRY(CAST(from_iso8601_timestamp("affected_entity_last_update") AS timestamp)) "affected_entity_last_update"
         , "affected_entity_url"
         , "availability_zone"
         , trim(BOTH FROM COALESCE("deprecated_versions", '')) "deprecated_versions"
         , "tags"
         , TRY(CAST(from_iso8601_timestamp("start_time") AS timestamp)) "start_time"
         , TRY(CAST(from_iso8601_timestamp("end_time") AS timestamp)) "end_time"
         , TRY(CAST(from_iso8601_timestamp("last_updated_time") AS timestamp)) "last_updated_time"
         , TRY(CAST(from_iso8601_timestamp("ingestion_time") AS timestamp)) "ingestion_time"
         , "event_metadata"
         , "event_source"
         , "event_arn"
         , substr(to_base64(md5(CAST("event_arn" AS varbinary))), 1, 12) "event_arn_hash"
         , array_join(transform(split(replace("event_code", concat('AWS_', service, '_'), ''), '_'), (x) -> concat(upper(substr(x, 1, 1)), lower(substr(x, 2, length(x))))), ' ', '') "event_code_common"
         , "personas"
         , TRY(json_extract_scalar("personas", '$[0]')) "persona_01"
         , TRY(json_extract_scalar("personas", '$[1]')) "persona_02"
         , TRY(json_extract_scalar("personas", '$[2]')) "persona_03"
         , TRY(json_extract_scalar("personas", '$[3]')) "persona_04"
         , array_join(transform(split(replace("actionability", '_', ' '), ' '), (x) -> concat(upper(substr(x, 1, 1)), lower(substr(x, 2, length(x))))), ' ', '') "actionability"
         FROM
           "${data_collection_database_name}"."health_events_detail_data"
      )
      , "hed_latest" AS (
         SELECT "core".*
         FROM
           ("core"
         INNER JOIN (
            SELECT
              "payer_account_id"
            , "event_arn"
            , max("ingestion_time") "ingestion_time"
            FROM
              "core"
            GROUP BY 1, 2
         )  "latest" ON (("core"."payer_account_id" = "latest"."payer_account_id") AND ("core"."event_arn" = "latest"."event_arn") AND ("core"."ingestion_time" = "latest"."ingestion_time")))
      )
      SELECT
        "hed_latest".*
      , date_diff('hour', "start_time", "end_time") "duration_hours"
      , CAST(current_timestamp AS timestamp) "qs_refresh"
      FROM
        "hed_latest"
      WHERE ("ingestion_time" >= ("date_trunc"('day', current_timestamp) - INTERVAL  '90' DAY))

    parameters:
      data_collection_database_name:
        type: athena
        query: SELECT DISTINCT table_schema FROM information_schema.columns WHERE table_name = 'health_events_detail_data'
        error: "This means that prerequisites for the dashboard are not found. Please make sure you have the needed table: Data Collection installed, needed module is configured and Step Function runs correctly."
        default: optimization_data
        description: "Enter the name of the data collection database"
        global: True