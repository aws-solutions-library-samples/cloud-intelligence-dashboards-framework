AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            OptimizedViewPortWidth: 1600px
            ResizeOption: FIXED
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${AccountDisplayFormat} = "ID", {account_id},
        ${AccountDisplayFormat} = "Name (ID)" and strlen({account_name}) > 0, concat({account_name}, " (", {account_id}, ")"),
        ${AccountDisplayFormat} = "Name (ID)", {account_id},
        strlen({account_name}) > 0, {account_name},
        {account_id}
    )
  Name: Account
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        contains(Description, 'that includes the primary domain '),  split(split(Description, 'that includes the primary domain ', 2), ' ', 1),  //get domain
        left({affected_entity_value}, 4) <> "arn:", {affected_entity_value},
        strlen(split({affected_entity_value}, ":", 7)) > 0, split({affected_entity_value}, ":", 7),
        strlen(split({affected_entity_value}, ":", 6)) > 0, split({affected_entity_value}, ":", 6),
        {affected_entity_value}
    )
  Name: Affected resource
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${ChartAggregation} = "Account", Account,
        ${ChartAggregation} = "Category", {Event Category},
        ${ChartAggregation} = "Event Group", {event_group},
        ${ChartAggregation} = "Event Status", {Event Status},
        ${ChartAggregation} = "Region", region,
        ${ChartAggregation} = "Resource Status", {Resource Status},
        ${ChartAggregation} = "Service", service,
        ${ChartAggregation} = "Title", {event_title},
        {event_group_title_service}
    )
  Name: Chart Aggregation
- DataSetIdentifier: health_events_view
  Expression: ifelse(strlen({deprecated_versions}) > 0, {deprecated_versions}, "n/a")
  Name: Deprecation
- DataSetIdentifier: health_events_view
  Expression: |-
    replace(concat({event_description1}, {event_description2}, {event_description3}, {event_description4}, {event_description5}), "\n", "
    ")
  Name: Description
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description1}, "\n", "
    ")
  Name: Description 1
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description2}, "\n", "
    ")
  Name: Description 2
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description3}, "\n", "
    ")
  Name: Description 3
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description4}, "\n", "
    ")
  Name: Description 4
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description5}, "\n", "
    ")
  Name: Description 5
- DataSetIdentifier: health_events_view
  Expression: formatDate({end_time}, "yyyy-MM-dd")
  Name: End day
- DataSetIdentifier: health_events_view
  Expression: |-
    //issue | accountNotification | scheduledChange | investigation
    ifelse(
        {event_category} = 'issue', 'Issue',
        {event_category} = 'accountNotification', 'Account Notification',
        {event_category} = 'scheduledChange', 'Scheduled Change',
        {event_category} = 'investigation', 'Investigation',
        {event_category}
    )
  Name: Event Category
- DataSetIdentifier: health_events_view
  Expression: "concat(\"\u23EC        \", {event_arn})"
  Name: Event ID Icon
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {status_code} = "upcoming" and {warn_days_within} = 1, "Near",
        {status_code} = "upcoming" and {warn_days_after} = 1, "Future",
        {status_code} = "open", "Current",
        {status_code} = "closed", "Closed",
        {status_code}
    )
  Name: Event Status
- DataSetIdentifier: health_events_view
  Expression: "concat(\n\"TITLE:   \", {event_title},\nifelse({is_lifecycle_event}\
    \ = \"Yes\", \"\n\u26A0\uFE0FPLANNED LIFECYCLE EVENT\",\"\"),\"\nSTATUS:   \"\
    , {event_status_icon}, \"\nSERVICE:   \", service, \"\nREGION:   \", region, \"\
    \nCATEGORY:   \", {event_category_icon}, \"\nPERSONAS:   \", {persona_icons},\
    \ \"\nACTION:   \", actionability, \"\nSTART:   \", formatDate({start_time}, \"\
    MMM-dd-yyyy\"), ifelse(isNull({end_time}), \"\", concat(\"    END:   \", {End\
    \ day}))\n)"
  Name: Event Summary
- DataSetIdentifier: health_events_view
  Expression: |-
    concat(
    "Start: ", formatDate({start_time}), ifelse(isNull({end_time}),"", concat("
    End: ", formatDate({end_time}))))
  Name: Event Time Range
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {is_lifecycle_event_qs} = 0, NULL,
        concat("", ifelse(strlen({deprecated_versions}) > 0, {deprecated_versions}, {event_title}))
    )
  Name: Lifecycle Event Name
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${RecentActivityGrouping} = "Account", Account,
        ${RecentActivityGrouping} = "Payer", {payer_account_id},
        ${RecentActivityGrouping} = "Service", service,
        ${RecentActivityGrouping} = "Start Date", formatDate({start_time}),
        ""
    )
  Name: Recent Activity
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {affected_entity_status_code} = 'IMPAIRED', 'Impaired',
        {affected_entity_status_code} = 'UNIMPAIRED', 'Unimpaired',
        {affected_entity_status_code} = 'UNKNOWN', 'Unknown',
        {affected_entity_status_code} = 'PENDING', 'Pending',
        {affected_entity_status_code} = 'RESOLVED', 'Resolved',
        'No status'
    )
  Name: Resource Status
- DataSetIdentifier: health_events_view
  Expression: formatDate({start_time}, "yyyy-MM-dd")
  Name: Start day
- DataSetIdentifier: health_events_view
  Expression: truncDate("MM", {start_time})
  Name: Start month
- DataSetIdentifier: health_events_view
  Expression: truncDate("WK", {start_time})
  Name: Start week
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${ChartGrouping} = "Account", Account,
        ${ChartGrouping} = "Category", {Event Category},
        ${ChartGrouping} = "Event Group", {event_group},
        ${ChartGrouping} = "Event Status", {Event Status},
        ${ChartGrouping} = "Region", region,
        ${ChartGrouping} = "Resource Status", {Resource Status},
        ${ChartGrouping} = "Service", service,
        ${ChartGrouping} = "Title", {event_group_title_service},
        ${ChartGrouping} = "Lifecycle Event", {Lifecycle Event Name},
        {event_title}
    )
  Name: Summary Grouping
- DataSetIdentifier: health_events_view
  Expression: '{event_title}'
  Name: Title
- DataSetIdentifier: health_events_view
  Expression: concat({account_id},region,{affected_entity_value})
  Name: Unique Affected Entities
- DataSetIdentifier: health_events_view
  Expression: concat("https://health.console.aws.amazon.com/health/home#/organization/event-log?eventID=",{event_arn},
    "&eventTab=details")
  Name: console_link
- DataSetIdentifier: health_events_view
  Expression: concat(formatDate({start_time}, "yyyy-MM-dd"), " - ", {event_code})
  Name: date_event_code
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${DescriptionPage} = 2, {Description 2},
        ${DescriptionPage} = 3, {Description 3},
        ${DescriptionPage} = 4, {Description 4},
        ${DescriptionPage} = 5, {Description 5},
        {Description 1}
    )
  Name: description_page
- DataSetIdentifier: health_events_view
  Expression: ${DescriptionPage}
  Name: description_page_number
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(distinctCountOver(ifelse(${EventGroupFormat} = "Service and Event Title",{event_group_title_service},{event_group}), [], PRE_AGG) = 1,
    concat({Event Summary}, "
    ", Description
    ),
    "Click a line item to the left to reveal its description")
  Name: description_single
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${ReportSummaryDescriptionFormat} = "Brief",
            replace(left(
                ifelse(startsWith({Description 1}, "[AWS"), substring({Description 1}, locate({Description 1}, "]", 1) + 3, strlen({Description 1})), {Description 1}),
                ${SummaryDescriptionLength}), "
    ", " "),
        ${ReportSummaryDescriptionFormat} = "Full", Description,
        ""
    )
  Name: description_summary_report
- DataSetIdentifier: health_events_view
  Expression: "concat(\n\"\u25CF  Last Update on or after \", formatDate(addDateTime(-1*${LastUpdateDaysAgo},\
    \ \"DD\", now()), \"MMM-dd-yyyy\"), \" (\",  toString(${LastUpdateDaysAgo}) ,\
    \ \" days ago)\n\u25CF  Start Date on or after \", formatDate(addDateTime(${RelativeStartFromNowDays},\
    \ \"DD\", now()), \"MMM-dd-yyyy\"), \".\n\u25CF  Oldest event without filter was\
    \ last updated on \", formatDate(minOver({last_updated_time},[], PRE_FILTER),\
    \ \"MMM-dd-yyyy\"), \" (\", toString(dateDiff(minOver({last_updated_time},[],\
    \ PRE_FILTER), now(), \"DD\")), \" days ago)\n\u25CF  Earliest Start Date without\
    \ filter is \", formatDate(minOver({start_time},[], PRE_FILTER), \"MMM-dd-yyyy\"\
    ), \" (\", toString(dateDiff(minOver({start_time},[], PRE_FILTER), now(), \"DD\"\
    )), \" days ago)\")"
  Name: effective_date_scope
- DataSetIdentifier: health_events_view
  Expression: "concat(\n\"\u25CF  Filtering to Events with Start Date on or after:\
    \ \", formatDate(addDateTime(${RelativeStartFromNowDays}, \"DD\", now()), \"MMM-dd-yyyy\"\
    ), \"\n\u25CF  Last Update on or after \", formatDate(addDateTime(-1*${LastUpdateDaysAgo},\
    \ \"DD\", now()), \"MMM-dd-yyyy\"), \" (\",  toString(${LastUpdateDaysAgo}) ,\
    \ \" days ago)\"\n)"
  Name: effective_start_date_short
- DataSetIdentifier: health_events_view
  Expression: left({event_category_icon}, 1)
  Name: event_category_icon_only
- DataSetIdentifier: health_events_view
  Expression: ifelse({event_arn_hash} = "EMPTY_RECORD_FILLER", "Select a single event
    or event group", "Click to see event details")
  Name: event_detail_page_link
- DataSetIdentifier: health_events_view
  Expression: toLower(concat(service, " ", Title, ". Starting ", formatDate(truncDate("DD",{start_time}),
    "yyyy-MM-dd")))
  Name: event_grouping
- DataSetIdentifier: health_events_view
  Expression: left({event_status_icon}, 1)
  Name: event_status_icon_only
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {Event Status} = "Near", 1,
        {Event Status} = "Future", 2,
        {Event Status} = "Current", 0,
        -1
    )
  Name: event_status_numeric
- DataSetIdentifier: health_events_view
  Expression: distinctCountOver({event_arn}, [{affected_entity_value}], PRE_AGG)
  Name: events_for_resource
- DataSetIdentifier: health_events_view
  Expression: ' distinctCountOver(ifelse(${EventGroupFormat} = "Service and Event
    Title",{event_group_title_service},{event_group}), [], PRE_AGG)'
  Name: events_in_group
- DataSetIdentifier: health_events_view
  Expression: minOver(({last_updated_time}), [{event_arn}], PRE_AGG)
  Name: first_updated_time
- DataSetIdentifier: health_events_view
  Expression: "ifelse(\n    min({last_ingestion_days_ago}, [{payer_account_id}]) >\
    \ 13, \"\U0001F534\",\n    min({last_ingestion_days_ago}, [{payer_account_id}])\
    \ > 6, \"\U0001F7E1\",\n    \"\U0001F7E2\"\n)"
  Name: ingest_health
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        isNull(${SearchText}), 1,
        strlen(${SearchText}) = 0, 1,
        ${SearchText} = "(search text)", 1,
        contains(concat(searchable,{event_arn},{affected_entity_arn}, {account_id}, {account_name}), ${SearchText}, CASE_INSENSITIVE), 1,
        0
    )
  Name: is_in_free_search
- DataSetIdentifier: health_events_view
  Expression: ifelse(strlen({deprecated_versions}) > 0 or contains({event_code}, "PLANNED_LIFECYCLE_EVENT")
    or contains({event_code}, "DEPRECATION"), 1, 0)
  Name: is_lifecycle_event_qs
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${UseMostRecentUpdate} = "Yes", ifelse(truncDate("MM", {last_updated_time}) = truncDate("MM", {most_recent_update}), 1, 0),
        1
    )
  Name: is_most_recent_update
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "BILLING", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_billing
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "OPERATIONS", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_operations
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${Persona} = "All Personas", 1,
        ({persona_01} = ${Persona} or {persona_02} = ${Persona} or {persona_03} = ${Persona}), 1,
        0
    )
  Name: is_persona_scope
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "SECURITY", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_security
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "IMPAIRED", 1, 0)
  Name: is_resource_impaired
- DataSetIdentifier: health_events_view
  Expression: ifelse(({affected_entity_status_code} = "" OR {affected_entity_status_code}
    = "UNKNOWN"), 1, 0)
  Name: is_resource_no_status
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "PENDING", 1, 0)
  Name: is_resource_pending
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "RESOLVED", 1, 0)
  Name: is_resource_resolved
- DataSetIdentifier: health_events_view
  Expression: ifelse({is_resource_impaired} = 1 or {is_resource_pending} = 1, 1, 0)
  Name: is_resource_unresolved
- DataSetIdentifier: health_events_view
  Expression: dateDiff({ingestion_time}, now(), "DD")
  Name: last_ingestion_days_ago
- DataSetIdentifier: health_events_view
  Expression: dateDiff({last_updated_time}, now(), "DD")
  Name: last_update_days_ago
- DataSetIdentifier: health_events_view
  Expression: "ifelse({is_lifecycle_event} = \"Yes\", \"\U0001F98B PLE\", \"\")"
  Name: lifecycle_event_icon
- DataSetIdentifier: health_events_view
  Expression: max({ingestion_time}, [{payer_account_id}])
  Name: max_ingestion_time
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${MostRecentCalcLevel} = "PRE_AGG", maxOver({last_updated_time}, [{affected_entity_value}, {event_title}, {event_category}, region, {account_id}, {Description 1}], PRE_AGG ),
        maxOver({last_updated_time}, [{affected_entity_value}, Title, {event_category}, region, {account_id}, {Description 1}], PRE_FILTER )
    )
  Name: most_recent_update
- DataSetIdentifier: health_events_view
  Expression: "concat(\n    ifelse(contains(personas, \"OPERATIONS\"), \"\U0001F6E0\
    \uFE0F Operations\", \"\"),\n    ifelse(contains(personas, \"BILLING\"), \"\U0001F9FE\
    \ Billing\", \"\"),\n    ifelse(contains(personas, \"SECURITY\"), \"\U0001F6E1\
    \uFE0F Security\", \"\")\n)"
  Name: persona_icons
- DataSetIdentifier: health_events_view
  Expression: "concat(\n    ifelse(contains(personas, \"OPERATIONS\"), \"\U0001F6E0\
    \uFE0F\", \"\"),\n    ifelse(contains(personas, \"BILLING\"), \"\U0001F9FE\",\
    \ \"\"),\n    ifelse(contains(personas, \"SECURITY\"), \"\U0001F6E1\uFE0F\", \"\
    \")\n)"
  Name: personas_icons_only
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        dateDiff({last_updated_time}, now()) <= ${RecentActivityDaysAgo} or dateDiff({first_updated_time}, now()) <= ${RecentActivityDaysAgo}, "Yes",
        "No"
    )
  Name: recent_event_update
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(strlen(
        ifelse(
            ${RecentUpdateDimension} = "Account", Account,
            ${RecentUpdateDimension} = "Category", {event_category_icon},
            ${RecentUpdateDimension} = "Event Group", {event_group},
            ${RecentUpdateDimension} = "Event Status", {Event Status},
            ${RecentUpdateDimension} = "Persona", {persona_icons},
            ${RecentUpdateDimension} = "Region", region,
            ${RecentUpdateDimension} = "Resource Status", {Resource Status},
            ${RecentUpdateDimension} = "Service", service,
            ${RecentUpdateDimension} = "Start Day", {Start day},
            ${RecentUpdateDimension} = "Title", {event_group_title_service},
            ${RecentUpdateDimension} = "Lifecycle Event", {Lifecycle Event Name},
            service
        )) = 0, NULL,
        concat(toString({last_update_days_ago}), " days ago | ",
            ifelse(
                ${RecentUpdateDimension} = "Account", Account,
                ${RecentUpdateDimension} = "Category", {event_category_icon},
                ${RecentUpdateDimension} = "Event Group", {event_group},
                ${RecentUpdateDimension} = "Event Status", {Event Status},
                ${RecentUpdateDimension} = "Persona", {persona_icons},
                ${RecentUpdateDimension} = "Region", region,
                ${RecentUpdateDimension} = "Resource Status", {Resource Status},
                ${RecentUpdateDimension} = "Service", service,
                ${RecentUpdateDimension} = "Start Day", {Start day},
                ${RecentUpdateDimension} = "Title", {event_group_title_service},
                ${RecentUpdateDimension} = "Lifecycle Event", {Lifecycle Event Name},
                service), " | Starts ", formatDate({start_time}, "MMM-dd-yyyy"))
    )
  Name: recent_update_via_grouping
- DataSetIdentifier: health_events_view
  Expression: dateDiff(now(), {start_time}, "DD")
  Name: relative_start_from_now_days
- DataSetIdentifier: health_events_view
  Expression: '{start_time} > now()'
  Name: relative_start_time
- DataSetIdentifier: health_events_view
  Expression: '"CLICK TO RESET ALL FILTERS TO DEFAULT"'
  Name: reset
- DataSetIdentifier: health_events_view
  Expression: tolower(concat({event_title},Description))
  Name: searchable
- DataSetIdentifier: health_events_view
  Expression: concat(formatDate({start_time}, "MMM-dd-yyyy"), "  (", toString({relative_start_from_now_days}),
    " days)")
  Name: start_date_with_days_out
- DataSetIdentifier: health_events_view
  Expression: formatDate({Start week}, "yyyy-MM-dd")
  Name: start_week_string
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {is_lifecycle_event} = "Yes", 1,
        ${LifecycleEventsOnly} = "No", 1,
        0
    )
  Name: util_lifecycle_event_filter
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        contains(${Persona}, "All personas", CASE_INSENSITIVE), 1,
        {is_persona_billing} = 1 AND contains(${Persona}, "BILLING", CASE_INSENSITIVE), 1,
        {is_persona_operations} = 1 AND contains(${Persona}, "OPERATIONS", CASE_INSENSITIVE), 1,
        {is_persona_security} = 1 AND contains(${Persona}, "SECURITY", CASE_INSENSITIVE), 1,
        0
    )
  Name: util_persona_filter
- DataSetIdentifier: health_events_view
  Expression: dateDiff(now(), {start_time}, "DD") >= ${StartTimeWarn}
  Name: warn_days_after
- DataSetIdentifier: health_events_view
  Expression: '{start_time} < addDateTime(${StartTimeWarn}, "DD", now())'
  Name: warn_days_within
