  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-family=\"Amazon Ember\"\
      \ font-size=\"40px\">\n    <b>AWS</b>\n  </inline>\n  <inline color=\"#fc850d\"\
      \ font-size=\"40px\">\n    <b>\_</b>\n  </inline>\n  <inline color=\"Accent\"\
      \ font-size=\"40px\">\n    <b>Health Events Dashboard</b>\n  </inline>\n  <br/>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>This dashboard requires the Health Events module from the\_\
      </i>\n      </inline>\n      <inline color=\"#95cbf6\" font-size=\"16px\">\n\
      \        <a href=\"https://docs.aws.amazon.com/guidance/latest/cloud-intelligence-dashboards/data-collection.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\n              <u>Cloud\
      \ Intelligence Dashboards Data Collection framework</u>\n            </i>\n\
      \          </b>\n        </a>\n      </inline>\n      <inline font-size=\"16px\"\
      >\n        <i>.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline font-size=\"16px\">\n        <i>The dashboard is not realtime\
      \ but the data collected typically refreshes daily, depending on the schedules\
      \ established for the collector module and QuickSight refresh</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\"\
      >\n        <i>Use the\_</i>\n      </inline>\n      <inline font-size=\"16px\"\
      >\n        <b>\n          <i>Main\_</i>\n        </b>\n      </inline>\n   \
      \   <inline font-size=\"16px\">\n        <i>tab for high level statistics, drill-down,\
      \ and reporting.\_</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline font-size=\"16px\">\n        <i>The\_</i>\n      </inline>\n\
      \      <inline font-size=\"16px\">\n        <b>\n          <i>Quick View\_</i>\n\
      \        </b>\n      </inline>\n      <inline font-size=\"16px\">\n        <i>tab\
      \ supports quick filtering and reporting.\_</i>\n      </inline>\n    </li>\n\
      \  </ul>\n</text-box>"
    SheetTextBoxId: bb872bf5-f947-4d7d-adfb-34b27cfeb63e
  - Content: "<text-box>\n  <inline font-size=\"6px\">\_</inline>\n  <inline color=\"\
      Accent\" font-size=\"24px\">\n    <b>\n      <i>How to Use</i>\n    </b>\n \
      \ </inline>\n  <br/>\n  <br/>\n  <inline color=\"#fc850d\" font-size=\"16px\"\
      >\n    <b>\_\_\u26A1 SUMMARY</b>\n  </inline>\n  <inline font-size=\"16px\"\
      >\_</inline>\n  <inline color=\"#c1c9cb\" font-size=\"16px\">\n    <i>for stats\
      \ of all events and recent updates</i>\n  </inline>\n  <br/>\n  <inline color=\"\
      PrimaryForeground\" font-size=\"16px\">\n    <b>\_\_\_\u29E9\_\_</b>\n  </inline>\n\
      \  <inline color=\"#fc850d\" font-size=\"16px\">\n    <b>\_DRILL\_DOWN</b>\n\
      \  </inline>\n  <inline color=\"#c1c9cb\" font-size=\"16px\">\_</inline>\n \
      \ <inline color=\"#c1c9cb\" font-size=\"16px\">\n    <i>to refine and search\
      \ by various criteria</i>\n  </inline>\n  <br/>\n  <inline color=\"#fc850d\"\
      \ font-size=\"16px\">\n    <b>\_\_&#128190; EXPORT</b>\n  </inline>\n  <inline\
      \ color=\"#c1c9cb\" font-size=\"16px\">\_</inline>\n  <inline color=\"#c1c9cb\"\
      \ font-size=\"16px\">\n    <i>to Export and share event notices</i>\n  </inline>\n\
      \  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#dbdbdb\" font-size=\"14px\">\n\
      \    <b>NOTE:</b>\n  </inline>\n  <inline color=\"#dbdbdb\" font-size=\"14px\"\
      >\_</inline>\n  <inline color=\"#dbdbdb\" font-size=\"14px\">\n    <i>Multiple\
      \ events may be related but differentiated by region and account. Any event\
      \ can reference multiple resources. Visuals aggregate distinct events or resources\
      \ using various grouping dimensions and filters such that impacted resource\
      \ count numbers may vary between charts.</i>\n  </inline>\n</text-box>"
    SheetTextBoxId: ffd58e6d-cb65-4963-9460-008f6508b5aa
  - Content: "<text-box>\n  <inline font-size=\"18px\">The tables below are designed\
      \ for exporting to CSV or Excel and are based on the filtering applied above.\_\
      </inline>\n  <br/>\n  <inline font-size=\"18px\"/>\n  <inline font-size=\"18px\"\
      >Use the controls at the top right of each report to export.</inline>\n  <br/>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>Adjust the scope via the filter controls above.</i>\n  \
      \    </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>You can alter the length of the description with the Report\
      \ Summary Description Format contol at the top.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">\n       \
      \ <i>\n          <u>A single event may have multiple entries</u>\n        </i>\n\
      \      </inline>\n      <inline font-size=\"16px\">\n        <i>\_if the descriptions\
      \ vary across regions or accounts.</i>\n      </inline>\n    </li>\n  </ul>\n\
      </text-box>"
    SheetTextBoxId: 1af54d7d-86aa-4909-a3ae-42bf9eac0db9
  - Content: "<text-box>\n  <br/>\n  <br/>\n  <br/>\n  <inline color=\"#fc850d\" font-size=\"\
      36px\">\n    <b>\u26A1</b>\n  </inline>\n  <inline color=\"#fc850d\" font-size=\"\
      40px\">\n    <b>S</b>\n  </inline>\n  <inline color=\"#fc850d\" font-size=\"\
      36px\">\n    <b>UMMARY</b>\n  </inline>\n</text-box>"
    SheetTextBoxId: 024953c4-0eb3-47a6-b674-ab124ecf96a0
  - Content: "<text-box>\n  <inline color=\"Accent\" font-size=\"28px\">\n    <b>How\
      \ to Use Filters</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\"\
      >\n      <inline color=\"#cdd1d2\" font-size=\"18px\">\n        <i>Filters are\
      \ optimized for reviewing upcoming</i>\n      </inline>\n      <inline color=\"\
      #cdd1d2\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/health/latest/ug/aws-health-planned-lifecycle-events.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\_</i>\n          </b>\n\
      \        </a>\n      </inline>\n      <b>\n        <i>\_\_\_\_</i>\n      </b>\n\
      \      <inline color=\"#95cbf6\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/health/latest/ug/aws-health-planned-lifecycle-events.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>\n              <u>Planned\
      \ Lifecycle Events</u>\n            </i>\n          </b>\n        </a>\n   \
      \   </inline>\n      <inline color=\"#95cbf6\">\n        <i>\_</i>\n      </inline>\n\
      \      <inline color=\"#cdd1d2\" font-size=\"18px\">\n        <i>(</i>\n   \
      \   </inline>\n      <inline color=\"#cdd1d2\" font-size=\"18px\">&#129419;</inline>\n\
      \      <inline color=\"#cdd1d2\" font-size=\"18px\">\n        <i>\_PLE) by default.</i>\n\
      \      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"\
      #cdd1d2\" font-size=\"18px\">\n        <i>You can adjust that event scope as\
      \ needed.</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n\
      \      <inline color=\"#cdd1d2\" font-size=\"18px\">\n        <i>Use the reset\
      \ button (below) to return to default.</i>\n      </inline>\n    </li>\n  </ul>\n\
      </text-box>"
    SheetTextBoxId: 2b2df5f2-7ba2-4069-bd35-614e510e47b4
  - Content: "<text-box>\n  <inline color=\"Accent\" font-size=\"28px\">\n    <b>All\
      \ Events</b>\n  </inline>\n  <br/>\n  <inline color=\"#cdd1d2\" font-size=\"\
      12px\">\n    <i>&#128992;\_</i>\n  </inline>\n  <inline color=\"#cdd1d2\" font-size=\"\
      18px\">\n    <b>\n      <i>Near\_</i>\n    </b>\n  </inline>\n  <inline color=\"\
