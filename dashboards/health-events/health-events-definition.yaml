  TextBoxes:
  - Content: "<text-box>\n  <inline color=\"#fc850d\" font-family=\"Amazon Ember\"\
      \ font-size=\"40px\">\n    <b>AWS</b>\n  </inline>\n  <inline color=\"#fc850d\"\
      \ font-size=\"40px\">\n    <b>\_</b>\n  </inline>\n  <inline color=\"Accent\"\
      \ font-size=\"40px\">\n    <b>Health Events Dashboard</b>\n  </inline>\n  <br/>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>This dashboard requires the Health Events module from the\_\
      </i>\n      </inline>\n      <inline color=\"#95cbf6\" font-size=\"16px\">\n\
      \        <a href=\"https://docs.aws.amazon.com/guidance/latest/cloud-intelligence-dashboards/data-collection.html\"\
      \ target=\"_blank\">\n          <b>\n            <i>Cloud Intelligence Dashboards\
      \ Data Collection framework</i>\n          </b>\n        </a>\n      </inline>\n\
      \      <inline font-size=\"16px\">\n        <i>.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">\n       \
      \ <i>The dashboard is not realtime but the data collected typically refreshes\
      \ daily, depending on the schedules established for the collector module and\
      \ QuickSight refresh</i>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\"\
      >\n      <inline font-size=\"16px\">\n        <i>Use the\_</i>\n      </inline>\n\
      \      <inline font-size=\"16px\">\n        <b>\n          <i>Main\_</i>\n \
      \       </b>\n      </inline>\n      <inline font-size=\"16px\">\n        <i>tab\
      \ for high level statistics, drill-down, and reporting.\_</i>\n      </inline>\n\
      \    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\"\
      >\n        <i>The\_</i>\n      </inline>\n      <inline font-size=\"16px\">\n\
      \        <b>\n          <i>Quick View\_</i>\n        </b>\n      </inline>\n\
      \      <inline font-size=\"16px\">\n        <i>tab supports quick filtering\
      \ and reporting.\_</i>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
    SheetTextBoxId: aa9298d3-7488-4756-b953-4b8ebb6255c0
  - Content: "<text-box>\n  <inline color=\"#fec48c\" font-size=\"24px\">H</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"20px\">OW TO\_</inline>\n  <inline\
      \ color=\"#fec48c\" font-size=\"24px\">U</inline>\n  <inline color=\"#fec48c\"\
      \ font-size=\"20px\">SE</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\"\
      >\_   1. Review\_</inline>\n  <inline font-size=\"16px\">\n    <b>\u26A1</b>\n\
      \  </inline>\n  <inline color=\"#fec48c\" font-size=\"18px\">\n    <b>S</b>\n\
      \  </inline>\n  <inline color=\"#fec48c\" font-size=\"16px\">\n    <b>UMMARY</b>\n\
      \  </inline>\n  <inline font-size=\"16px\">\n    <b>\_</b>\n  </inline>\n  <inline\
      \ font-size=\"16px\">for recent updates and stats for all events.</inline>\n\
      \  <br/>\n  <inline font-size=\"16px\">\_   2. Refine with filters in the &#128269;</inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"18px\">\n    <b>D</b>\n  </inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"16px\">\n    <b>RILL\_</b>\n  </inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"18px\">\n    <b>D</b>\n  </inline>\n\
      \  <inline color=\"#fec48c\" font-size=\"16px\">\n    <b>OWN</b>\n  </inline>\n\
      \  <inline font-size=\"16px\">\_section.</inline>\n  <br/>\n  <inline font-size=\"\
      16px\">\_\_\_\_3.\_</inline>\n  <inline color=\"PrimaryForeground\" font-size=\"\
      16px\">Export and share event notices using the\_</inline>\n  <inline font-size=\"\
      16px\">\n    <b>&#128190;</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      18px\">\n    <b>R</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      16px\">\n    <b>EPORT\_</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      18px\">\n    <b>E</b>\n  </inline>\n  <inline color=\"#fec48c\" font-size=\"\
      16px\">\n    <b>XPORT</b>\n  </inline>\n  <inline font-size=\"16px\">\_section.</inline>\n\
      \  <br/>\n  <br/>\n  <inline color=\"#dbdbdb\" font-size=\"14px\">\n    <b>NOTE:</b>\n\
      \  </inline>\n  <inline color=\"#dbdbdb\" font-size=\"14px\">\_</inline>\n \
      \ <inline color=\"#dbdbdb\" font-size=\"14px\">\n    <i>Multiple events may\
      \ be related but differentiated by region and account. Any event can reference\
      \ multiple resources. Visuals aggregate distinct events or resources using various\
      \ grouping dimensions and filters such that impacted resource count numbers\
      \ may vary between charts.</i>\n  </inline>\n</text-box>"
    SheetTextBoxId: a03f8c8c-dc18-4f75-8485-91e2ebc13a8e
  - Content: "<text-box>\n  <inline font-size=\"18px\">\n    <b>The tables below are\
      \ designed for exporting to CSV or Excel. They are based on the filtering you\
      \ have applied above. The first is a high-level account summary and the second\
      \ is an itemized report with all impacted resources.\_</b>\n  </inline>\n  <br/>\n\
      \  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>Adjust the scope via the filter controls above.</i>\n  \
      \    </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"\
      16px\">\n        <i>You can alter the length of the description with the Report\
      \ Summary Description Format contol at the top.</i>\n      </inline>\n    </li>\n\
      \    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">\n       \
      \ <i>\n          <u>A single event may have multiple entries</u>\n        </i>\n\
      \      </inline>\n      <inline font-size=\"16px\">\n        <i>\_if the descriptions\
      \ vary across regions or accounts.</i>\n      </inline>\n    </li>\n  </ul>\n\
      </text-box>"
