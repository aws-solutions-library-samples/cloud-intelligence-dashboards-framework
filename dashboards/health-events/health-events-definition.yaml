AnalysisDefaults:
  DefaultNewSheetConfiguration:
    InteractiveLayoutConfiguration:
      Grid:
        CanvasSizeOptions:
          ScreenCanvasSizeOptions:
            OptimizedViewPortWidth: 1600px
            ResizeOption: FIXED
    SheetContentType: INTERACTIVE
CalculatedFields:
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${ConfigAccountDisplayFormat} = "ID", {account_id},
        ${ConfigAccountDisplayFormat} = "Name (ID)" and strlen({account_name}) > 0, concat({account_name}, " (", {account_id}, ")"),
        ${ConfigAccountDisplayFormat} = "Name (ID)", {account_id},
        strlen({account_name}) > 0, {account_name},
        {account_id}
    )
  Name: Account
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        contains(Description, 'that includes the primary domain '),  split(split(Description, 'that includes the primary domain ', 2), ' ', 1),  //get domain
        left({affected_entity_value}, 4) <> "arn:", {affected_entity_value},
        strlen(split({affected_entity_value}, ":", 7)) > 0, split({affected_entity_value}, ":", 7),
        strlen(split({affected_entity_value}, ":", 6)) > 0, split({affected_entity_value}, ":", 6),
        {affected_entity_value}
    )
  Name: Affected resource
- DataSetIdentifier: health_events_view
  Expression: concat("https://health.console.aws.amazon.com/health/home#/organization/event-log?eventID=",{event_arn},
    "&eventTab=details")
  Name: Console Link
- DataSetIdentifier: health_events_view
  Expression: ifelse(strlen({deprecated_versions}) > 0, {deprecated_versions}, "n/a")
  Name: Deprecation
- DataSetIdentifier: health_events_view
  Expression: |-
    replace(concat({event_description1}, {event_description2}, {event_description3}, {event_description4}, {event_description5}), "\n", "
    ")
  Name: Description
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description1}, "\n", "
    ")
  Name: Description 1
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description2}, "\n", "
    ")
  Name: Description 2
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description3}, "\n", "
    ")
  Name: Description 3
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description4}, "\n", "
    ")
  Name: Description 4
- DataSetIdentifier: health_events_view
  Expression: |-
    replace({event_description5}, "\n", "
    ")
  Name: Description 5
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${6ae4e600-65a3-4537-b750-9cc75de0b58d} = 2, {Description 2},
        ${6ae4e600-65a3-4537-b750-9cc75de0b58d} = 3, {Description 3},
        ${6ae4e600-65a3-4537-b750-9cc75de0b58d} = 4, {Description 4},
        ${6ae4e600-65a3-4537-b750-9cc75de0b58d} = 5, {Description 5},
        {Description 1}
    )
  Name: Description Page
- DataSetIdentifier: health_events_view
  Expression: formatDate({end_time}, "yyyy-MM-dd")
  Name: End Day
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {event_category} = 'issue', 'Issue',
        {event_category} = 'accountNotification', 'Account Notification',
        {event_category} = 'scheduledChange', 'Scheduled Change',
        {event_category} = 'investigation', 'Investigation',
        {event_category}
    )
  Name: Event Category
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {util_single_event_filter} = 0, "Click a line item to the left to reveal its description",
        left(${UtilDescriptionPage}, 1) = "0", {Event Summary},
        concat("(", region, ")
    ", ifelse(
                ${UtilDescriptionPage} = "1", {Description 1},
                ${UtilDescriptionPage} = "2", {Description 2},
                ${UtilDescriptionPage} = "3", {Description 3},
                ${UtilDescriptionPage} = "4", {Description 4},
                ${UtilDescriptionPage} = "5", {Description 5},
                {Description 1}
            )
        )
    )
  Name: Event Description Paginated
- DataSetIdentifier: health_events_view
  Expression: '{event_group_title_service}'
  Name: Event Full Title
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {status_code} = "upcoming" and {is_warn_days_within} = 1, "Near",
        {status_code} = "upcoming" and {is_future_event} = 1, "Future",
        {status_code} = "open", "Open",
        {status_code} = "closed", "Closed",
        {status_code}
    )
  Name: Event Status
- DataSetIdentifier: health_events_view
  Expression: "concat(\n\"TITLE:   \", {event_title},\nifelse({is_lifecycle_event}\
    \ = 1, \"\nPLANNED LIFECYCLE EVENT \U0001F98B\",\"\n\"),\"\nSERVICE:   \", service,\
    \ \"\nREGION:   \", region, \"\nCATEGORY:   \", {event_category_icon}, \"\nACTIONABILITY:\
    \   \", {actionability_icon}, \"\nPERSONAS:   \", {persona_all_icons}, \"\nSTATUS:\
    \   \", {event_status_icon}, ifelse({relative_start_days_from_now} > 0 and {relative_start_days_from_now}\
    \ < 30, \" \u26A0\uFE0F\", \"\"),\"  (starts in \", toString({relative_start_days_from_now}),\
    \ \" days)\nSTART:   \", formatDate({start_time}, \"MMM-dd-yyyy\"), ifelse(isNull({end_time}),\
    \ \"\", concat(\"    END:   \", {End Day})), \"\nLAST UPDATE:   \", formatDate({last_updated_time},\
    \ \"MMM-dd-yyyy\"), \"  (\", {last_update_days_ago_text}, \")\", \"\nFIRST EVENT\
    \ UPDATE FOUND LOCALLY:    \", formatDate({first_event_updated_time_in_collection},\
    \ \"MMM-dd-yyyy\"), \" *\", \"\n* \", {util_first_update_disclaimer}\n)"
  Name: Event Summary
- DataSetIdentifier: health_events_view
  Expression: |-
    concat(
    "Start: ", formatDate({start_time}), ifelse(isNull({end_time}),"", concat("
    End: ", formatDate({end_time}))))
  Name: Event Time Range
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${FilterChartGrouping} = "Account", Account,
        ${FilterChartGrouping} = "Actionability", actionability,
        ${FilterChartGrouping} = "Category", {Event Category},
        ${FilterChartGrouping} = "Event Group", {event_group},
        ${FilterChartGrouping} = "Event Status", {Event Status},
        ${FilterChartGrouping} = "Persona", {Persona Primary},
        ${FilterChartGrouping} = "Region", region,
        ${FilterChartGrouping} = "Resource Status", {Resource Status},
        ${FilterChartGrouping} = "Service", service,
        ${FilterChartGrouping} = "Title", {event_group_title_service},
        ${FilterChartGrouping} = "Lifecycle Event", {Lifecycle Event},
        {event_title}
    )
  Name: FIlter Chart Grouping
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {is_lifecycle_event} = 0, NULL,
        concat("", ifelse(strlen({deprecated_versions}) > 0, {deprecated_versions}, {event_title}))
    )
  Name: Lifecycle Event
- DataSetIdentifier: health_events_view
  Expression: concat(toUpper(left({persona_01},1)), toLower(substring({persona_01},
    2,20)))
  Name: Persona Primary
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {affected_entity_status_code} = 'IMPAIRED', 'Impaired',
        {affected_entity_status_code} = 'UNIMPAIRED', 'Unimpaired',
        {affected_entity_status_code} = 'UNKNOWN', 'Unknown',
        {affected_entity_status_code} = 'PENDING', 'Pending',
        {affected_entity_status_code} = 'RESOLVED', 'Resolved',
        'No status'
    )
  Name: Resource Status
- DataSetIdentifier: health_events_view
  Expression: formatDate({start_time}, "yyyy-MM-dd")
  Name: Start day
- DataSetIdentifier: health_events_view
  Expression: truncDate("MM", {start_time})
  Name: Start month
- DataSetIdentifier: health_events_view
  Expression: truncDate("WK", {start_time})
  Name: Start week
- DataSetIdentifier: health_events_view
  Expression: '{event_title}'
  Name: Title
- DataSetIdentifier: health_events_view
  Expression: left({actionability_icon}, 1)
  Name: actionability_icon_only
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${ReportSummaryDescriptionFormat} = "Brief",
            replace(left(
                ifelse(startsWith({Description 1}, "[AWS"), substring({Description 1}, locate({Description 1}, "]", 1) + 3, strlen({Description 1})), {Description 1}),
                ${ReportSummaryDescriptionLength}), "
    ", " "),
        ${ReportSummaryDescriptionFormat} = "Full", Description,
        ""
    )
  Name: description_summary_report
- DataSetIdentifier: health_events_view
  Expression: left({event_category_icon}, 1)
  Name: event_category_icon_only
- DataSetIdentifier: health_events_view
  Expression: left({event_status_icon}, 1)
  Name: event_status_icon_only
- DataSetIdentifier: health_events_view
  Expression: distinctCountOver({event_arn}, [{affected_entity_value}], PRE_AGG)
  Name: events_for_resource
- DataSetIdentifier: health_events_view
  Expression: ' distinctCountOver(ifelse(${ConfigEventGroupFormat} = "Service and
    Event Title",{event_group_title_service},{event_group}), [], PRE_AGG)'
  Name: events_in_group
- DataSetIdentifier: health_events_view
  Expression: ifelse(${FilterEventScopeMode} = "Yes", "The following report contains
    Planned Lifecycle Events (PLE) only.", "The following report contains Planned
    Lifecycle Events (PLE) and non-PLEs.")
  Name: filter_description
- DataSetIdentifier: health_events_view
  Expression: |-
    // minOver({last_updated_time}, [{event_arn}], PRE_FILTER)
    {first_event_updated_time_in_collection}
  Name: first_updated_time
- DataSetIdentifier: health_events_view
  Expression: dateDiff(now(), {start_time}, "DD") >= ${ConfigNearDaysThreshold}
  Name: is_future_event
- DataSetIdentifier: health_events_view
  Expression: "ifelse({is_lifecycle_event} = 1, \"\U0001F98B\", \"\u2014\")"
  Name: is_lifecycle_event_icon
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${a31eec6b-bd17-4d2b-97eb-0f85690b0ab1} = "Yes", ifelse(truncDate("MM", {last_updated_time}) = truncDate("MM", {most_recent_update}), 1, 0),
        1
    )
  Name: is_most_recent_update
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "BILLING", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_billing
- DataSetIdentifier: health_events_view
  Expression: ifelse({is_persona_billing} = 1, "Yes", "")
  Name: is_persona_billing_text
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "OPERATIONS", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_operations
- DataSetIdentifier: health_events_view
  Expression: ifelse({is_persona_operations} = 1, "Yes", "")
  Name: is_persona_operations_text
- DataSetIdentifier: health_events_view
  Expression: ifelse(contains(personas, "SECURITY", CASE_INSENSITIVE), 1, 0)
  Name: is_persona_security
- DataSetIdentifier: health_events_view
  Expression: ifelse({is_persona_security} = 1, "Yes", "")
  Name: is_persona_security_text
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        dateDiff({last_updated_time}, now()) <= ${ConfigRecentActivityDaysThreshold} or dateDiff({first_updated_time}, now()) <= ${ConfigRecentActivityDaysThreshold}, "Yes",
        "No"
    )
  Name: is_recent_update_text
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "IMPAIRED", 1, 0)
  Name: is_resource_impaired
- DataSetIdentifier: health_events_view
  Expression: ifelse(({affected_entity_status_code} = "" OR {affected_entity_status_code}
    = "UNKNOWN"), 1, 0)
  Name: is_resource_no_status
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "PENDING", 1, 0)
  Name: is_resource_pending
- DataSetIdentifier: health_events_view
  Expression: ifelse({affected_entity_status_code} = "RESOLVED", 1, 0)
  Name: is_resource_resolved
- DataSetIdentifier: health_events_view
  Expression: ifelse({is_resource_impaired} = 1 or {is_resource_pending} = 1, 1, 0)
  Name: is_resource_unresolved
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        isNull(${FilterSearchText}), 1,
        strlen((${FilterSearchText})) = 0, 1,
        ${FilterSearchText} = "(search text)", 1,
        contains({util_search_context}, ${FilterSearchText}, CASE_INSENSITIVE), 1,
        0
    )
  Name: is_search_text_match
- DataSetIdentifier: health_events_view
  Expression: '{start_time} > now()'
  Name: is_start_after_now
- DataSetIdentifier: health_events_view
  Expression: '{start_time} < addDateTime(${ConfigNearDaysThreshold}, "DD", now())'
  Name: is_warn_days_within
- DataSetIdentifier: health_events_view
  Expression: dateDiff({last_ingest_time_payer}, now(), "DD")
  Name: last_ingest_days_ago_payer
- DataSetIdentifier: health_events_view
  Expression: maxOver({ingestion_time}, [{payer_account_id}], PRE_FILTER)
  Name: last_ingest_time_payer
- DataSetIdentifier: health_events_view
  Expression: dateDiff({last_updated_time}, now(), "DD")
  Name: last_update_days_ago
- DataSetIdentifier: health_events_view
  Expression: concat(toString({last_update_days_ago}), " days ago")
  Name: last_update_days_ago_text
- DataSetIdentifier: health_events_view
  Expression: maxOver({last_updated_time}, [{affected_entity_value}, Title, {event_category},
    region, {account_id}, {Description 1}], PRE_FILTER )
  Name: most_recent_update
- DataSetIdentifier: health_events_view
  Expression: "concat(\n    ifelse(contains(personas, \"OPERATIONS\"), \"\U0001F6E0\
    \uFE0F Operations\", \"\"),\n    ifelse(contains(personas, \"BILLING\"), \"\U0001F9FE\
    \ Billing\", \"\"),\n    ifelse(contains(personas, \"SECURITY\"), \"\U0001F6E1\
    \uFE0F Security\", \"\")\n)"
  Name: persona_all_icons
- DataSetIdentifier: health_events_view
  Expression: "concat(\n    ifelse(contains(personas, \"OPERATIONS\"), \"\U0001F6E0\
    \uFE0F\", \"\"),\n    ifelse(contains(personas, \"BILLING\"), \"\U0001F9FE\",\
    \ \"\"),\n    ifelse(contains(personas, \"SECURITY\"), \"\U0001F6E1\uFE0F\", \"\
    \")\n)"
  Name: persona_all_icons_only
- DataSetIdentifier: health_events_view
  Expression: "ifelse(contains(${RecentGrouping}, \"Lifecycle\", CASE_INSENSITIVE)\
    \ and {is_lifecycle_event} = 0, NULL,\n    concat(\n        ifelse({is_lifecycle_event}\
    \ = 1, \"\U0001F98B \", \"\"),\n        ifelse(\n            contains(${RecentGrouping},\
    \ \"Account\", CASE_INSENSITIVE), Account,\n            contains(${RecentGrouping},\
    \ \"Lifecycle\", CASE_INSENSITIVE), {Lifecycle Event},\n            {event_group_title_service}\n\
    \        )\n    )\n)"
  Name: recent_update_title
- DataSetIdentifier: health_events_view
  Expression: dateDiff(now(), {start_time}, "DD")
  Name: relative_start_days_from_now
- DataSetIdentifier: health_events_view
  Expression: concat(formatDate({start_time}, "MMM-dd-yyyy"), "  (", toString({relative_start_days_from_now}),
    " days)")
  Name: start_date_with_days_out
- DataSetIdentifier: health_events_view
  Expression: formatDate({Start week}, "yyyy-MM-dd")
  Name: start_week_string
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        contains(${FilterEventScopeMode}, "All", CASE_INSENSITIVE), 1,
        contains(${FilterEventScopeMode}, "Non-lifecycle", CASE_INSENSITIVE) and {is_lifecycle_event} = 0, 1,
        contains(${FilterEventScopeMode}, "Non-lifecycle", CASE_INSENSITIVE) and {is_lifecycle_event} = 1, 0,
        {is_lifecycle_event} = 1, 1,
        0
    )
  Name: util_event_scope_mode_filter
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        {Event Status} = "Near", 1,
        {Event Status} = "Future", 2,
        {Event Status} = "Current", 0,
        -1
    )
  Name: util_event_status_numeric
- DataSetIdentifier: health_events_view
  Expression: '"NOTE: First Update time is not an indication of the first official
    notification from AWS Health. It is only a reference to the first event entry
    captured since this dashboard was installed."'
  Name: util_first_update_disclaimer
- DataSetIdentifier: health_events_view
  Expression: "ifelse(\n    min({last_ingest_days_ago_payer}, [{payer_account_id}])\
    \ > 13, \"\U0001F534\",\n    min({last_ingest_days_ago_payer}, [{payer_account_id}])\
    \ > 6, \"\U0001F7E1\",\n    \"\U0001F49A\"\n)"
  Name: util_ingest_health
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        contains(${FilterPersona}, "All personas", CASE_INSENSITIVE), 1,
        {is_persona_billing} = 1 AND contains(${FilterPersona}, "BILLING", CASE_INSENSITIVE), 1,
        {is_persona_operations} = 1 AND contains(${FilterPersona}, "OPERATIONS", CASE_INSENSITIVE), 1,
        {is_persona_security} = 1 AND contains(${FilterPersona}, "SECURITY", CASE_INSENSITIVE), 1,
        0
    )
  Name: util_persona_filter
- DataSetIdentifier: health_events_view
  Expression: |-
    ifelse(
        ${FilterPersona} = "All Personas", 1,
        ({persona_01} = ${FilterPersona} or {persona_02} = ${FilterPersona} or {persona_03} = ${FilterPersona}), 1,
        0
    )
  Name: util_persona_in_scope
- DataSetIdentifier: health_events_view
  Expression: '"CLICK TO RESET FILTERS"'
  Name: util_reset_button_text
- DataSetIdentifier: health_events_view
  Expression: concat({event_title},{event_arn},{account_id},{account_name},region,{payer_account_id},{affected_entity_arn},{affected_entity_value},personas,actionability,{event_category},{Event
    Status},tags,{Resource Status},Description)
  Name: util_search_context
- DataSetIdentifier: health_events_view
  Expression: ifelse(distinctCountOver(ifelse(${ConfigEventGroupFormat} = "Service
    and Event Title",{event_group_title_service},{event_group}), [], PRE_AGG) = 1,
    1, 0)
  Name: util_single_event_filter
- DataSetIdentifier: health_events_view
  Expression: concat({account_id},region,{affected_entity_value})
  Name: util_unique_affected_entity
