  FilterGroupId: 6276ae6b-a15d-4ab1-ba3a-7bd35aed6bf8
  Filters:
  - CategoryFilter:
      Column:
        ColumnName: event_arn
        DataSetIdentifier: health_events_view
      Configuration:
        FilterListConfiguration:
          MatchOperator: CONTAINS
          NullOption: NON_NULLS_ONLY
          SelectAllOptions: FILTER_ALL_VALUES
      FilterId: f67639fa-33c8-4242-9b5b-fa8ae85f5364
